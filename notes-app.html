<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Catalog — Notes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Source+Serif+4:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --paper:#E5E4D9;
  --paper-card:#F2F0E6;
  --paper-line: rgba(28,43,58,0.14);
  --paper-margin: rgba(179,66,55,0.55);
  --ink:#1D2B39;
  --ink-soft:#5B6570;
  --ink-faint:#8B9198;
  --cabinet:#2A2018;
  --cabinet-alt:#39291D;
  --cabinet-text:#E9E2D2;
  --cabinet-text-dim:#B9AE99;
  --accent:#2F7A6B;
  --accent-dim: rgba(47,122,107,0.16);
  --stamp:#B3603A;
  --shadow: 0 22px 44px -24px rgba(15,12,8,0.5);
  --radius: 3px;
}

*{ box-sizing:border-box; }
html,body{ height:100%; }
body{
  margin:0;
  background: var(--cabinet);
  font-family:'Source Serif 4', serif;
  color: var(--ink);
  overflow:hidden;
}
@media (prefers-reduced-motion: reduce){
  *{ animation-duration:0.001ms !important; transition-duration:0.001ms !important; }
}

button{ font-family:inherit; cursor:pointer; }
input, textarea{ font-family:inherit; }
:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

.app{
  display:grid;
  grid-template-columns: 280px 1fr;
  height:100vh;
}

/* ---------- SIDEBAR: the cabinet drawer ---------- */
.drawer{
  background: linear-gradient(180deg, var(--cabinet), var(--cabinet-alt));
  color: var(--cabinet-text);
  display:flex;
  flex-direction:column;
  min-width:0;
  box-shadow: inset -12px 0 24px -20px rgba(0,0,0,0.6);
}
.drawer-head{
  padding: 22px 18px 14px;
  border-bottom: 1px solid rgba(233,226,210,0.12);
}
.drawer-label{
  font-family:'IBM Plex Mono', monospace;
  font-size:10.5px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color: var(--cabinet-text-dim);
  margin: 0 0 10px;
}
.drawer-title{
  font-family:'Fraunces', serif;
  font-weight:600;
  font-size: 22px;
  margin:0 0 16px;
  letter-spacing: .01em;
}
.search-wrap{
  position:relative;
}
.search-wrap input{
  width:100%;
  background: rgba(0,0,0,0.22);
  border: 1px solid rgba(233,226,210,0.18);
  color: var(--cabinet-text);
  padding: 9px 10px 9px 28px;
  border-radius: var(--radius);
  font-size: 13px;
  font-family:'IBM Plex Mono', monospace;
}
.search-wrap input::placeholder{ color: var(--cabinet-text-dim); }
.search-wrap svg{
  position:absolute; left:8px; top:50%; transform:translateY(-50%);
  width:14px; height:14px; opacity:.6;
}

.new-btn{
  margin: 14px 18px;
  background: var(--accent);
  color: #F2F0E6;
  border:none;
  padding: 10px 14px;
  border-radius: var(--radius);
  font-family:'IBM Plex Mono', monospace;
  font-size: 12.5px;
  letter-spacing:.06em;
  text-transform:uppercase;
  display:flex; align-items:center; gap:8px;
  transition: background .15s ease, transform .1s ease;
}
.new-btn:hover{ background:#37917f; }
.new-btn:active{ transform: scale(0.98); }

.tab-list{
  flex:1;
  overflow-y:auto;
  padding: 4px 0 18px;
}
.tab-list::-webkit-scrollbar{ width:8px; }
.tab-list::-webkit-scrollbar-thumb{ background: rgba(233,226,210,0.15); border-radius:8px; }

.tab-item{
  position:relative;
  display:flex;
  align-items:center;
  gap:10px;
  width:100%;
  text-align:left;
  background:transparent;
  border:none;
  color: var(--cabinet-text);
  padding: 11px 16px 11px 18px;
  border-left: 3px solid transparent;
  transition: background .12s ease, border-color .12s ease;
}
.tab-item:hover{ background: rgba(233,226,210,0.06); }
.tab-item.active{
  background: rgba(233,226,210,0.09);
  border-left-color: var(--stamp);
}
.tab-item .idx{
  font-family:'IBM Plex Mono', monospace;
  font-size:10.5px;
  color: var(--cabinet-text-dim);
  width: 22px;
  flex-shrink:0;
}
.tab-item .meta{
  min-width:0;
  flex:1;
}
.tab-item .t-title{
  font-family:'IBM Plex Mono', monospace;
  font-size: 12.5px;
  letter-spacing:.02em;
  text-transform:uppercase;
  color: var(--cabinet-text);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.tab-item .t-snip{
  font-family:'Source Serif 4', serif;
  font-size: 12.5px;
  color: var(--cabinet-text-dim);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-top:2px;
}
.tab-item .del{
  flex-shrink:0;
  opacity:0;
  background:transparent;
  border:none;
  color: var(--cabinet-text-dim);
  padding:4px;
  border-radius:3px;
  font-family:'IBM Plex Mono', monospace;
  font-size:10px;
}
.tab-item:hover .del, .tab-item .del.confirming{ opacity:1; }
.tab-item .del:hover{ color:#e0736a; background: rgba(224,115,106,0.12); }
.tab-item .del.confirming{ color:#e0736a; }

.empty-drawer{
  padding: 30px 20px;
  color: var(--cabinet-text-dim);
  font-family:'IBM Plex Mono', monospace;
  font-size: 12px;
  line-height:1.7;
  text-align:center;
}

/* ---------- MAIN: the card ---------- */
.stage{
  position:relative;
  background:
    radial-gradient(1200px 600px at 20% -10%, rgba(255,255,255,0.35), transparent 60%),
    var(--paper);
  overflow-y:auto;
  padding: 40px 48px 60px;
}

.topbar{
  display:none;
  align-items:center;
  gap:12px;
  margin-bottom: 18px;
}
.hamburger{
  background: var(--cabinet);
  color: var(--cabinet-text);
  border:none;
  padding: 8px 10px;
  border-radius: var(--radius);
  font-family:'IBM Plex Mono', monospace;
  font-size:11px;
  display:flex; align-items:center; gap:6px;
}

.card{
  position:relative;
  max-width: 640px;
  margin: 0 auto;
  background: var(--paper-card);
  border-radius: 4px;
  box-shadow: var(--shadow);
  padding: 40px 44px 44px 56px;
  min-height: 60vh;
}
.card::before{
  /* red margin rule, classic index card */
  content:"";
  position:absolute;
  top:0; bottom:0; left:34px;
  width:1px;
  background: var(--paper-margin);
}
.card::after{
  /* punch-hole */
  content:"";
  position:absolute;
  top: 22px; left: 20px;
  width:9px; height:9px;
  border-radius:50%;
  background: var(--paper);
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.35);
}
.tab-cut{
  position:absolute;
  top: -14px; left: 56px;
  background: var(--stamp);
  color: #F6EFE4;
  font-family:'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing:.12em;
  text-transform:uppercase;
  padding: 5px 12px 6px;
  border-radius: 3px 3px 0 0;
}

.title-input{
  display:block;
  width:100%;
  border:none;
  background:transparent;
  font-family:'Fraunces', serif;
  font-weight:600;
  font-size: 30px;
  color: var(--ink);
  padding:0 0 10px;
}
.title-input::placeholder{ color: var(--ink-faint); }

.meta-row{
  display:flex;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
  margin-bottom: 18px;
  padding-bottom: 14px;
  border-bottom: 1px dashed var(--paper-line);
}
.meta-item{
  display:flex; align-items:center; gap:6px;
  font-family:'IBM Plex Mono', monospace;
  font-size: 11.5px;
  color: var(--ink-soft);
}
.tag-input{
  border:none;
  background: var(--accent-dim);
  color: var(--accent);
  padding: 4px 8px 4px 4px;
  border-radius: 3px;
  font-family:'IBM Plex Mono', monospace;
  font-size: 11.5px;
  width: 130px;
}
.tag-input::placeholder{ color: rgba(47,122,107,0.5); }

.body-textarea{
  width:100%;
  min-height: 360px;
  border:none;
  resize: vertical;
  background-image: repeating-linear-gradient(
    to bottom,
    transparent, transparent 30px,
    var(--paper-line) 31px
  );
  background-position: 0 6px;
  line-height: 31px;
  font-size: 16.5px;
  color: var(--ink);
  padding: 0;
}
.body-textarea::placeholder{ color: var(--ink-faint); }

.empty-stage{
  max-width: 460px;
  margin: 12vh auto 0;
  text-align:center;
  color: var(--ink-soft);
}
.empty-stage .stamp-mark{
  display:inline-block;
  border: 2px solid var(--stamp);
  color: var(--stamp);
  font-family:'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing:.14em;
  text-transform:uppercase;
  padding: 6px 14px;
  border-radius: 3px;
  transform: rotate(-4deg);
  margin-bottom: 22px;
}
.empty-stage h2{
  font-family:'Fraunces', serif;
  font-weight:600;
  font-size: 26px;
  color: var(--ink);
  margin: 0 0 10px;
}
.empty-stage p{
  font-size: 15px;
  line-height:1.6;
  margin: 0 0 22px;
}
.empty-stage button{
  background: var(--ink);
  color: var(--paper-card);
  border:none;
  padding: 11px 20px;
  border-radius: var(--radius);
  font-family:'IBM Plex Mono', monospace;
  font-size: 12.5px;
  letter-spacing:.06em;
  text-transform:uppercase;
}

.sr-only{
  position:absolute; width:1px; height:1px; overflow:hidden;
  clip:rect(0,0,0,0); white-space:nowrap;
}

@media (max-width: 820px){
  .app{ grid-template-columns: 1fr; }
  .drawer{
    position:fixed; inset: 0 30% 0 0;
    z-index: 20;
    transform: translateX(-105%);
    transition: transform .22s ease;
  }
  .drawer.open{ transform: translateX(0); }
  .scrim{
    display:none;
    position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:19;
  }
  .scrim.show{ display:block; }
  .topbar{ display:flex; }
  .stage{ padding: 18px 18px 50px; }
  .card{ padding: 34px 24px 34px 40px; }
}
</style>
</head>
<body>

<div class="app">
  <aside class="drawer" id="drawer">
    <div class="drawer-head">
      <p class="drawer-label">Catalog — Personal</p>
      <h1 class="drawer-title">Card Catalog</h1>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search" type="text" placeholder="Search cards…" autocomplete="off">
      </div>
    </div>
    <button class="new-btn" id="newBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New card
    </button>
    <nav class="tab-list" id="tabList" aria-label="Notes"></nav>
  </aside>

  <div class="scrim" id="scrim"></div>

  <main class="stage" id="stage">
    <div class="topbar">
      <button class="hamburger" id="hamburger">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        Browse cards
      </button>
    </div>
    <div id="stageContent"></div>
  </main>
</div>

<script>
(function(){
  const tabList = document.getElementById('tabList');
  const stageContent = document.getElementById('stageContent');
  const searchInput = document.getElementById('search');
  const newBtn = document.getElementById('newBtn');
  const drawer = document.getElementById('drawer');
  const hamburger = document.getElementById('hamburger');
  const scrim = document.getElementById('scrim');

  let notes = [];
  let activeId = null;
  let searchTerm = '';
  let saveTimer = null;
  let loaded = false;

  const STORAGE_KEY = 'notes-app:notes';
  const INIT_KEY = 'notes-app:initialized';

  function uid(){ return 'n' + Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

  function relTime(ts){
    const diff = Date.now() - ts;
    const min = Math.floor(diff/60000);
    if(min < 1) return 'just now';
    if(min < 60) return min + 'm ago';
    const hr = Math.floor(min/60);
    if(hr < 24) return hr + 'h ago';
    const day = Math.floor(hr/24);
    if(day < 7) return day + 'd ago';
    const d = new Date(ts);
    return d.toLocaleDateString(undefined, {month:'short', day:'numeric'});
  }

  async function loadNotes(){
    try{
      const res = await window.storage.get(STORAGE_KEY, false);
      notes = res ? JSON.parse(res.value) : [];
    }catch(e){
      notes = [];
    }
    try{
      const init = await window.storage.get(INIT_KEY, false);
      if(!init && notes.length === 0){
        notes = seedNotes();
        await persist();
        await window.storage.set(INIT_KEY, 'true', false);
      }
    }catch(e){
      if(notes.length === 0){ notes = seedNotes(); }
    }
    loaded = true;
    if(notes.length){
      activeId = [...notes].sort((a,b)=>b.updatedAt-a.updatedAt)[0].id;
    }
    renderList();
    renderStage();
  }

  function seedNotes(){
    const now = Date.now();
    return [
      {
        id: uid(),
        title: 'Welcome to your catalog',
        tag: 'guide',
        body: 'This is a card. Click "New card" to file another one.\n\nEverything you write here is saved automatically — no submit button needed, just like a real index card left in the drawer.',
        updatedAt: now
      },
      {
        id: uid(),
        title: 'Reading list',
        tag: 'books',
        body: 'A Pattern Language — Christopher Alexander\nThe Order of Time — Carlo Rovelli\nBraiding Sweetgrass — Robin Wall Kimmerer',
        updatedAt: now - 3600000
      }
    ];
  }

  async function persist(){
    try{
      await window.storage.set(STORAGE_KEY, JSON.stringify(notes), false);
    }catch(e){
      console.error('Could not save notes', e);
    }
  }

  function queueSave(){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(persist, 400);
  }

  function getFiltered(){
    const term = searchTerm.trim().toLowerCase();
    let list = [...notes];
    if(term){
      list = list.filter(n =>
        (n.title||'').toLowerCase().includes(term) ||
        (n.body||'').toLowerCase().includes(term) ||
        (n.tag||'').toLowerCase().includes(term)
      );
    }
    return list.sort((a,b)=> b.updatedAt - a.updatedAt);
  }

  function renderList(){
    const list = getFiltered();
    tabList.innerHTML = '';
    if(list.length === 0){
      const empty = document.createElement('div');
      empty.className = 'empty-drawer';
      empty.textContent = notes.length === 0
        ? 'Drawer is empty. File your first card.'
        : 'No cards match your search.';
      tabList.appendChild(empty);
      return;
    }
    list.forEach((n, i) => {
      const item = document.createElement('button');
      item.className = 'tab-item' + (n.id === activeId ? ' active' : '');
      item.setAttribute('data-id', n.id);
      const snippet = (n.body || '').split('\n').find(l => l.trim().length) || 'Empty card';
      item.innerHTML = `
        <span class="idx">${String(i+1).padStart(2,'0')}</span>
        <span class="meta">
          <span class="t-title">${escapeHtml(n.title || 'Untitled card')}</span>
          <span class="t-snip">${escapeHtml(snippet)}</span>
        </span>
        <button class="del" data-del="${n.id}" title="Delete card" aria-label="Delete card">✕</button>
      `;
      item.addEventListener('click', (e) => {
        if(e.target.closest('[data-del]')) return;
        activeId = n.id;
        renderList();
        renderStage();
        if(window.innerWidth <= 820) closeDrawer();
      });
      tabList.appendChild(item);
    });

    tabList.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.getAttribute('data-del');
        if(btn.classList.contains('confirming')){
          deleteNote(id);
        }else{
          btn.classList.add('confirming');
          btn.textContent = '✓';
          btn.title = 'Click again to confirm';
          setTimeout(() => {
            btn.classList.remove('confirming');
            btn.textContent = '✕';
            btn.title = 'Delete card';
          }, 2500);
        }
      });
    });
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function renderStage(){
    const note = notes.find(n => n.id === activeId);
    if(!note){
      stageContent.innerHTML = `
        <div class="empty-stage">
          <span class="stamp-mark">Catalog</span>
          <h2>Pull a card to begin</h2>
          <p>Choose a card from the drawer, or file a new one. Titles, tags, and notes save automatically as you type.</p>
          <button id="emptyNewBtn">File a new card</button>
        </div>
      `;
      document.getElementById('emptyNewBtn').addEventListener('click', createNote);
      return;
    }

    stageContent.innerHTML = `
      <div class="card">
        <span class="tab-cut">Card ${String(notes.findIndex(n=>n.id===note.id)+1).padStart(2,'0')}</span>
        <input class="title-input" id="titleInput" placeholder="Untitled card" value="${escapeHtml(note.title || '')}">
        <div class="meta-row">
          <span class="meta-item">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
            Updated ${relTime(note.updatedAt)}
          </span>
          <span class="meta-item">
            #<input class="tag-input" id="tagInput" placeholder="tag" value="${escapeHtml(note.tag || '')}">
          </span>
        </div>
        <textarea class="body-textarea" id="bodyInput" placeholder="Start writing…">${escapeHtml(note.body || '')}</textarea>
      </div>
    `;

    const titleInput = document.getElementById('titleInput');
    const tagInput = document.getElementById('tagInput');
    const bodyInput = document.getElementById('bodyInput');

    titleInput.addEventListener('input', () => {
      note.title = titleInput.value;
      note.updatedAt = Date.now();
      updateSidebarItem(note);
      queueSave();
    });
    tagInput.addEventListener('input', () => {
      note.tag = tagInput.value;
      note.updatedAt = Date.now();
      queueSave();
    });
    bodyInput.addEventListener('input', () => {
      note.body = bodyInput.value;
      note.updatedAt = Date.now();
      updateSidebarItem(note);
      queueSave();
    });

    if(!note.title){ titleInput.focus(); }
  }

  function updateSidebarItem(note){
    const item = tabList.querySelector(`.tab-item[data-id="${note.id}"]`);
    if(!item) return;
    const titleEl = item.querySelector('.t-title');
    const snipEl = item.querySelector('.t-snip');
    if(titleEl) titleEl.textContent = note.title || 'Untitled card';
    if(snipEl){
      const snippet = (note.body || '').split('\n').find(l => l.trim().length) || 'Empty card';
      snipEl.textContent = snippet;
    }
  }

  function createNote(){
    const note = { id: uid(), title: '', tag: '', body: '', updatedAt: Date.now() };
    notes.unshift(note);
    activeId = note.id;
    searchTerm = '';
    searchInput.value = '';
    renderList();
    renderStage();
    persist();
    if(window.innerWidth <= 820) closeDrawer();
  }

  function deleteNote(id){
    const idx = notes.findIndex(n => n.id === id);
    if(idx === -1) return;
    notes.splice(idx, 1);
    if(activeId === id){
      const remaining = getFiltered();
      activeId = remaining.length ? remaining[0].id : null;
    }
    renderList();
    renderStage();
    persist();
  }

  function openDrawer(){ drawer.classList.add('open'); scrim.classList.add('show'); }
  function closeDrawer(){ drawer.classList.remove('open'); scrim.classList.remove('show'); }

  newBtn.addEventListener('click', createNote);
  hamburger.addEventListener('click', openDrawer);
  scrim.addEventListener('click', closeDrawer);
  searchInput.addEventListener('input', () => {
    searchTerm = searchInput.value;
    renderList();
  });

  document.addEventListener('keydown', (e) => {
    if((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'n'){
      e.preventDefault();
      createNote();
    }
    if(e.key === 'Escape'){
      document.activeElement && document.activeElement.blur();
    }
  });

  loadNotes();
})();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault — Password Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --graphite:#1d2023;
    --steel:#282c30;
    --steel-light:#33383d;
    --line:#40464c;
    --line-soft:#343a40;
    --teal:#4fa8a0;
    --teal-soft:rgba(79,168,160,0.14);
    --teal-dim:#3a7d77;
    --weak:#b8543f;
    --medium:#c9a227;
    --strong:#4fa8a0;
    --text:#e9ebec;
    --muted:#8d9298;
    --radius:4px;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    font-family:'Inter', sans-serif;
    background:var(--graphite);
    color:var(--text);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{ background:var(--teal); color:#10312e; }
  button{ font-family:'Inter', sans-serif; }

  /* ===================== LOCK SCREEN ===================== */
  #lockScreen{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
    transition:opacity .5s ease, transform .5s ease;
  }
  #lockScreen.unlocking{
    opacity:0;
    transform:scale(0.97);
    pointer-events:none;
  }

  .brand-mark{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:38px;
  }
  .brand-mark .name{
    font-family:'Sora', sans-serif;
    font-weight:600;
    font-size:20px;
    letter-spacing:-0.01em;
  }
  .brand-mark .name em{ color:var(--teal); font-style:normal; }

  /* signature: vault dial */
  .vault-dial{
    width:180px; height:180px;
    position:relative;
    margin-bottom:34px;
  }
  .vault-dial svg{
    width:100%; height:100%;
    transition:transform .7s cubic-bezier(.65,0,.35,1);
  }
  .vault-dial.spin svg{ transform:rotate(300deg); }
  .vault-dial .tick{ stroke:var(--line); stroke-width:2; }
  .vault-dial .ring{ fill:none; stroke:var(--steel-light); stroke-width:2; }
  .vault-dial .knob{ fill:var(--steel); stroke:var(--teal); stroke-width:2; }
  .vault-dial .pointer{ fill:var(--teal); }
  .vault-dial .core{ fill:var(--graphite); stroke:var(--line); stroke-width:1.5; }
  .vault-dial .lockicon{ fill:none; stroke:var(--text); stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; }

  .lock-card{
    width:100%;
    max-width:400px;
    background:var(--steel);
    border:1px solid var(--line);
    border-radius:6px;
    padding:30px;
  }

  .tab-switch{
    display:flex;
    background:var(--graphite);
    border:1px solid var(--line);
    border-radius:6px;
    padding:3px;
    margin-bottom:22px;
  }
  .tab-switch button{
    flex:1;
    padding:9px 0;
    background:none;
    border:none;
    border-radius:4px;
    color:var(--muted);
    font-weight:600;
    font-size:12.5px;
    cursor:pointer;
  }
  .tab-switch button.active{ background:var(--teal); color:#10312e; }

  .lock-form{ display:none; flex-direction:column; gap:14px; }
  .lock-form.active{ display:flex; }

  .field{ display:flex; flex-direction:column; gap:6px; }
  .field label{ font-size:11.5px; color:var(--muted); }
  .field input[type="password"], .field input[type="text"]{
    background:var(--graphite);
    border:1px solid var(--line);
    color:var(--text);
    padding:11px 12px;
    border-radius:var(--radius);
    font-size:14px;
    outline:none;
  }
  .field input:focus{ border-color:var(--teal); }

  .file-drop{
    border:1px dashed var(--line);
    border-radius:var(--radius);
    padding:16px;
    text-align:center;
    font-size:12.5px;
    color:var(--muted);
    position:relative;
  }
  .file-drop input[type="file"]{
    position:absolute; inset:0; opacity:0; cursor:pointer;
  }
  .file-drop.has-file{ border-color:var(--teal); color:var(--teal); }

  .primary-btn{
    padding:12px 0;
    background:var(--teal);
    border:none;
    border-radius:var(--radius);
    color:#10312e;
    font-weight:700;
    font-size:13.5px;
    cursor:pointer;
    margin-top:4px;
  }
  .primary-btn:hover{ filter:brightness(1.08); }
  .primary-btn:disabled{ opacity:0.5; cursor:not-allowed; }

  .lock-note{
    font-size:11.5px;
    color:var(--muted);
    line-height:1.6;
    margin-top:18px;
    text-align:center;
  }
  .lock-status{
    font-size:12px;
    min-height:16px;
    text-align:center;
  }
  .lock-status.err{ color:var(--weak); }
  .lock-status.ok{ color:var(--strong); }

  /* ===================== VAULT APP ===================== */
  #vaultApp{ display:none; }
  #vaultApp.active{ display:block; }

  .app-shell{
    max-width:900px;
    margin:0 auto;
    padding:36px 26px 70px;
  }

  header.app-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:26px;
    gap:16px;
    flex-wrap:wrap;
  }
  header.app-head .brand-mark{ margin-bottom:0; }
  .head-actions{ display:flex; gap:10px; }
  .head-actions button{
    padding:9px 16px;
    border-radius:var(--radius);
    font-size:12.5px;
    font-weight:600;
    border:1px solid var(--line);
    background:var(--steel);
    color:var(--text);
    cursor:pointer;
  }
  .head-actions button:hover{ border-color:var(--teal); color:var(--teal); }
  .head-actions button.lock-action{ color:var(--weak); }
  .head-actions button.lock-action:hover{ border-color:var(--weak); }

  .section-switch{
    display:flex;
    background:var(--steel);
    border:1px solid var(--line);
    border-radius:6px;
    padding:4px;
    margin-bottom:26px;
    width:fit-content;
  }
  .section-switch button{
    padding:9px 20px;
    background:none;
    border:none;
    border-radius:4px;
    color:var(--muted);
    font-family:'Sora', sans-serif;
    font-weight:600;
    font-size:13px;
    cursor:pointer;
  }
  .section-switch button.active{ background:var(--teal); color:#10312e; }

  .section{ display:none; }
  .section.active{ display:block; }

  /* ---- Vault list section ---- */
  .toolbar{
    display:flex;
    gap:10px;
    margin-bottom:18px;
  }
  .toolbar input[type="text"]{
    flex:1;
    background:var(--steel);
    border:1px solid var(--line);
    color:var(--text);
    padding:10px 13px;
    border-radius:var(--radius);
    font-size:13.5px;
    outline:none;
  }
  .toolbar input:focus{ border-color:var(--teal); }
  .toolbar button{
    padding:10px 18px;
    background:var(--teal);
    border:none;
    border-radius:var(--radius);
    color:#10312e;
    font-weight:700;
    font-size:13px;
    cursor:pointer;
    white-space:nowrap;
  }
  .toolbar button:hover{ filter:brightness(1.08); }

  .entry-card{
    background:var(--steel);
    border:1px solid var(--line);
    border-radius:6px;
    padding:16px 18px;
    margin-bottom:10px;
  }
  .entry-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    margin-bottom:12px;
  }
  .entry-site{
    font-family:'Sora', sans-serif;
    font-weight:600;
    font-size:15px;
  }
  .entry-username{
    font-size:12.5px;
    color:var(--muted);
    margin-top:2px;
  }
  .entry-actions{ display:flex; gap:6px; flex-shrink:0; }
  .entry-actions button{
    background:none;
    border:1px solid var(--line);
    color:var(--muted);
    border-radius:var(--radius);
    padding:6px 10px;
    font-size:11.5px;
    cursor:pointer;
  }
  .entry-actions button:hover{ border-color:var(--teal); color:var(--teal); }
  .entry-actions button.danger:hover{ border-color:var(--weak); color:var(--weak); }

  .entry-pw-row{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--graphite);
    border:1px solid var(--line-soft);
    border-radius:var(--radius);
    padding:9px 12px;
  }
  .entry-pw-row .pw-text{
    flex:1;
    font-family:'Roboto Mono', monospace;
    font-size:13.5px;
    letter-spacing:0.02em;
    overflow-x:auto;
    white-space:nowrap;
  }
  .entry-pw-row button{
    background:none;
    border:none;
    color:var(--muted);
    cursor:pointer;
    font-size:11.5px;
    padding:4px 8px;
  }
  .entry-pw-row button:hover{ color:var(--teal); }

  .strength-bar{
    height:4px;
    background:var(--line-soft);
    border-radius:2px;
    margin-top:10px;
    overflow:hidden;
  }
  .strength-fill{ height:100%; transition:width .3s ease; }
  .strength-label{
    font-size:10.5px;
    color:var(--muted);
    margin-top:6px;
    text-transform:uppercase;
    letter-spacing:0.06em;
  }

  .entry-notes{
    font-size:12px;
    color:var(--muted);
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid var(--line-soft);
    white-space:pre-line;
  }

  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--muted);
  }
  .empty-state strong{
    display:block;
    font-family:'Sora', sans-serif;
    font-size:17px;
    color:var(--text);
    font-weight:600;
    margin-bottom:8px;
  }

  /* ---- Add/edit entry form (inline panel) ---- */
  .entry-form{
    background:var(--steel);
    border:1px solid var(--teal-dim);
    border-radius:6px;
    padding:22px;
    margin-bottom:20px;
    display:none;
  }
  .entry-form.active{ display:block; }
  .entry-form .form-title{
    font-family:'Sora', sans-serif;
    font-weight:600;
    font-size:15px;
    margin-bottom:16px;
  }
  .form-row2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .entry-form .field{ margin-bottom:12px; }
  .entry-form input, .entry-form textarea{
    width:100%;
    background:var(--graphite);
    border:1px solid var(--line);
    color:var(--text);
    padding:10px 12px;
    border-radius:var(--radius);
    font-size:13.5px;
    outline:none;
    font-family:'Inter', sans-serif;
  }
  .entry-form textarea{ font-family:'Inter', sans-serif; min-height:60px; resize:vertical; }
  .entry-form input:focus, .entry-form textarea:focus{ border-color:var(--teal); }
  .pw-input-row{ display:flex; gap:8px; }
  .pw-input-row input{ font-family:'Roboto Mono', monospace; }
  .pw-input-row button{
    flex-shrink:0;
    padding:0 14px;
    background:var(--steel-light);
    border:1px solid var(--line);
    border-radius:var(--radius);
    color:var(--teal);
    font-size:12px;
    font-weight:600;
    cursor:pointer;
  }
  .form-actions{ display:flex; gap:10px; margin-top:16px; }
  .form-actions button{
    padding:10px 20px;
    border-radius:var(--radius);
    font-size:13px;
    font-weight:700;
    cursor:pointer;
  }
  .form-actions .save-btn{ background:var(--teal); border:none; color:#10312e; }
  .form-actions .save-btn:hover{ filter:brightness(1.08); }
  .form-actions .cancel-btn{ background:none; border:1px solid var(--line); color:var(--muted); }

  /* ---- Generator section ---- */
  .generator-panel{
    background:var(--steel);
    border:1px solid var(--line);
    border-radius:6px;
    padding:26px;
    max-width:520px;
  }
  .gen-output{
    background:var(--graphite);
    border:1px solid var(--line-soft);
    border-radius:var(--radius);
    padding:16px;
    font-family:'Roboto Mono', monospace;
    font-size:18px;
    letter-spacing:0.03em;
    word-break:break-all;
    margin-bottom:12px;
    min-height:28px;
  }
  .gen-actions{ display:flex; gap:10px; margin-bottom:22px; }
  .gen-actions button{
    padding:9px 16px;
    border-radius:var(--radius);
    font-size:12.5px;
    font-weight:600;
    cursor:pointer;
  }
  .gen-actions .regen-btn{ background:var(--teal); border:none; color:#10312e; }
  .gen-actions .copy-btn, .gen-actions .use-btn{ background:none; border:1px solid var(--line); color:var(--text); }
  .gen-actions button:hover{ filter:brightness(1.08); border-color:var(--teal); }

  .gen-options .field{ margin-bottom:16px; }
  .slider-row{ display:flex; align-items:center; gap:12px; }
  .slider-row input[type="range"]{ flex:1; accent-color:var(--teal); }
  .slider-row .sval{ font-family:'Roboto Mono', monospace; color:var(--teal); font-size:13px; width:28px; text-align:right; }

  .check-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .check-row{ display:flex; align-items:center; gap:8px; font-size:13px; }
  .check-row input{ accent-color:var(--teal); width:16px; height:16px; }

  @media (max-width: 700px){
    .form-row2{ grid-template-columns:1fr; }
    .check-grid{ grid-template-columns:1fr; }
    header.app-head{ flex-direction:column; align-items:flex-start; }
  }

  :focus-visible{ outline:2px solid var(--teal); outline-offset:2px; }
  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
</style>
</head>
<body>

<!-- ===================== LOCK SCREEN ===================== -->
<div id="lockScreen">
  <div class="brand-mark">
    <div class="name">Vault <em>Manager</em></div>
  </div>

  <div class="vault-dial" id="vaultDial">
    <svg viewBox="0 0 100 100">
      <circle class="ring" cx="50" cy="50" r="44"></circle>
      <g class="tick" stroke-linecap="round">
        <line x1="50" y1="8" x2="50" y2="14"></line>
        <line x1="50" y1="86" x2="50" y2="92"></line>
        <line x1="8" y1="50" x2="14" y2="50"></line>
        <line x1="86" y1="50" x2="92" y2="50"></line>
        <line x1="21" y1="21" x2="25.5" y2="25.5"></line>
        <line x1="79" y1="21" x2="74.5" y2="25.5"></line>
        <line x1="21" y1="79" x2="25.5" y2="74.5"></line>
        <line x1="79" y1="79" x2="74.5" y2="74.5"></line>
      </g>
      <circle class="knob" cx="50" cy="50" r="30"></circle>
      <polygon class="pointer" points="50,22 54,30 46,30"></polygon>
      <circle class="core" cx="50" cy="50" r="17"></circle>
      <g class="lockicon" transform="translate(50,51)">
        <rect x="-7" y="-2" width="14" height="11" rx="2"></rect>
        <path d="M -4.5 -2 L -4.5 -6 A 4.5 4.5 0 0 1 4.5 -6 L 4.5 -2"></path>
      </g>
    </svg>
  </div>

  <div class="lock-card">
    <div class="tab-switch" id="lockTabSwitch">
      <button type="button" data-tab="new" class="active">New vault</button>
      <button type="button" data-tab="open">Open file</button>
    </div>

    <form class="lock-form active" id="newVaultForm">
      <div class="field">
        <label for="newMasterPw">Set a master password</label>
        <input type="password" id="newMasterPw" placeholder="Make it long and memorable" required autocomplete="new-password">
      </div>
      <div class="field">
        <label for="newMasterPwConfirm">Confirm master password</label>
        <input type="password" id="newMasterPwConfirm" placeholder="Re-enter it" required autocomplete="new-password">
      </div>
      <button type="submit" class="primary-btn">Create vault</button>
      <div class="lock-status" id="newVaultStatus"></div>
    </form>

    <form class="lock-form" id="openVaultForm">
      <div class="field">
        <label>Vault file</label>
        <div class="file-drop" id="fileDrop">
          <span id="fileDropLabel">Choose an exported vault file (.json)</span>
          <input type="file" id="vaultFileInput" accept="application/json">
        </div>
      </div>
      <div class="field">
        <label for="openMasterPw">Master password</label>
        <input type="password" id="openMasterPw" placeholder="Enter your master password" required autocomplete="current-password">
      </div>
      <button type="submit" class="primary-btn">Unlock vault</button>
      <div class="lock-status" id="openVaultStatus"></div>
    </form>

    <div class="lock-note">
      Encrypted locally with AES-256-GCM; the key is derived from your master password via PBKDF2 (100,000 iterations). Nothing is sent anywhere — losing the master password means the data can't be recovered.
    </div>
  </div>
</div>

<!-- ===================== VAULT APP ===================== -->
<div id="vaultApp">
  <div class="app-shell">
    <header class="app-head">
      <div class="brand-mark">
        <div class="name">Vault <em>Manager</em></div>
      </div>
      <div class="head-actions">
        <button type="button" id="exportBtn">Export vault</button>
        <button type="button" class="lock-action" id="lockBtn">Lock</button>
      </div>
    </header>

    <div class="section-switch" id="sectionSwitch">
      <button type="button" data-section="entries" class="active">Vault</button>
      <button type="button" data-section="generator">Generator</button>
    </div>

    <!-- ---- ENTRIES SECTION ---- -->
    <div class="section active" id="section-entries">
      <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Search by site or username…">
        <button type="button" id="addEntryBtn">+ Add entry</button>
      </div>

      <div class="entry-form" id="entryForm">
        <div class="form-title" id="formTitle">Add entry</div>
        <div class="form-row2">
          <div class="field"><label for="ef-site">Site or app</label><input type="text" id="ef-site" placeholder="e.g. github.com"></div>
          <div class="field"><label for="ef-username">Username or email</label><input type="text" id="ef-username" placeholder="e.g. jane@example.com"></div>
        </div>
        <div class="field">
          <label for="ef-password">Password</label>
          <div class="pw-input-row">
            <input type="text" id="ef-password" placeholder="Enter or generate a password">
            <button type="button" id="ef-generateBtn">Generate</button>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="ef-strengthFill"></div></div>
          <div class="strength-label" id="ef-strengthLabel"></div>
        </div>
        <div class="field">
          <label for="ef-notes">Notes (optional)</label>
          <textarea id="ef-notes" placeholder="Recovery codes, security questions, anything else"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="save-btn" id="ef-saveBtn">Save entry</button>
          <button type="button" class="cancel-btn" id="ef-cancelBtn">Cancel</button>
        </div>
      </div>

      <div id="entriesList"></div>
    </div>

    <!-- ---- GENERATOR SECTION ---- -->
    <div class="section" id="section-generator">
      <div class="generator-panel">
        <div class="gen-output" id="genOutput">—</div>
        <div class="strength-bar"><div class="strength-fill" id="gen-strengthFill"></div></div>
        <div class="strength-label" id="gen-strengthLabel" style="margin-bottom:18px;"></div>
        <div class="gen-actions">
          <button type="button" class="regen-btn" id="genRegenBtn">Generate new</button>
          <button type="button" class="copy-btn" id="genCopyBtn">Copy</button>
          <button type="button" class="use-btn" id="genUseBtn">Use for new entry</button>
        </div>

        <div class="gen-options">
          <div class="field">
            <label>Length</label>
            <div class="slider-row">
              <input type="range" id="genLength" min="8" max="48" value="18">
              <span class="sval" id="genLengthVal">18</span>
            </div>
          </div>
          <div class="field">
            <label>Character types</label>
            <div class="check-grid">
              <label class="check-row"><input type="checkbox" id="genLower" checked> Lowercase (a-z)</label>
              <label class="check-row"><input type="checkbox" id="genUpper" checked> Uppercase (A-Z)</label>
              <label class="check-row"><input type="checkbox" id="genNumbers" checked> Numbers (0-9)</label>
              <label class="check-row"><input type="checkbox" id="genSymbols" checked> Symbols (!@#$…)</label>
            </div>
          </div>
          <label class="check-row"><input type="checkbox" id="genExcludeAmbiguous"> Exclude ambiguous characters (l, 1, O, 0)</label>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const el = id => document.getElementById(id);

  /* ============ CRYPTO HELPERS ============ */
  function bufToB64(buf){
    let bytes = buf instanceof ArrayBuffer ? new Uint8Array(buf) : buf;
    let binary = '';
    bytes.forEach(b => binary += String.fromCharCode(b));
    return btoa(binary);
  }
  function b64ToBuf(b64){
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
    return bytes;
  }
  async function deriveKey(password, saltBytes){
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), { name:'PBKDF2' }, false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name:'PBKDF2', salt: saltBytes, iterations: 100000, hash:'SHA-256' },
      keyMaterial,
      { name:'AES-GCM', length:256 },
      false,
      ['encrypt','decrypt']
    );
  }
  async function encryptJson(key, obj){
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const enc = new TextEncoder();
    const cipher = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc.encode(JSON.stringify(obj)));
    return { iv: bufToB64(iv), data: bufToB64(cipher) };
  }
  async function decryptJson(key, ivB64, dataB64){
    const iv = b64ToBuf(ivB64);
    const data = b64ToBuf(dataB64);
    const plain = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, data);
    return JSON.parse(new TextDecoder().decode(plain));
  }

  /* ============ STATE (in-memory only) ============ */
  let vaultKey = null;      // CryptoKey, held only while unlocked
  let vaultSalt = null;     // Uint8Array, needed to re-export
  let entries = [];         // plaintext while unlocked, in memory only
  let editingId = null;

  function newId(){ return 'e-' + Math.random().toString(36).slice(2, 10); }

  /* ============ STRENGTH ESTIMATE ============ */
  function scoreStrength(pw){
    if(!pw) return 0;
    const lengthScore = Math.min(pw.length / 20, 1) * 45;
    let variety = 0;
    if(/[a-z]/.test(pw)) variety++;
    if(/[A-Z]/.test(pw)) variety++;
    if(/[0-9]/.test(pw)) variety++;
    if(/[^a-zA-Z0-9]/.test(pw)) variety++;
    const varietyScore = (variety/4) * 35;
    const uniqueRatio = new Set(pw.split('')).size / pw.length;
    const uniqueScore = uniqueRatio * 20;
    return Math.round(lengthScore + varietyScore + uniqueScore);
  }
  function strengthInfo(score){
    if(score < 40) return { label:'Weak', color:'var(--weak)', pct: Math.max(score,8) };
    if(score < 70) return { label:'Fair', color:'var(--medium)', pct: score };
    return { label:'Strong', color:'var(--strong)', pct: score };
  }
  function applyStrength(pw, fillEl, labelEl){
    const info = strengthInfo(scoreStrength(pw));
    fillEl.style.width = pw ? info.pct + '%' : '0%';
    fillEl.style.background = info.color;
    labelEl.textContent = pw ? info.label : '';
  }

  /* ============ PASSWORD GENERATOR ============ */
  function generatePassword(opts){
    const amb = 'il1LoO0';
    let charset = '';
    if(opts.lower) charset += 'abcdefghijklmnopqrstuvwxyz';
    if(opts.upper) charset += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    if(opts.numbers) charset += '0123456789';
    if(opts.symbols) charset += '!@#$%^&*()-_=+[]{}<>?';
    if(opts.excludeAmbiguous) charset = charset.split('').filter(c => !amb.includes(c)).join('');
    if(!charset) charset = 'abcdefghijklmnopqrstuvwxyz';
    const randArr = new Uint32Array(opts.length);
    crypto.getRandomValues(randArr);
    let pw = '';
    for(let i=0;i<opts.length;i++) pw += charset[randArr[i] % charset.length];
    return pw;
  }

  function currentGenOptions(){
    return {
      length: parseInt(el('genLength').value, 10),
      lower: el('genLower').checked,
      upper: el('genUpper').checked,
      numbers: el('genNumbers').checked,
      symbols: el('genSymbols').checked,
      excludeAmbiguous: el('genExcludeAmbiguous').checked
    };
  }

  function regenerateGenOutput(){
    const pw = generatePassword(currentGenOptions());
    el('genOutput').textContent = pw;
    applyStrength(pw, el('gen-strengthFill'), el('gen-strengthLabel'));
  }

  el('genLength').addEventListener('input', () => {
    el('genLengthVal').textContent = el('genLength').value;
    regenerateGenOutput();
  });
  ['genLower','genUpper','genNumbers','genSymbols','genExcludeAmbiguous'].forEach(id => {
    el(id).addEventListener('change', regenerateGenOutput);
  });
  el('genRegenBtn').addEventListener('click', regenerateGenOutput);
  el('genCopyBtn').addEventListener('click', () => copyText(el('genOutput').textContent, el('genCopyBtn')));
  el('genUseBtn').addEventListener('click', () => {
    openEntryForm(null);
    el('ef-password').value = el('genOutput').textContent;
    applyStrength(el('ef-password').value, el('ef-strengthFill'), el('ef-strengthLabel'));
    switchSection('entries');
  });

  function copyText(text, btn){
    if(!text || text === '—') return;
    navigator.clipboard.writeText(text).then(() => {
      const original = btn.textContent;
      btn.textContent = 'Copied';
      setTimeout(() => btn.textContent = original, 1100);
    });
  }

  /* ============ LOCK SCREEN TABS ============ */
  el('lockTabSwitch').querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      el('lockTabSwitch').querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.lock-form').forEach(f => f.classList.remove('active'));
      el(btn.dataset.tab === 'new' ? 'newVaultForm' : 'openVaultForm').classList.add('active');
    });
  });

  let selectedFile = null;
  el('vaultFileInput').addEventListener('change', (e) => {
    selectedFile = e.target.files[0] || null;
    el('fileDropLabel').textContent = selectedFile ? selectedFile.name : 'Choose an exported vault file (.json)';
    el('fileDrop').classList.toggle('has-file', !!selectedFile);
  });

  /* ============ CREATE NEW VAULT ============ */
  el('newVaultForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pw = el('newMasterPw').value;
    const confirmPw = el('newMasterPwConfirm').value;
    const status = el('newVaultStatus');
    status.className = 'lock-status';

    if(pw.length < 8){
      status.textContent = 'Use at least 8 characters for your master password.';
      status.classList.add('err');
      return;
    }
    if(pw !== confirmPw){
      status.textContent = "Passwords don't match.";
      status.classList.add('err');
      return;
    }

    vaultSalt = crypto.getRandomValues(new Uint8Array(16));
    vaultKey = await deriveKey(pw, vaultSalt);
    entries = [];
    status.textContent = 'Vault created.';
    status.classList.add('ok');
    unlockApp();
  });

  /* ============ OPEN EXISTING VAULT FILE ============ */
  el('openVaultForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const status = el('openVaultStatus');
    status.className = 'lock-status';

    if(!selectedFile){
      status.textContent = 'Choose a vault file first.';
      status.classList.add('err');
      return;
    }
    const pw = el('openMasterPw').value;

    try{
      const text = await selectedFile.text();
      const parsed = JSON.parse(text);
      const salt = b64ToBuf(parsed.salt);
      const key = await deriveKey(pw, salt);
      const decrypted = await decryptJson(key, parsed.iv, parsed.data);

      vaultSalt = salt;
      vaultKey = key;
      entries = decrypted.entries || [];
      status.textContent = 'Vault unlocked.';
      status.classList.add('ok');
      unlockApp();
    } catch(err){
      status.textContent = 'Could not unlock — check the file and master password.';
      status.classList.add('err');
    }
  });

  function unlockApp(){
    const dial = el('vaultDial');
    dial.classList.add('spin');
    const lockScreen = el('lockScreen');
    setTimeout(() => {
      lockScreen.classList.add('unlocking');
      setTimeout(() => {
        lockScreen.style.display = 'none';
        el('vaultApp').classList.add('active');
        renderEntries();
      }, 500);
    }, 350);
  }

  /* ============ LOCK / EXPORT ============ */
  el('lockBtn').addEventListener('click', () => {
    if(!confirm('Lock the vault? Anything unsaved in the entry form will be lost.')) return;
    vaultKey = null;
    vaultSalt = null;
    entries = [];
    el('vaultApp').classList.remove('active');
    const lockScreen = el('lockScreen');
    lockScreen.style.display = 'flex';
    lockScreen.classList.remove('unlocking');
    el('vaultDial').classList.remove('spin');
    el('newMasterPw').value = '';
    el('newMasterPwConfirm').value = '';
    el('openMasterPw').value = '';
    el('newVaultStatus').textContent = '';
    el('openVaultStatus').textContent = '';
  });

  el('exportBtn').addEventListener('click', async () => {
    if(!vaultKey || !vaultSalt) return;
    const { iv, data } = await encryptJson(vaultKey, { entries });
    const payload = { version: 1, salt: bufToB64(vaultSalt), iv, data };
    const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'vault-export.json';
    a.click();
    URL.revokeObjectURL(url);
  });

  /* ============ SECTION SWITCH ============ */
  function switchSection(name){
    el('sectionSwitch').querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.section === name));
    document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'section-' + name));
  }
  el('sectionSwitch').querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => switchSection(btn.dataset.section));
  });

  /* ============ ENTRY FORM ============ */
  function openEntryForm(id){
    editingId = id;
    const form = el('entryForm');
    form.classList.add('active');
    if(id){
      const entry = entries.find(e => e.id === id);
      el('formTitle').textContent = 'Edit entry';
      el('ef-site').value = entry.site;
      el('ef-username').value = entry.username;
      el('ef-password').value = entry.password;
      el('ef-notes').value = entry.notes || '';
      applyStrength(entry.password, el('ef-strengthFill'), el('ef-strengthLabel'));
    } else {
      el('formTitle').textContent = 'Add entry';
      el('ef-site').value = '';
      el('ef-username').value = '';
      el('ef-password').value = '';
      el('ef-notes').value = '';
      applyStrength('', el('ef-strengthFill'), el('ef-strengthLabel'));
    }
    el('ef-site').focus();
  }
  function closeEntryForm(){
    el('entryForm').classList.remove('active');
    editingId = null;
  }

  el('addEntryBtn').addEventListener('click', () => openEntryForm(null));
  el('ef-cancelBtn').addEventListener('click', closeEntryForm);
  el('ef-password').addEventListener('input', () => applyStrength(el('ef-password').value, el('ef-strengthFill'), el('ef-strengthLabel')));
  el('ef-generateBtn').addEventListener('click', () => {
    const pw = generatePassword(currentGenOptions());
    el('ef-password').value = pw;
    applyStrength(pw, el('ef-strengthFill'), el('ef-strengthLabel'));
  });

  el('ef-saveBtn').addEventListener('click', () => {
    const site = el('ef-site').value.trim();
    const username = el('ef-username').value.trim();
    const password = el('ef-password').value;
    const notes = el('ef-notes').value.trim();
    if(!site || !password){
      alert('A site name and a password are required.');
      return;
    }
    if(editingId){
      const entry = entries.find(e => e.id === editingId);
      Object.assign(entry, { site, username, password, notes });
    } else {
      entries.unshift({ id: newId(), site, username, password, notes });
    }
    closeEntryForm();
    renderEntries();
  });

  /* ============ ENTRIES LIST ============ */
  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str ?? '';
    return div.innerHTML;
  }

  function renderEntries(){
    const q = el('searchInput').value.trim().toLowerCase();
    const list = entries.filter(e => !q || e.site.toLowerCase().includes(q) || e.username.toLowerCase().includes(q));
    const container = el('entriesList');

    if(entries.length === 0){
      container.innerHTML = `<div class="empty-state"><strong>Your vault is empty</strong>Add your first entry, or generate a password from the Generator tab.</div>`;
      return;
    }
    if(list.length === 0){
      container.innerHTML = `<div class="empty-state"><strong>No matches</strong>Try a different search term.</div>`;
      return;
    }

    container.innerHTML = list.map(entry => {
      const info = strengthInfo(scoreStrength(entry.password));
      return `
      <div class="entry-card" data-id="${entry.id}">
        <div class="entry-top">
          <div>
            <div class="entry-site">${escapeHtml(entry.site)}</div>
            <div class="entry-username">${escapeHtml(entry.username) || 'No username set'}</div>
          </div>
          <div class="entry-actions">
            <button type="button" class="edit-btn">Edit</button>
            <button type="button" class="danger delete-btn">Delete</button>
          </div>
        </div>
        <div class="entry-pw-row">
          <span class="pw-text" data-revealed="false">••••••••••••</span>
          <button type="button" class="reveal-btn">Show</button>
          <button type="button" class="copy-pw-btn">Copy</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" style="width:${info.pct}%; background:${info.color};"></div></div>
        <div class="strength-label">${info.label}</div>
        ${entry.notes ? `<div class="entry-notes">${escapeHtml(entry.notes)}</div>` : ''}
      </div>`;
    }).join('');

    container.querySelectorAll('.entry-card').forEach(card => {
      const id = card.dataset.id;
      const entry = entries.find(e => e.id === id);

      card.querySelector('.edit-btn').addEventListener('click', () => openEntryForm(id));
      card.querySelector('.delete-btn').addEventListener('click', () => {
        if(confirm(`Delete the entry for "${entry.site}"? This can't be undone.`)){
          entries = entries.filter(e => e.id !== id);
          renderEntries();
        }
      });

      const pwText = card.querySelector('.pw-text');
      const revealBtn = card.querySelector('.reveal-btn');
      revealBtn.addEventListener('click', () => {
        const revealed = pwText.dataset.revealed === 'true';
        pwText.dataset.revealed = String(!revealed);
        pwText.textContent = revealed ? '••••••••••••' : entry.password;
        revealBtn.textContent = revealed ? 'Show' : 'Hide';
      });

      card.querySelector('.copy-pw-btn').addEventListener('click', (e) => copyText(entry.password, e.target));
    });
  }

  el('searchInput').addEventListener('input', renderEntries);

  /* init */
  el('genLengthVal').textContent = el('genLength').value;
  regenerateGenOutput();
</script>
</body>
</html>

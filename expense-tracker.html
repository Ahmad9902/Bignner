<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger — Expense Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#161a20;
    --ink-soft:#232833;
    --ink-line:#333a47;
    --canvas:#eef1ee;
    --card:#ffffff;
    --line:#d9ddd4;
    --line-soft:#e6e9e1;
    --forest:#1f6f54;
    --forest-soft:#e4efe9;
    --rust:#a8431b;
    --rust-soft:#f3e6de;
    --gold:#a97f2e;
    --ink-text:#1b1e24;
    --muted:#767c74;
    --radius:2px;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  body{
    font-family:'Inter', sans-serif;
    background:var(--canvas);
    color:var(--ink-text);
    display:flex;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  ::selection{ background:var(--gold); color:#fff; }

  /* ===== SIDEBAR ===== */
  aside{
    width:300px;
    flex-shrink:0;
    background:var(--ink);
    color:#e7e9ec;
    padding:32px 26px;
    display:flex;
    flex-direction:column;
    gap:28px;
    position:sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
  }

  .brand{
    display:flex;
    flex-direction:column;
    gap:4px;
    padding-bottom:20px;
    border-bottom:1px solid var(--ink-line);
  }
  .brand .mark{
    font-family:'Fraunces', serif;
    font-size:28px;
    font-weight:600;
    letter-spacing:-0.02em;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .brand .mark span.dot{
    width:8px; height:8px; border-radius:50%;
    background:var(--gold);
    display:inline-block;
  }
  .brand .sub{
    font-size:12px;
    color:#9aa0ab;
    letter-spacing:0.06em;
    text-transform:uppercase;
  }

  form#entryForm{
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .form-title{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color:#9aa0ab;
    margin-bottom:2px;
  }

  .field{ display:flex; flex-direction:column; gap:6px; }
  .field label{
    font-size:12px;
    color:#aeb3bc;
  }
  .field input, .field select{
    background:var(--ink-soft);
    border:1px solid var(--ink-line);
    color:#e7e9ec;
    padding:10px 11px;
    border-radius:var(--radius);
    font-family:'Inter', sans-serif;
    font-size:14px;
    outline:none;
    transition:border-color .15s ease;
  }
  .field input::placeholder{ color:#6b7280; }
  .field input:focus, .field select:focus{
    border-color:var(--gold);
  }
  .field input[type="number"]{
    font-family:'Space Mono', monospace;
  }

  .type-toggle{
    display:flex;
    border:1px solid var(--ink-line);
    border-radius:var(--radius);
    overflow:hidden;
  }
  .type-toggle button{
    flex:1;
    padding:10px 0;
    background:var(--ink-soft);
    border:none;
    color:#9aa0ab;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    transition:all .15s ease;
    font-family:'Inter', sans-serif;
  }
  .type-toggle button.active[data-type="expense"]{
    background:var(--rust);
    color:#fff;
  }
  .type-toggle button.active[data-type="income"]{
    background:var(--forest);
    color:#fff;
  }

  button.submit-btn{
    margin-top:4px;
    padding:12px 0;
    background:var(--gold);
    color:#1b1206;
    border:none;
    border-radius:var(--radius);
    font-weight:700;
    font-size:13px;
    letter-spacing:0.03em;
    text-transform:uppercase;
    cursor:pointer;
    transition:filter .15s ease;
  }
  button.submit-btn:hover{ filter:brightness(1.08); }
  button.submit-btn:active{ filter:brightness(0.95); }

  .sidebar-footer{
    margin-top:auto;
    font-size:11px;
    color:#6b7280;
    line-height:1.6;
    border-top:1px solid var(--ink-line);
    padding-top:16px;
  }
  .sidebar-footer button{
    background:none;
    border:1px solid var(--ink-line);
    color:#aeb3bc;
    font-size:11px;
    padding:7px 10px;
    border-radius:var(--radius);
    cursor:pointer;
    margin-top:8px;
  }
  .sidebar-footer button:hover{ border-color:var(--gold); color:var(--gold); }

  /* ===== MAIN ===== */
  main{
    flex:1;
    padding:40px 48px 60px;
    max-width:1040px;
  }

  header.page-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-bottom:28px;
  }
  header.page-head h1{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:32px;
    letter-spacing:-0.01em;
  }
  header.page-head .date{
    font-family:'Space Mono', monospace;
    font-size:12px;
    color:var(--muted);
  }

  /* ---- Signature element: receipt tape balance ribbon ---- */
  .receipt{
    position:relative;
    background:var(--card);
    border:1px solid var(--line);
    padding:26px 34px 22px;
    margin-bottom:36px;
    box-shadow:0 1px 0 rgba(0,0,0,0.02);
  }
  .receipt::before, .receipt::after{
    content:"";
    position:absolute;
    left:0; right:0;
    height:10px;
    background-image: radial-gradient(circle at 10px 5px, var(--canvas) 5px, transparent 5.5px);
    background-size:20px 10px;
    background-repeat:repeat-x;
  }
  .receipt::before{ top:-6px; }
  .receipt::after{ bottom:-6px; transform:rotate(180deg); }

  .receipt-stamp{
    position:absolute;
    top:18px;
    right:30px;
    font-family:'Space Mono', monospace;
    font-size:10.5px;
    letter-spacing:0.08em;
    color:var(--gold);
    border:1px solid var(--gold);
    padding:4px 9px;
    border-radius:20px;
    transform:rotate(3deg);
    text-transform:uppercase;
  }

  .receipt-row{
    display:flex;
    gap:0;
    border-bottom:1px dashed var(--line-soft);
    padding-bottom:16px;
    margin-bottom:16px;
  }
  .receipt-cell{
    flex:1;
    padding-right:20px;
  }
  .receipt-cell + .receipt-cell{
    border-left:1px dashed var(--line-soft);
    padding-left:20px;
  }
  .receipt-cell .label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--muted);
    margin-bottom:8px;
  }
  .receipt-cell .value{
    font-family:'Space Mono', monospace;
    font-size:26px;
    font-weight:700;
    letter-spacing:-0.02em;
  }
  .receipt-cell.income .value{ color:var(--forest); }
  .receipt-cell.expense .value{ color:var(--rust); }
  .receipt-cell.balance .value{ color:var(--ink-text); }

  .receipt-foot{
    display:flex;
    justify-content:space-between;
    font-family:'Space Mono', monospace;
    font-size:11px;
    color:var(--muted);
  }

  /* ---- Category breakdown ---- */
  .section-title{
    font-family:'Fraunces', serif;
    font-size:18px;
    font-weight:500;
    margin-bottom:14px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .section-title .count{
    font-family:'Space Mono', monospace;
    font-size:11px;
    color:var(--muted);
    font-weight:400;
  }

  .breakdown{
    background:var(--card);
    border:1px solid var(--line);
    padding:22px 26px;
    margin-bottom:36px;
  }
  .bar-row{
    display:grid;
    grid-template-columns:120px 1fr 70px;
    align-items:center;
    gap:14px;
    padding:8px 0;
  }
  .bar-row .cat-name{
    font-size:13px;
    font-weight:600;
    color:var(--ink-text);
  }
  .bar-track{
    height:8px;
    background:var(--line-soft);
    border-radius:1px;
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    background:var(--gold);
    transition:width .4s ease;
  }
  .bar-row .bar-amt{
    font-family:'Space Mono', monospace;
    font-size:12px;
    text-align:right;
    color:var(--muted);
  }
  .breakdown .empty{
    font-size:13px;
    color:var(--muted);
    padding:10px 0;
  }

  /* ---- Filters ---- */
  .filters{
    display:flex;
    gap:12px;
    margin-bottom:16px;
    flex-wrap:wrap;
  }
  .filters input, .filters select{
    background:var(--card);
    border:1px solid var(--line);
    padding:9px 12px;
    font-size:13px;
    border-radius:var(--radius);
    font-family:'Inter', sans-serif;
    color:var(--ink-text);
    outline:none;
  }
  .filters input:focus, .filters select:focus{ border-color:var(--gold); }
  .filters input[type="text"]{ flex:1; min-width:180px; }

  /* ---- Ledger table ---- */
  .ledger{
    background:var(--card);
    border:1px solid var(--line);
  }
  .ledger-head{
    display:grid;
    grid-template-columns:100px 1fr 130px 120px 40px;
    padding:12px 22px;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--muted);
    border-bottom:1px solid var(--line);
  }
  .ledger-row{
    display:grid;
    grid-template-columns:100px 1fr 130px 120px 40px;
    padding:14px 22px;
    align-items:center;
    border-bottom:1px solid var(--line-soft);
    font-size:13.5px;
    transition:background .1s ease;
  }
  .ledger-row:last-child{ border-bottom:none; }
  .ledger-row:hover{ background:#faf9f6; }

  .ledger-row .txn-date{
    font-family:'Space Mono', monospace;
    font-size:12px;
    color:var(--muted);
  }
  .ledger-row .txn-desc{ font-weight:600; }
  .ledger-row .txn-cat{
    font-size:11px;
    display:inline-block;
    padding:3px 9px;
    border-radius:20px;
    background:var(--line-soft);
    color:var(--ink-text);
    width:fit-content;
  }
  .ledger-row .txn-amt{
    font-family:'Space Mono', monospace;
    font-weight:700;
    text-align:right;
    font-size:14px;
  }
  .ledger-row .txn-amt.income{ color:var(--forest); }
  .ledger-row .txn-amt.expense{ color:var(--rust); }

  .del-btn{
    background:none;
    border:none;
    color:var(--muted);
    font-size:16px;
    cursor:pointer;
    justify-self:end;
    line-height:1;
    padding:4px;
  }
  .del-btn:hover{ color:var(--rust); }

  .empty-state{
    padding:50px 20px;
    text-align:center;
    color:var(--muted);
    font-size:13.5px;
  }
  .empty-state strong{
    display:block;
    font-family:'Fraunces', serif;
    font-size:18px;
    color:var(--ink-text);
    margin-bottom:6px;
    font-weight:500;
  }

  @media (max-width: 860px){
    body{ flex-direction:column; }
    aside{ width:100%; height:auto; position:relative; }
    main{ padding:28px 20px 50px; }
    .receipt-row{ flex-direction:column; gap:14px; }
    .receipt-cell + .receipt-cell{ border-left:none; padding-left:0; border-top:1px dashed var(--line-soft); padding-top:12px; }
    .ledger-head{ display:none; }
    .ledger-row{
      grid-template-columns:1fr auto;
      grid-template-areas:
        "desc amt"
        "cat cat"
        "date del";
      row-gap:6px;
    }
    .ledger-row .txn-date{ grid-area:date; }
    .ledger-row .txn-desc{ grid-area:desc; }
    .ledger-row .txn-cat{ grid-area:cat; }
    .ledger-row .txn-amt{ grid-area:amt; }
    .del-btn{ grid-area:del; }
  }

  :focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }
</style>
</head>
<body>

<aside>
  <div class="brand">
    <div class="mark"><span class="dot"></span>Ledger</div>
    <div class="sub">Personal expense tracking</div>
  </div>

  <form id="entryForm">
    <div class="form-title">Add an entry</div>

    <div class="type-toggle" id="typeToggle">
      <button type="button" data-type="expense" class="active">Expense</button>
      <button type="button" data-type="income">Income</button>
    </div>

    <div class="field">
      <label for="desc">Description</label>
      <input type="text" id="desc" placeholder="e.g. Grocery run" required>
    </div>

    <div class="field">
      <label for="amount">Amount</label>
      <input type="number" id="amount" placeholder="0.00" step="0.01" min="0.01" required>
    </div>

    <div class="field">
      <label for="category">Category</label>
      <select id="category"></select>
    </div>

    <div class="field">
      <label for="date">Date</label>
      <input type="date" id="date" required>
    </div>

    <button type="submit" class="submit-btn">Record entry</button>
  </form>

  <div class="sidebar-footer">
    Entries live in this session only — nothing is sent anywhere.
    <div style="display:flex; gap:8px;">
      <button type="button" id="exportBtn">Export JSON</button>
      <button type="button" id="clearBtn">Clear all</button>
    </div>
  </div>
</aside>

<main>
  <header class="page-head">
    <h1>Overview</h1>
    <div class="date" id="todayLabel"></div>
  </header>

  <div class="receipt">
    <div class="receipt-stamp" id="rangeStamp">ALL TIME</div>
    <div class="receipt-row">
      <div class="receipt-cell income">
        <div class="label">Income</div>
        <div class="value" id="totalIncome">$0.00</div>
      </div>
      <div class="receipt-cell expense">
        <div class="label">Expenses</div>
        <div class="value" id="totalExpense">$0.00</div>
      </div>
      <div class="receipt-cell balance">
        <div class="label">Balance</div>
        <div class="value" id="totalBalance">$0.00</div>
      </div>
    </div>
    <div class="receipt-foot">
      <span id="entryCountLabel">0 entries</span>
      <span>Thank you for keeping the books.</span>
    </div>
  </div>

  <div class="breakdown">
    <div class="section-title">Where it's going <span class="count" id="catCountLabel"></span></div>
    <div id="breakdownBars"></div>
  </div>

  <div class="section-title">Ledger <span class="count" id="ledgerCountLabel"></span></div>
  <div class="filters">
    <input type="text" id="searchInput" placeholder="Search descriptions…">
    <select id="filterCategory"><option value="all">All categories</option></select>
    <select id="filterType">
      <option value="all">All types</option>
      <option value="income">Income only</option>
      <option value="expense">Expense only</option>
    </select>
    <select id="sortBy">
      <option value="date-desc">Newest first</option>
      <option value="date-asc">Oldest first</option>
      <option value="amount-desc">Highest amount</option>
      <option value="amount-asc">Lowest amount</option>
    </select>
  </div>

  <div class="ledger">
    <div class="ledger-head">
      <div>Date</div><div>Description</div><div>Category</div><div style="text-align:right">Amount</div><div></div>
    </div>
    <div id="ledgerBody"></div>
  </div>
</main>

<script>
  const CATEGORIES = {
    expense: ["Food", "Transport", "Housing", "Utilities", "Entertainment", "Shopping", "Health", "Other"],
    income: ["Salary", "Freelance", "Investment", "Gift", "Other"]
  };

  // Seed data so the ledger isn't empty on first load
  let transactions = [
    { id: cryptoId(), type: "income",  desc: "Monthly salary",        amount: 3200.00, category: "Salary",  date: isoDaysAgo(24) },
    { id: cryptoId(), type: "expense", desc: "Rent",                  amount: 1100.00, category: "Housing",  date: isoDaysAgo(23) },
    { id: cryptoId(), type: "expense", desc: "Grocery run",           amount: 86.40,   category: "Food",     date: isoDaysAgo(18) },
    { id: cryptoId(), type: "expense", desc: "Metro pass",            amount: 45.00,   category: "Transport",date: isoDaysAgo(16) },
    { id: cryptoId(), type: "expense", desc: "Electricity bill",      amount: 62.75,   category: "Utilities",date: isoDaysAgo(12) },
    { id: cryptoId(), type: "income",  desc: "Freelance project",     amount: 450.00,  category: "Freelance",date: isoDaysAgo(9) },
    { id: cryptoId(), type: "expense", desc: "Dinner out",            amount: 38.20,   category: "Food",     date: isoDaysAgo(6) },
    { id: cryptoId(), type: "expense", desc: "Movie night",           amount: 24.00,   category: "Entertainment", date: isoDaysAgo(3) },
    { id: cryptoId(), type: "expense", desc: "New headphones",        amount: 129.99,  category: "Shopping", date: isoDaysAgo(1) },
  ];

  function cryptoId(){ return 'id-' + Math.random().toString(36).slice(2, 10); }
  function isoDaysAgo(n){
    const d = new Date();
    d.setDate(d.getDate() - n);
    return d.toISOString().slice(0,10);
  }
  function fmtMoney(n){
    const sign = n < 0 ? "-" : "";
    return sign + "$" + Math.abs(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function fmtDate(iso){
    const d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString(undefined, { month: "short", day: "2-digit" });
  }

  // ---- DOM refs ----
  const form = document.getElementById('entryForm');
  const typeToggle = document.getElementById('typeToggle');
  const categorySelect = document.getElementById('category');
  const dateInput = document.getElementById('date');
  const filterCategory = document.getElementById('filterCategory');
  const filterType = document.getElementById('filterType');
  const searchInput = document.getElementById('searchInput');
  const sortBy = document.getElementById('sortBy');
  const ledgerBody = document.getElementById('ledgerBody');
  const breakdownBars = document.getElementById('breakdownBars');

  let currentType = "expense";
  dateInput.value = isoDaysAgo(0);
  document.getElementById('todayLabel').textContent = new Date().toLocaleDateString(undefined, { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  function populateCategorySelect(){
    categorySelect.innerHTML = CATEGORIES[currentType].map(c => `<option value="${c}">${c}</option>`).join('');
  }

  function populateFilterCategories(){
    const all = [...new Set(transactions.map(t => t.category))].sort();
    filterCategory.innerHTML = '<option value="all">All categories</option>' + all.map(c => `<option value="${c}">${c}</option>`).join('');
  }

  typeToggle.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      typeToggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentType = btn.dataset.type;
      populateCategorySelect();
    });
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const desc = document.getElementById('desc').value.trim();
    const amount = parseFloat(document.getElementById('amount').value);
    const category = categorySelect.value;
    const date = dateInput.value;
    if(!desc || !amount || amount <= 0 || !date) return;

    transactions.unshift({ id: cryptoId(), type: currentType, desc, amount, category, date });
    form.reset();
    dateInput.value = isoDaysAgo(0);
    populateFilterCategories();
    render();
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    if(confirm('Clear every entry? This cannot be undone.')){
      transactions = [];
      populateFilterCategories();
      render();
    }
  });

  document.getElementById('exportBtn').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(transactions, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'ledger-export.json';
    a.click();
    URL.revokeObjectURL(url);
  });

  [searchInput, filterCategory, filterType, sortBy].forEach(el => {
    el.addEventListener('input', render);
    el.addEventListener('change', render);
  });

  function deleteEntry(id){
    transactions = transactions.filter(t => t.id !== id);
    populateFilterCategories();
    render();
  }

  function getFiltered(){
    let list = [...transactions];
    const q = searchInput.value.trim().toLowerCase();
    if(q) list = list.filter(t => t.desc.toLowerCase().includes(q));
    if(filterCategory.value !== 'all') list = list.filter(t => t.category === filterCategory.value);
    if(filterType.value !== 'all') list = list.filter(t => t.type === filterType.value);

    switch(sortBy.value){
      case 'date-desc': list.sort((a,b) => b.date.localeCompare(a.date)); break;
      case 'date-asc': list.sort((a,b) => a.date.localeCompare(b.date)); break;
      case 'amount-desc': list.sort((a,b) => b.amount - a.amount); break;
      case 'amount-asc': list.sort((a,b) => a.amount - b.amount); break;
    }
    return list;
  }

  function render(){
    // Totals (over ALL transactions, not filtered — reflects true balance)
    const income = transactions.filter(t => t.type === 'income').reduce((s,t) => s + t.amount, 0);
    const expense = transactions.filter(t => t.type === 'expense').reduce((s,t) => s + t.amount, 0);
    document.getElementById('totalIncome').textContent = fmtMoney(income);
    document.getElementById('totalExpense').textContent = fmtMoney(expense);
    document.getElementById('totalBalance').textContent = fmtMoney(income - expense);
    document.getElementById('entryCountLabel').textContent = `${transactions.length} entr${transactions.length === 1 ? 'y' : 'ies'}`;

    // Category breakdown (expenses only)
    const catTotals = {};
    transactions.filter(t => t.type === 'expense').forEach(t => {
      catTotals[t.category] = (catTotals[t.category] || 0) + t.amount;
    });
    const catEntries = Object.entries(catTotals).sort((a,b) => b[1]-a[1]);
    document.getElementById('catCountLabel').textContent = catEntries.length ? `${catEntries.length} categories` : '';

    if(catEntries.length === 0){
      breakdownBars.innerHTML = `<div class="empty">No expenses recorded yet — add one to see the breakdown.</div>`;
    } else {
      const max = catEntries[0][1];
      breakdownBars.innerHTML = catEntries.map(([cat, amt]) => `
        <div class="bar-row">
          <div class="cat-name">${cat}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(amt/max*100).toFixed(1)}%"></div></div>
          <div class="bar-amt">${fmtMoney(amt)}</div>
        </div>
      `).join('');
    }

    // Ledger
    const filtered = getFiltered();
    document.getElementById('ledgerCountLabel').textContent = `${filtered.length} shown`;

    if(filtered.length === 0){
      ledgerBody.innerHTML = `<div class="empty-state"><strong>Nothing here</strong>Try clearing your filters, or record your first entry from the sidebar.</div>`;
    } else {
      ledgerBody.innerHTML = filtered.map(t => `
        <div class="ledger-row">
          <div class="txn-date">${fmtDate(t.date)}</div>
          <div class="txn-desc">${escapeHtml(t.desc)}</div>
          <div><span class="txn-cat">${t.category}</span></div>
          <div class="txn-amt ${t.type}">${t.type === 'expense' ? '-' : '+'}${fmtMoney(t.amount)}</div>
          <button class="del-btn" title="Delete entry" data-id="${t.id}">×</button>
        </div>
      `).join('');

      ledgerBody.querySelectorAll('.del-btn').forEach(btn => {
        btn.addEventListener('click', () => deleteEntry(btn.dataset.id));
      });
    }
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  populateCategorySelect();
  populateFilterCategories();
  render();
</script>
</body>
</html>

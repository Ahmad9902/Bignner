<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Builder — The Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --office:#1c1a18;
    --office-panel:#252220;
    --office-raised:#2f2b28;
    --office-line:#3d3834;
    --wall:#e2dccd;
    --wall-shadow:#cfc7b0;
    --frame:#2a2724;
    --accent:#2f6a59;
    --ink:#211f1c;
    --ink-dim:#6b6455;
    --text:#e8e4da;
    --text-dim:#a49d8e;
    --radius:5px;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    font-family:'Inter', sans-serif;
    background:var(--office);
    color:var(--text);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{ background:var(--accent); color:#fff; }

  .app{
    display:grid;
    grid-template-columns:380px 1fr;
    min-height:100vh;
  }

  /* ===== EDITOR (curator's office) ===== */
  .editor{
    background:var(--office-panel);
    border-right:1px solid var(--office-line);
    padding:26px 24px 60px;
    overflow-y:auto;
    height:100vh;
    position:sticky;
    top:0;
  }
  .editor .brand{
    display:flex;
    align-items:center;
    gap:9px;
    margin-bottom:24px;
  }
  .editor .brand .mark{
    width:8px; height:24px;
    background:var(--accent-mark, var(--accent));
    border-radius:1px;
  }
  .editor .brand .name{
    font-family:'Inter', sans-serif;
    font-weight:700;
    font-size:16.5px;
    color:var(--text);
  }

  .group{ margin-bottom:22px; }
  .group-title{
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.09em;
    color:var(--text-dim);
    font-weight:600;
    margin-bottom:12px;
    padding-bottom:8px;
    border-bottom:1px solid var(--office-line);
  }

  .field{ margin-bottom:12px; }
  .field label{
    display:block;
    font-size:11.5px;
    color:var(--text-dim);
    margin-bottom:5px;
  }
  .field input[type="text"], .field input[type="email"], .field input[type="url"], .field textarea{
    width:100%;
    background:var(--office-raised);
    border:1px solid var(--office-line);
    color:var(--text);
    padding:9px 11px;
    border-radius:var(--radius);
    font-size:13px;
    outline:none;
    font-family:'Inter', sans-serif;
  }
  .field textarea{ min-height:70px; resize:vertical; }
  .field input:focus, .field textarea:focus{ border-color:var(--accent); }

  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }

  .color-row{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--office-raised);
    border:1px solid var(--office-line);
    border-radius:var(--radius);
    padding:8px 11px;
  }
  .color-row input[type="color"]{
    width:30px; height:30px;
    border:none;
    background:none;
    cursor:pointer;
    padding:0;
  }
  .color-row span{ font-size:12px; color:var(--text-dim); }

  .img-input-row{ display:flex; gap:8px; }
  .img-input-row input{ flex:1; }
  .upload-btn{
    flex-shrink:0;
    position:relative;
    padding:0 12px;
    background:var(--office-raised);
    border:1px solid var(--office-line);
    border-radius:var(--radius);
    color:var(--text-dim);
    font-size:11.5px;
    cursor:pointer;
    display:flex;
    align-items:center;
  }
  .upload-btn:hover{ border-color:var(--accent); color:var(--accent); }
  .upload-btn input[type="file"]{ position:absolute; inset:0; opacity:0; cursor:pointer; }

  .project-block{
    border:1px solid var(--office-line);
    border-radius:6px;
    padding:14px;
    margin-bottom:12px;
    position:relative;
  }
  .project-block .pb-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
  }
  .project-block .pb-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    color:var(--text-dim);
  }
  .pb-controls{ display:flex; gap:4px; }
  .pb-controls button{
    width:22px; height:22px;
    border-radius:4px;
    background:var(--office-raised);
    border:1px solid var(--office-line);
    color:var(--text-dim);
    font-size:12px;
    cursor:pointer;
  }
  .pb-controls button:hover{ border-color:var(--accent); color:var(--accent); }
  .pb-controls button.remove-proj:hover{ border-color:#c0574a; color:#c0574a; }

  .add-project-btn{
    width:100%;
    padding:10px;
    border:1px dashed var(--office-line);
    background:none;
    border-radius:var(--radius);
    color:var(--text-dim);
    font-size:12.5px;
    cursor:pointer;
  }
  .add-project-btn:hover{ border-color:var(--accent); color:var(--accent); }

  .skills-hint{
    font-size:11px;
    color:var(--text-dim);
    margin-top:4px;
  }

  .export-btn{
    width:100%;
    padding:13px 0;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:var(--radius);
    font-weight:700;
    font-size:13.5px;
    cursor:pointer;
    margin-top:22px;
  }
  .export-btn:hover{ filter:brightness(1.1); }

  /* ===== PREVIEW: GALLERY WALL ===== */
  .preview-wrap{
    background:var(--office);
    padding:40px;
    overflow-y:auto;
  }
  .gallery-wall{
    background:var(--wall);
    border-radius:4px;
    box-shadow:0 20px 60px rgba(0,0,0,0.45);
    max-width:880px;
    margin:0 auto;
    padding:0 0 60px;
    position:relative;
    overflow:hidden;
  }

  .hero-exhibit{
    padding:70px 60px 50px;
    text-align:center;
    position:relative;
  }
  .hero-exhibit::before{
    content:"";
    position:absolute;
    top:0; left:50%;
    transform:translateX(-50%);
    width:340px; height:220px;
    background:radial-gradient(ellipse at center, rgba(255,244,214,0.55), transparent 70%);
    pointer-events:none;
  }
  .hero-photo{
    width:120px; height:120px;
    border-radius:50%;
    object-fit:cover;
    margin:0 auto 22px;
    display:block;
    border:4px solid #fff;
    box-shadow:0 6px 18px rgba(0,0,0,0.25);
    position:relative;
    z-index:1;
  }
  .hero-photo.placeholder{
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--wall-shadow);
    color:var(--ink-dim);
    font-family:'Bodoni Moda', serif;
    font-size:34px;
  }
  .hero-name{
    font-family:'Bodoni Moda', serif;
    font-weight:600;
    font-size:42px;
    color:var(--ink);
    position:relative; z-index:1;
    letter-spacing:-0.01em;
  }
  .hero-title{
    font-size:14px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--accent-live, var(--accent));
    font-weight:600;
    margin-top:8px;
    position:relative; z-index:1;
  }
  .hero-tagline{
    font-size:15px;
    color:var(--ink-dim);
    max-width:440px;
    margin:16px auto 0;
    line-height:1.6;
    position:relative; z-index:1;
  }

  .exhibit-section{
    padding:0 60px 40px;
  }
  .section-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.12em;
    color:var(--ink-dim);
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:20px;
  }
  .section-label::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--wall-shadow);
  }

  .about-text{
    font-size:14.5px;
    line-height:1.8;
    color:var(--ink);
    max-width:640px;
  }

  /* signature: framed project + museum placard */
  .exhibit-grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:28px 24px;
  }
  .exhibit-piece{ position:relative; }
  .frame{
    background:var(--frame);
    padding:10px;
    border-radius:2px;
    box-shadow:0 10px 24px rgba(0,0,0,0.28);
    position:relative;
  }
  .frame::before{
    content:"";
    position:absolute;
    top:-24px; left:50%;
    transform:translateX(-50%);
    width:70%; height:36px;
    background:radial-gradient(ellipse at center top, rgba(255,244,214,0.5), transparent 75%);
    pointer-events:none;
  }
  .frame img{
    width:100%;
    height:170px;
    object-fit:cover;
    display:block;
    background:#d8d2c2;
  }
  .frame .frame-placeholder{
    width:100%; height:170px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#d8d2c2;
    color:var(--ink-dim);
    font-family:'Bodoni Moda', serif;
    font-size:14px;
  }

  .placard{
    background:#fdfbf5;
    border:1px solid var(--wall-shadow);
    border-top:none;
    padding:12px 14px 13px;
    margin-top:-2px;
  }
  .placard .p-title{
    font-family:'Bodoni Moda', serif;
    font-weight:600;
    font-size:16px;
    color:var(--ink);
    margin-bottom:3px;
  }
  .placard .p-meta{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    color:var(--accent-live, var(--accent));
    text-transform:uppercase;
    letter-spacing:0.05em;
    margin-bottom:8px;
  }
  .placard .p-desc{
    font-size:12.5px;
    color:var(--ink-dim);
    line-height:1.6;
    margin-bottom:8px;
  }
  .placard .p-link{
    font-size:11.5px;
    color:var(--accent-live, var(--accent));
    text-decoration:none;
    font-weight:600;
  }
  .placard .p-link:hover{ text-decoration:underline; }

  .skills-directory{
    display:flex;
    flex-wrap:wrap;
    gap:9px;
  }
  .skill-tag{
    padding:7px 13px;
    background:#fdfbf5;
    border:1px solid var(--wall-shadow);
    border-radius:20px;
    font-size:12px;
    color:var(--ink);
  }

  .contact-plaque{
    background:var(--frame);
    color:#f2ede0;
    padding:30px 60px;
    text-align:center;
    margin-top:20px;
  }
  .contact-plaque .c-title{
    font-family:'Bodoni Moda', serif;
    font-size:20px;
    margin-bottom:10px;
  }
  .contact-plaque .c-links{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    font-size:13px;
  }
  .contact-plaque .c-links a{
    color:#f2ede0;
    text-decoration:none;
    border-bottom:1px solid rgba(242,237,224,0.4);
    padding-bottom:2px;
  }
  .contact-plaque .c-links a:hover{ border-color:#f2ede0; }

  @media (max-width: 980px){
    .app{ grid-template-columns:1fr; }
    .editor{ height:auto; position:relative; }
    .preview-wrap{ padding:20px; }
    .hero-exhibit, .exhibit-section{ padding-left:24px; padding-right:24px; }
    .exhibit-grid{ grid-template-columns:1fr; }
    .contact-plaque{ padding:26px 24px; }
  }

  :focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
</style>
</head>
<body>

<div class="app">
  <!-- ===== EDITOR ===== -->
  <div class="editor">
    <div class="brand">
      <div class="mark"></div>
      <div class="name">Portfolio Builder</div>
    </div>

    <div class="group">
      <div class="group-title">Identity</div>
      <div class="field"><label for="fName">Name</label><input type="text" id="fName" value="Maya Ostrander"></div>
      <div class="field"><label for="fTitle">Title</label><input type="text" id="fTitle" value="Product Designer"></div>
      <div class="field"><label for="fTagline">Tagline</label><textarea id="fTagline">I design calm, considered interfaces for tools people rely on every day.</textarea></div>
      <div class="field">
        <label for="fPhoto">Photo (URL or upload)</label>
        <div class="img-input-row">
          <input type="text" id="fPhoto" placeholder="https://…" value="">
          <label class="upload-btn">Upload<input type="file" accept="image/*" data-target="fPhoto"></label>
        </div>
      </div>
      <div class="field">
        <label>Accent color</label>
        <div class="color-row">
          <input type="color" id="fAccent" value="#2f6a59">
          <span>Used for titles, labels, and links</span>
        </div>
      </div>
    </div>

    <div class="group">
      <div class="group-title">About</div>
      <div class="field"><label for="fAbout">Bio</label><textarea id="fAbout">I'm a designer based in Toronto who spends most of my time in the space between research and pixels. Over the last seven years I've shipped design systems, dashboards, and onboarding flows for teams who needed clarity more than decoration.</textarea></div>
    </div>

    <div class="group">
      <div class="group-title">Skills</div>
      <div class="field">
        <label for="fSkills">Comma-separated list</label>
        <input type="text" id="fSkills" value="Figma, Design systems, Prototyping, User research, HTML/CSS, Motion design">
        <div class="skills-hint">Shown as a row of tags on the wall.</div>
      </div>
    </div>

    <div class="group">
      <div class="group-title">Work</div>
      <div id="projectsEditor"></div>
      <button type="button" class="add-project-btn" id="addProjectBtn">+ Add a piece</button>
    </div>

    <div class="group">
      <div class="group-title">Contact</div>
      <div class="field"><label for="fEmail">Email</label><input type="email" id="fEmail" value="maya@example.com"></div>
      <div class="row2">
        <div class="field"><label for="fLink1Label">Link label</label><input type="text" id="fLink1Label" value="LinkedIn"></div>
        <div class="field"><label for="fLink1Url">Link URL</label><input type="url" id="fLink1Url" value="https://linkedin.com"></div>
      </div>
      <div class="row2">
        <div class="field"><label for="fLink2Label">Link label</label><input type="text" id="fLink2Label" value="GitHub"></div>
        <div class="field"><label for="fLink2Url">Link URL</label><input type="url" id="fLink2Url" value="https://github.com"></div>
      </div>
    </div>

    <button type="button" class="export-btn" id="exportBtn">Export as HTML</button>
  </div>

  <!-- ===== PREVIEW ===== -->
  <div class="preview-wrap">
    <div class="gallery-wall" id="galleryWall"></div>
  </div>
</div>

<script>
  const el = id => document.getElementById(id);

  let projects = [
    { id: pid(), title:'Onboarding Redesign', year:'2024', tags:'SaaS, Design system', desc:'Rebuilt a five-step onboarding flow that cut drop-off by 34% across new accounts.', link:'https://example.com', image:'' },
    { id: pid(), title:'Wayfinder', year:'2023', tags:'Mobile, Accessibility', desc:'A navigation app for low-vision users, built with a research team over eight months.', link:'https://example.com', image:'' },
    { id: pid(), title:'Fieldnotes', year:'2022', tags:'Internal tool', desc:'An internal research repository that replaced six scattered spreadsheets.', link:'', image:'' }
  ];

  function pid(){ return 'p-' + Math.random().toString(36).slice(2,9); }
  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str ?? '';
    return div.innerHTML;
  }
  function escapeAttr(str){
    return (str ?? '').replace(/"/g, '&quot;');
  }

  /* ============ PROJECT EDITOR ROWS ============ */
  function renderProjectsEditor(){
    const wrap = el('projectsEditor');
    wrap.innerHTML = projects.map((p, idx) => `
      <div class="project-block" data-id="${p.id}">
        <div class="pb-head">
          <div class="pb-label">PIECE ${String(idx+1).padStart(2,'0')}</div>
          <div class="pb-controls">
            <button type="button" class="move-up" title="Move up">↑</button>
            <button type="button" class="move-down" title="Move down">↓</button>
            <button type="button" class="remove-proj" title="Remove">×</button>
          </div>
        </div>
        <div class="field"><label>Title</label><input type="text" class="p-title-input" value="${escapeAttr(p.title)}"></div>
        <div class="row2">
          <div class="field"><label>Year</label><input type="text" class="p-year-input" value="${escapeAttr(p.year)}"></div>
          <div class="field"><label>Tags / medium</label><input type="text" class="p-tags-input" value="${escapeAttr(p.tags)}"></div>
        </div>
        <div class="field"><label>Description</label><textarea class="p-desc-input">${escapeHtml(p.desc)}</textarea></div>
        <div class="field"><label>Link (optional)</label><input type="text" class="p-link-input" value="${escapeAttr(p.link)}"></div>
        <div class="field">
          <label>Image (URL or upload)</label>
          <div class="img-input-row">
            <input type="text" class="p-image-input" value="${escapeAttr(p.image)}" placeholder="https://…">
            <label class="upload-btn">Upload<input type="file" accept="image/*" class="p-image-upload"></label>
          </div>
        </div>
      </div>
    `).join('');

    wrap.querySelectorAll('.project-block').forEach(block => {
      const id = block.dataset.id;
      const p = projects.find(x => x.id === id);

      block.querySelector('.p-title-input').addEventListener('input', e => { p.title = e.target.value; renderPreview(); });
      block.querySelector('.p-year-input').addEventListener('input', e => { p.year = e.target.value; renderPreview(); });
      block.querySelector('.p-tags-input').addEventListener('input', e => { p.tags = e.target.value; renderPreview(); });
      block.querySelector('.p-desc-input').addEventListener('input', e => { p.desc = e.target.value; renderPreview(); });
      block.querySelector('.p-link-input').addEventListener('input', e => { p.link = e.target.value; renderPreview(); });
      block.querySelector('.p-image-input').addEventListener('input', e => { p.image = e.target.value; renderPreview(); });
      block.querySelector('.p-image-upload').addEventListener('change', (e) => handleImageUpload(e, (dataUrl) => {
        p.image = dataUrl;
        block.querySelector('.p-image-input').value = dataUrl;
        renderPreview();
      }));

      block.querySelector('.remove-proj').addEventListener('click', () => {
        projects = projects.filter(x => x.id !== id);
        renderProjectsEditor();
        renderPreview();
      });
      block.querySelector('.move-up').addEventListener('click', () => {
        const i = projects.findIndex(x => x.id === id);
        if(i > 0){ [projects[i-1], projects[i]] = [projects[i], projects[i-1]]; renderProjectsEditor(); renderPreview(); }
      });
      block.querySelector('.move-down').addEventListener('click', () => {
        const i = projects.findIndex(x => x.id === id);
        if(i < projects.length - 1){ [projects[i+1], projects[i]] = [projects[i], projects[i+1]]; renderProjectsEditor(); renderPreview(); }
      });
    });
  }

  el('addProjectBtn').addEventListener('click', () => {
    projects.push({ id: pid(), title:'Untitled piece', year:'', tags:'', desc:'', link:'', image:'' });
    renderProjectsEditor();
    renderPreview();
  });

  function handleImageUpload(e, callback){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => callback(ev.target.result);
    reader.readAsDataURL(file);
  }

  el('fPhoto').closest('.editor') && document.querySelector('[data-target="fPhoto"]').addEventListener('change', (e) => {
    handleImageUpload(e, (dataUrl) => { el('fPhoto').value = dataUrl; renderPreview(); });
  });

  /* ============ PREVIEW BUILD ============ */
  function collectData(){
    return {
      name: el('fName').value || 'Your Name',
      title: el('fTitle').value || '',
      tagline: el('fTagline').value || '',
      photo: el('fPhoto').value || '',
      accent: el('fAccent').value || '#2f6a59',
      about: el('fAbout').value || '',
      skills: el('fSkills').value.split(',').map(s => s.trim()).filter(Boolean),
      email: el('fEmail').value || '',
      link1: { label: el('fLink1Label').value, url: el('fLink1Url').value },
      link2: { label: el('fLink2Label').value, url: el('fLink2Url').value },
      projects
    };
  }

  function buildGalleryHtml(data){
    const initials = data.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    return `
      <div class="hero-exhibit">
        ${data.photo ? `<img class="hero-photo" src="${escapeAttr(data.photo)}" alt="${escapeAttr(data.name)}">` : `<div class="hero-photo placeholder">${initials}</div>`}
        <div class="hero-name">${escapeHtml(data.name)}</div>
        <div class="hero-title">${escapeHtml(data.title)}</div>
        <div class="hero-tagline">${escapeHtml(data.tagline)}</div>
      </div>

      ${data.about ? `
      <div class="exhibit-section">
        <div class="section-label">About</div>
        <div class="about-text">${escapeHtml(data.about)}</div>
      </div>` : ''}

      ${data.projects.length ? `
      <div class="exhibit-section">
        <div class="section-label">Selected work</div>
        <div class="exhibit-grid">
          ${data.projects.map(p => `
            <div class="exhibit-piece">
              <div class="frame">
                ${p.image ? `<img src="${escapeAttr(p.image)}" alt="${escapeAttr(p.title)}">` : `<div class="frame-placeholder">${escapeHtml(p.title || 'Untitled')}</div>`}
              </div>
              <div class="placard">
                <div class="p-title">${escapeHtml(p.title || 'Untitled piece')}</div>
                <div class="p-meta">${[p.year, p.tags].filter(Boolean).join(' · ')}</div>
                ${p.desc ? `<div class="p-desc">${escapeHtml(p.desc)}</div>` : ''}
                ${p.link ? `<a class="p-link" href="${escapeAttr(p.link)}" target="_blank" rel="noopener">View piece →</a>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      </div>` : ''}

      ${data.skills.length ? `
      <div class="exhibit-section">
        <div class="section-label">Directory</div>
        <div class="skills-directory">
          ${data.skills.map(s => `<div class="skill-tag">${escapeHtml(s)}</div>`).join('')}
        </div>
      </div>` : ''}

      ${(data.email || data.link1.url || data.link2.url) ? `
      <div class="contact-plaque">
        <div class="c-title">Get in touch</div>
        <div class="c-links">
          ${data.email ? `<a href="mailto:${escapeAttr(data.email)}">${escapeHtml(data.email)}</a>` : ''}
          ${data.link1.url ? `<a href="${escapeAttr(data.link1.url)}" target="_blank" rel="noopener">${escapeHtml(data.link1.label || 'Link')}</a>` : ''}
          ${data.link2.url ? `<a href="${escapeAttr(data.link2.url)}" target="_blank" rel="noopener">${escapeHtml(data.link2.label || 'Link')}</a>` : ''}
        </div>
      </div>` : ''}
    `;
  }

  function renderPreview(){
    const data = collectData();
    el('galleryWall').style.setProperty('--accent-live', data.accent);
    el('galleryWall').innerHTML = buildGalleryHtml(data);
  }

  ['fName','fTitle','fTagline','fPhoto','fAbout','fSkills','fEmail','fLink1Label','fLink1Url','fLink2Label','fLink2Url'].forEach(id => {
    el(id).addEventListener('input', renderPreview);
  });
  el('fAccent').addEventListener('input', renderPreview);

  /* ============ EXPORT ============ */
  el('exportBtn').addEventListener('click', () => {
    const data = collectData();
    const bodyHtml = buildGalleryHtml(data);
    const fullDoc = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${escapeHtml(data.name)} — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>${exportedPageCss()}</style>
</head>
<body>
  <div class="page-bg">
    <div class="gallery-wall">
      ${bodyHtml}
    </div>
  </div>
</body>
</html>`;

    downloadBlob(new Blob([fullDoc], { type: 'text/html' }), `${(data.name || 'portfolio').toLowerCase().replace(/\s+/g,'-')}.html`);
  });

  function exportedPageCss(){
    return `
      :root{ --accent-live:${data.accent}; --wall:#e2dccd; --wall-shadow:#cfc7b0; --frame:#2a2724; --ink:#211f1c; --ink-dim:#6b6455; }
      *{ box-sizing:border-box; margin:0; padding:0; }
      body{ font-family:'Inter', sans-serif; background:#1c1a18; -webkit-font-smoothing:antialiased; }
      .page-bg{ padding:40px 20px; }
      .gallery-wall{ background:var(--wall); border-radius:4px; box-shadow:0 20px 60px rgba(0,0,0,0.45); max-width:880px; margin:0 auto; padding:0 0 60px; position:relative; overflow:hidden; }
      .hero-exhibit{ padding:70px 60px 50px; text-align:center; position:relative; }
      .hero-exhibit::before{ content:""; position:absolute; top:0; left:50%; transform:translateX(-50%); width:340px; height:220px; background:radial-gradient(ellipse at center, rgba(255,244,214,0.55), transparent 70%); pointer-events:none; }
      .hero-photo{ width:120px; height:120px; border-radius:50%; object-fit:cover; margin:0 auto 22px; display:block; border:4px solid #fff; box-shadow:0 6px 18px rgba(0,0,0,0.25); position:relative; z-index:1; }
      .hero-photo.placeholder{ display:flex; align-items:center; justify-content:center; background:var(--wall-shadow); color:var(--ink-dim); font-family:'Bodoni Moda', serif; font-size:34px; }
      .hero-name{ font-family:'Bodoni Moda', serif; font-weight:600; font-size:42px; color:var(--ink); position:relative; z-index:1; letter-spacing:-0.01em; }
      .hero-title{ font-size:14px; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent-live); font-weight:600; margin-top:8px; position:relative; z-index:1; }
      .hero-tagline{ font-size:15px; color:var(--ink-dim); max-width:440px; margin:16px auto 0; line-height:1.6; position:relative; z-index:1; }
      .exhibit-section{ padding:0 60px 40px; }
      .section-label{ font-family:'IBM Plex Mono', monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:0.12em; color:var(--ink-dim); display:flex; align-items:center; gap:12px; margin-bottom:20px; }
      .section-label::after{ content:""; flex:1; height:1px; background:var(--wall-shadow); }
      .about-text{ font-size:14.5px; line-height:1.8; color:var(--ink); max-width:640px; }
      .exhibit-grid{ display:grid; grid-template-columns:repeat(2, 1fr); gap:28px 24px; }
      .exhibit-piece{ position:relative; }
      .frame{ background:var(--frame); padding:10px; border-radius:2px; box-shadow:0 10px 24px rgba(0,0,0,0.28); position:relative; }
      .frame::before{ content:""; position:absolute; top:-24px; left:50%; transform:translateX(-50%); width:70%; height:36px; background:radial-gradient(ellipse at center top, rgba(255,244,214,0.5), transparent 75%); pointer-events:none; }
      .frame img{ width:100%; height:170px; object-fit:cover; display:block; background:#d8d2c2; }
      .frame .frame-placeholder{ width:100%; height:170px; display:flex; align-items:center; justify-content:center; background:#d8d2c2; color:var(--ink-dim); font-family:'Bodoni Moda', serif; font-size:14px; }
      .placard{ background:#fdfbf5; border:1px solid var(--wall-shadow); border-top:none; padding:12px 14px 13px; margin-top:-2px; }
      .placard .p-title{ font-family:'Bodoni Moda', serif; font-weight:600; font-size:16px; color:var(--ink); margin-bottom:3px; }
      .placard .p-meta{ font-family:'IBM Plex Mono', monospace; font-size:10px; color:var(--accent-live); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px; }
      .placard .p-desc{ font-size:12.5px; color:var(--ink-dim); line-height:1.6; margin-bottom:8px; }
      .placard .p-link{ font-size:11.5px; color:var(--accent-live); text-decoration:none; font-weight:600; }
      .placard .p-link:hover{ text-decoration:underline; }
      .skills-directory{ display:flex; flex-wrap:wrap; gap:9px; }
      .skill-tag{ padding:7px 13px; background:#fdfbf5; border:1px solid var(--wall-shadow); border-radius:20px; font-size:12px; color:var(--ink); }
      .contact-plaque{ background:var(--frame); color:#f2ede0; padding:30px 60px; text-align:center; margin-top:20px; }
      .contact-plaque .c-title{ font-family:'Bodoni Moda', serif; font-size:20px; margin-bottom:10px; }
      .contact-plaque .c-links{ display:flex; justify-content:center; gap:20px; flex-wrap:wrap; font-size:13px; }
      .contact-plaque .c-links a{ color:#f2ede0; text-decoration:none; border-bottom:1px solid rgba(242,237,224,0.4); padding-bottom:2px; }
      .contact-plaque .c-links a:hover{ border-color:#f2ede0; }
      @media (max-width: 700px){
        .hero-exhibit{ padding:50px 24px 36px; }
        .hero-name{ font-size:32px; }
        .exhibit-section{ padding-left:24px; padding-right:24px; }
        .exhibit-grid{ grid-template-columns:1fr; }
        .contact-plaque{ padding:26px 24px; }
      }
    `;
  }

  function downloadBlob(blob, filename){
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }

  renderProjectsEditor();
  renderPreview();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger — Contact Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@500;600;700&family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F6F7;
    --bg-alt:#ECEEF0;
    --surface:#FFFFFF;
    --surface-alt:#FAFBFC;
    --border:#E1E4E8;
    --border-strong:#C9CED4;
    --text-primary:#171A1E;
    --text-secondary:#5B6470;
    --text-tertiary:#98A0AA;
    --accent:#0F6E6E;
    --accent-strong:#0B5757;
    --accent-soft:#E3F2F1;
    --amber:#C98A2E;
    --amber-soft:#F7ECD8;
    --danger:#BE4034;
    --danger-soft:#FAE8E5;
    --font-display:'Zilla Slab',serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'Roboto Mono',monospace;
    --radius:10px;
    --radius-sm:7px;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:var(--bg); color:var(--text-primary); font-family:var(--font-body); font-size:14px; line-height:1.5;
    -webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(circle at 6% 8%, rgba(15,110,110,0.05), transparent 38%),
      radial-gradient(circle at 96% 90%, rgba(201,138,46,0.05), transparent 35%);
    background-attachment:fixed;
  }
  ::selection{ background:var(--accent-soft); color:var(--accent-strong); }
  ::-webkit-scrollbar{ width:10px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  ::-webkit-scrollbar-thumb{ background:var(--border-strong); border-radius:10px; border:2px solid var(--bg); }
  button{ font-family:inherit; cursor:pointer; }
  input, select, textarea{ font-family:inherit; }
  a{ color:inherit; text-decoration:none; }
  :focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

  .app{ display:grid; grid-template-columns:40px 1fr; max-width:980px; margin:0 auto; min-height:100vh; }

  /* ===== A-Z rail ===== */
  .az-rail{
    display:flex; flex-direction:column; align-items:center; gap:1px;
    padding:170px 0 40px 0;
    position:sticky; top:0; height:100vh;
  }
  .az-rail button{
    background:none; border:none; color:var(--text-tertiary);
    font-family:var(--font-mono); font-size:10px; font-weight:500;
    width:22px; height:16px; display:flex; align-items:center; justify-content:center;
    border-radius:3px;
  }
  .az-rail button.has-contacts{ color:var(--text-secondary); font-weight:700; }
  .az-rail button.has-contacts:hover{ background:var(--accent-soft); color:var(--accent-strong); }
  .az-rail button:disabled{ opacity:0.35; cursor:default; }

  .main-col{ padding:36px 28px 80px 16px; min-width:0; }

  /* ===== Header ===== */
  .site-header{ display:flex; align-items:center; gap:12px; margin-bottom:26px; }
  .logo-mark{
    width:38px; height:38px; border-radius:8px; background:var(--accent); color:#fff;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    position:relative;
  }
  .logo-mark svg{ width:18px; height:18px; }
  .logo-text{ font-family:var(--font-display); font-weight:700; font-size:21px; }
  .logo-sub{ font-family:var(--font-mono); font-size:10px; color:var(--text-tertiary); letter-spacing:0.05em; text-transform:uppercase; margin-top:1px; }
  .site-header .spacer{ flex:1; }

  .icon-btn{
    width:38px; height:38px; border-radius:var(--radius-sm); border:1.5px solid var(--border);
    background:var(--surface); color:var(--text-secondary);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .icon-btn:hover{ background:var(--surface-alt); border-color:var(--border-strong); color:var(--text-primary); }
  .icon-btn svg{ width:16px; height:16px; }
  .icon-btn.active{ background:var(--accent-soft); border-color:var(--accent); color:var(--accent-strong); }

  .btn{
    display:inline-flex; align-items:center; gap:8px; border-radius:var(--radius-sm); font-weight:600; font-size:13px;
    padding:10px 16px; border:1.5px solid var(--border-strong); background:var(--surface); color:var(--text-primary);
  }
  .btn:hover{ background:var(--surface-alt); }
  .btn svg{ width:14px; height:14px; }
  .btn-primary{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .btn-primary:hover{ background:var(--accent-strong); border-color:var(--accent-strong); }
  .btn-danger{ color:var(--danger); }
  .btn-danger:hover{ background:var(--danger-soft); border-color:var(--danger); }
  .btn-ghost{ border-color:transparent; background:none; color:var(--text-secondary); }
  .btn-ghost:hover{ background:var(--bg-alt); color:var(--text-primary); }

  /* ===== Toolbar ===== */
  .toolbar{ display:flex; align-items:center; gap:10px; margin-bottom:8px; flex-wrap:wrap; }
  .search-box{ position:relative; flex:1; min-width:180px; }
  .search-box svg{ position:absolute; left:11px; top:50%; transform:translateY(-50%); width:14px; height:14px; color:var(--text-tertiary); }
  .search-box input{
    width:100%; background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius-sm);
    padding:10px 12px 10px 32px; font-size:13.5px; color:var(--text-primary);
  }
  .search-box input:focus{ outline:none; border-color:var(--accent); }
  .pill-select{
    background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius-sm);
    padding:9px 11px; font-size:12.5px; color:var(--text-secondary);
  }

  .stats-row{
    display:flex; gap:18px; margin-bottom:22px; padding-bottom:18px; border-bottom:1px solid var(--border);
    font-family:var(--font-mono); font-size:12px; color:var(--text-tertiary);
  }
  .stats-row strong{ color:var(--text-primary); font-weight:600; font-family:var(--font-body); }

  /* ===== Groups ===== */
  .letter-group{ margin-bottom:6px; }
  .letter-header{
    position:sticky; top:0; background:var(--bg); z-index:5;
    font-family:var(--font-display); font-weight:700; font-size:15px; color:var(--accent);
    padding:14px 4px 8px 4px;
    border-bottom:1px solid var(--border);
    margin-bottom:10px;
  }

  .contact-list.view-list{ display:flex; flex-direction:column; gap:8px; margin-bottom:22px; }
  .contact-list.view-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(210px,1fr)); gap:12px; margin-bottom:22px; }

  .avatar{
    border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0;
    font-family:var(--font-display); font-weight:600; color:#fff;
  }

  /* list row style */
  .contact-row{
    display:flex; align-items:center; gap:14px; background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius-sm); padding:11px 14px; cursor:pointer; transition:border-color 0.15s ease, background 0.15s ease;
  }
  .contact-row:hover{ border-color:var(--border-strong); background:var(--surface-alt); }
  .contact-row .avatar{ width:38px; height:38px; font-size:13px; }
  .contact-row .info{ flex:1; min-width:0; }
  .contact-row .name{ font-weight:600; font-size:14px; display:flex; align-items:center; gap:6px; }
  .contact-row .name .star{ color:var(--amber); flex-shrink:0; }
  .contact-row .name .star svg{ width:13px; height:13px; }
  .contact-row .sub{ font-size:12px; color:var(--text-tertiary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:2px; }
  .contact-row .tags{ display:flex; gap:5px; flex-shrink:0; }
  .contact-row .quick-actions{ display:flex; gap:6px; flex-shrink:0; }

  /* grid card style */
  .contact-card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px; cursor:pointer; position:relative; transition:border-color 0.15s ease, transform 0.12s ease;
  }
  .contact-card:hover{ border-color:var(--border-strong); transform:translateY(-1px); }
  .contact-card .card-notch{
    position:absolute; top:0; left:16px; width:28px; height:6px; background:var(--bg); border-radius:0 0 5px 5px;
  }
  .contact-card .avatar{ width:44px; height:44px; font-size:15px; margin-bottom:12px; }
  .contact-card .name{ font-weight:600; font-size:14.5px; display:flex; align-items:center; gap:6px; margin-bottom:3px; }
  .contact-card .name .star{ color:var(--amber); flex-shrink:0; }
  .contact-card .name .star svg{ width:13px; height:13px; }
  .contact-card .role{ font-size:12px; color:var(--text-tertiary); margin-bottom:10px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .contact-card .tags{ display:flex; gap:5px; flex-wrap:wrap; }

  .tag-chip{
    font-family:var(--font-mono); font-size:9.5px; text-transform:uppercase; letter-spacing:0.03em;
    padding:3px 7px; border-radius:20px; font-weight:500; white-space:nowrap;
  }

  .empty-state{ text-align:center; padding:60px 20px; color:var(--text-tertiary); }
  .empty-state .empty-icon{
    width:52px; height:52px; border-radius:14px; background:var(--surface); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center; margin:0 auto 16px auto;
  }
  .empty-state .empty-icon svg{ width:22px; height:22px; }
  .empty-state strong{ font-family:var(--font-display); font-size:16px; color:var(--text-secondary); }
  .empty-state p{ font-size:12.5px; margin-top:6px; }

  /* ===== Modal shared ===== */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(20,22,25,0.55); backdrop-filter:blur(2px);
    display:flex; align-items:center; justify-content:center; z-index:100;
    opacity:0; pointer-events:none; transition:opacity 0.15s ease; padding:20px;
  }
  .modal-overlay.open{ opacity:1; pointer-events:auto; }
  .modal{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    width:100%; box-shadow:0 24px 70px -16px rgba(20,22,25,0.35);
    transform:translateY(8px) scale(0.98); transition:transform 0.15s ease;
    max-height:88vh; overflow-y:auto;
  }
  .modal-overlay.open .modal{ transform:translateY(0) scale(1); }
  .modal-detail{ max-width:440px; }
  .modal-edit{ max-width:520px; }
  .modal-head{ display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); }
  .modal-head span{ font-family:var(--font-display); font-weight:700; font-size:16px; }
  .modal-close{ width:28px; height:28px; border-radius:6px; border:none; background:transparent; color:var(--text-tertiary); display:flex; align-items:center; justify-content:center; }
  .modal-close:hover{ background:var(--bg-alt); color:var(--text-primary); }
  .modal-close svg{ width:15px; height:15px; }
  .modal-body{ padding:22px 20px; }

  /* detail modal */
  .detail-head{ display:flex; align-items:center; gap:14px; margin-bottom:20px; }
  .detail-head .avatar{ width:56px; height:56px; font-size:18px; }
  .detail-head .name{ font-family:var(--font-display); font-size:19px; font-weight:700; display:flex; align-items:center; gap:8px; }
  .detail-head .role{ font-size:12.5px; color:var(--text-tertiary); margin-top:2px; }
  .star-toggle{ background:none; border:none; color:var(--border-strong); flex-shrink:0; }
  .star-toggle svg{ width:16px; height:16px; }
  .star-toggle.active{ color:var(--amber); }

  .detail-field{ display:flex; gap:12px; padding:11px 0; border-top:1px solid var(--border); }
  .detail-field:first-of-type{ border-top:none; }
  .detail-field .f-icon{ width:32px; height:32px; border-radius:8px; background:var(--accent-soft); color:var(--accent); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .detail-field .f-icon svg{ width:14px; height:14px; }
  .detail-field .f-body{ min-width:0; flex:1; }
  .detail-field .f-label{ font-family:var(--font-mono); font-size:9.5px; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-tertiary); margin-bottom:2px; }
  .detail-field .f-value{ font-size:13.5px; word-break:break-word; }
  .detail-field a.f-value:hover{ color:var(--accent-strong); text-decoration:underline; }

  .detail-tags{ display:flex; gap:6px; flex-wrap:wrap; margin:16px 0 4px 0; }
  .detail-notes{ background:var(--surface-alt); border-radius:var(--radius-sm); padding:12px 14px; font-size:13px; color:var(--text-secondary); margin-top:10px; white-space:pre-wrap; }
  .detail-actions{ display:flex; gap:10px; margin-top:20px; }

  .confirm-inline{ display:none; align-items:center; gap:8px; margin-top:14px; background:var(--danger-soft); border-radius:var(--radius-sm); padding:10px 12px; }
  .confirm-inline.show{ display:flex; }
  .confirm-inline span{ font-size:12.5px; color:var(--danger); font-weight:500; flex:1; }
  .confirm-inline button{ font-size:11.5px; font-weight:600; padding:6px 11px; border-radius:6px; border:1px solid var(--border); background:var(--surface); }
  .confirm-inline button.yes{ background:var(--danger); border-color:var(--danger); color:#fff; }

  /* edit form */
  .form-field{ margin-bottom:14px; }
  .form-field label{ display:block; font-family:var(--font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-tertiary); margin-bottom:6px; }
  .form-field input, .form-field textarea{
    width:100%; background:var(--surface-alt); border:1.5px solid var(--border); border-radius:var(--radius-sm);
    padding:10px 12px; font-size:13.5px; color:var(--text-primary);
  }
  .form-field input:focus, .form-field textarea:focus{ outline:none; border-color:var(--accent); background:var(--surface); }
  .form-field textarea{ resize:vertical; min-height:60px; }
  .form-row{ display:flex; gap:12px; }
  .form-row > div{ flex:1; }
  .tag-input-row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:8px; }
  .tag-input-row input{ flex:1; min-width:120px; background:var(--surface-alt); border:1.5px solid var(--border); border-radius:var(--radius-sm); padding:8px 10px; font-size:12.5px; }
  .removable-tag{ display:flex; align-items:center; gap:5px; }
  .removable-tag button{ background:none; border:none; color:inherit; opacity:0.7; display:flex; }
  .removable-tag button svg{ width:10px; height:10px; }
  .form-footer{ display:flex; justify-content:flex-end; gap:10px; margin-top:18px; }
  .fav-check-row{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .fav-check-row input{ width:16px; height:16px; accent-color:var(--amber); }
  .fav-check-row label{ font-size:13px; color:var(--text-secondary); margin:0; text-transform:none; font-family:var(--font-body); letter-spacing:0; }

  @media (max-width:640px){
    .app{ grid-template-columns:1fr; }
    .az-rail{ display:none; }
    .main-col{ padding:26px 16px 70px 16px; }
    .contact-list.view-grid{ grid-template-columns:1fr 1fr; }
    .form-row{ flex-direction:column; }
  }
</style>
</head>
<body>

<div class="app">
  <nav class="az-rail" id="azRail"></nav>

  <div class="main-col">
    <header class="site-header">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      </div>
      <div>
        <div class="logo-text">Ledger</div>
        <div class="logo-sub">Contact directory</div>
      </div>
      <div class="spacer"></div>
      <button class="icon-btn" id="viewListBtn" title="List view">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
      </button>
      <button class="icon-btn" id="viewGridBtn" title="Grid view">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </button>
      <button class="icon-btn" id="exportBtn" title="Export CSV">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v13m0 0l-4.5-4.5M12 16l4.5-4.5"/><path d="M4 19h16"/></svg>
      </button>
      <button class="btn btn-primary" id="addContactBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        Add contact
      </button>
    </header>

    <div class="toolbar">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="Search name, email, phone, company...">
      </div>
      <select class="pill-select" id="filterSelect">
        <option value="all">All contacts</option>
        <option value="favorites">★ Favorites</option>
      </select>
    </div>

    <div class="stats-row">
      <span><strong id="statTotal">0</strong> contacts</span>
      <span><strong id="statFav">0</strong> favorites</span>
      <span><strong id="statTags">0</strong> tags in use</span>
    </div>

    <div id="listContainer"></div>

    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
      <strong id="emptyTitle">No contacts yet</strong>
      <p id="emptySub">Add your first contact to build your directory.</p>
    </div>
  </div>
</div>

<!-- Detail modal -->
<div class="modal-overlay" id="detailOverlay">
  <div class="modal modal-detail">
    <div class="modal-head">
      <span>Contact</span>
      <button class="modal-close" id="detailClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="detail-head">
        <div class="avatar" id="detailAvatar" style="width:56px;height:56px;font-size:18px;"></div>
        <div style="flex:1; min-width:0;">
          <div class="name" id="detailName">—</div>
          <div class="role" id="detailRole">—</div>
        </div>
        <button class="star-toggle" id="detailStarBtn" title="Toggle favorite">
          <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg>
        </button>
      </div>
      <div id="detailFields"></div>
      <div class="detail-tags" id="detailTags"></div>
      <div class="detail-notes" id="detailNotes" style="display:none;"></div>

      <div class="detail-actions">
        <button class="btn btn-primary" id="detailEditBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/></svg>
          Edit
        </button>
        <button class="btn btn-danger" id="detailDeleteBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
          Delete
        </button>
      </div>
      <div class="confirm-inline" id="deleteConfirm">
        <span>Delete this contact permanently?</span>
        <button id="deleteCancelBtn">Cancel</button>
        <button class="yes" id="deleteYesBtn">Delete</button>
      </div>
    </div>
  </div>
</div>

<!-- Edit / Add modal -->
<div class="modal-overlay" id="editOverlay">
  <div class="modal modal-edit">
    <div class="modal-head">
      <span id="editModalTitle">Add contact</span>
      <button class="modal-close" id="editClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-field"><label>First name</label><input type="text" id="fFirst" placeholder="Ada"></div>
        <div class="form-field"><label>Last name</label><input type="text" id="fLast" placeholder="Lovelace"></div>
      </div>
      <div class="form-row">
        <div class="form-field"><label>Phone</label><input type="text" id="fPhone" placeholder="+1 555 010 2020"></div>
        <div class="form-field"><label>Email</label><input type="text" id="fEmail" placeholder="ada@example.com"></div>
      </div>
      <div class="form-row">
        <div class="form-field"><label>Company</label><input type="text" id="fCompany" placeholder="Analytical Engines Ltd."></div>
        <div class="form-field"><label>Job title</label><input type="text" id="fTitle" placeholder="Mathematician"></div>
      </div>
      <div class="form-field"><label>Address</label><input type="text" id="fAddress" placeholder="12 King St, London"></div>
      <div class="form-field">
        <label>Tags</label>
        <div class="tag-input-row" id="tagChipsRow"></div>
        <input type="text" id="fTagInput" placeholder="Type a tag and press Enter">
      </div>
      <div class="fav-check-row">
        <input type="checkbox" id="fFavorite">
        <label for="fFavorite">Mark as favorite</label>
      </div>
      <div class="form-field"><label>Notes</label><textarea id="fNotes" placeholder="Anything worth remembering..."></textarea></div>

      <div class="form-footer">
        <button class="btn btn-ghost" id="editCancelBtn">Cancel</button>
        <button class="btn btn-primary" id="editSaveBtn">Save contact</button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){

  let contacts = [];
  let viewMode = 'list';
  let searchTerm = '';
  let filterMode = 'all';
  let activeId = null;
  let editingId = null;
  let draftTags = [];

  const AVATAR_COLORS = ['#0F6E6E','#6B4FA0','#C98A2E','#3E6BB0','#B85C7A','#5C8A3E','#8A5C3E','#4A5568'];
  function uid(){ return Math.random().toString(36).slice(2,10); }
  function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
  function initials(c){
    const a = (c.firstName||'').trim()[0] || '';
    const b = (c.lastName||'').trim()[0] || '';
    return (a+b).toUpperCase() || '?';
  }
  function colorFor(str){
    let h = 0;
    for(let i=0;i<str.length;i++) h = (h*31 + str.charCodeAt(i)) >>> 0;
    return AVATAR_COLORS[h % AVATAR_COLORS.length];
  }
  function fullName(c){ return `${c.firstName} ${c.lastName}`.trim() || 'Unnamed contact'; }
  function sortKey(c){ return (c.lastName || c.firstName || '').toUpperCase(); }
  function groupLetter(c){
    const k = sortKey(c);
    return /^[A-Z]/.test(k) ? k[0] : '#';
  }

  /* ---------- Seed demo contacts ---------- */
  contacts = [
    { id:uid(), firstName:'Ada', lastName:'Lovelace', phone:'+1 555 010 2020', email:'ada@example.com', company:'Analytical Engines Ltd.', title:'Mathematician', address:'12 King St, London', notes:'Met at the Cambridge symposium — follow up about the algorithm draft.', tags:['Work','Collaborator'], favorite:true },
    { id:uid(), firstName:'Grace', lastName:'Hopper', phone:'+1 555 019 4471', email:'grace@example.com', company:'US Navy', title:'Rear Admiral', address:'Arlington, VA', notes:'', tags:['Mentor'], favorite:true },
    { id:uid(), firstName:'Alan', lastName:'Turing', phone:'+44 20 7946 0958', email:'alan@example.com', company:'National Physical Laboratory', title:'Researcher', address:'Teddington, UK', notes:'Interested in chess and long-distance running.', tags:['Work'], favorite:false },
    { id:uid(), firstName:'Katherine', lastName:'Johnson', phone:'+1 555 088 3310', email:'katherine@example.com', company:'NASA', title:'Physicist', address:'Hampton, VA', notes:'', tags:['Client','VIP'], favorite:false },
    { id:uid(), firstName:'Margaret', lastName:'Hamilton', phone:'+1 555 042 7765', email:'margaret@example.com', company:'MIT Instrumentation Lab', title:'Lead Software Engineer', address:'Cambridge, MA', notes:'Send the updated onboarding checklist before Friday.', tags:['Work','Family'], favorite:false }
  ];

  /* ---------- Filtering / grouping ---------- */
  function getFiltered(){
    let list = contacts.slice();
    if(filterMode === 'favorites') list = list.filter(c=>c.favorite);
    else if(filterMode !== 'all') list = list.filter(c=>c.tags.includes(filterMode));
    if(searchTerm){
      list = list.filter(c=>{
        const hay = [c.firstName,c.lastName,c.email,c.phone,c.company,c.title,...(c.tags||[])].join(' ').toLowerCase();
        return hay.includes(searchTerm);
      });
    }
    list.sort((a,b)=> sortKey(a).localeCompare(sortKey(b)) || a.firstName.localeCompare(b.firstName));
    return list;
  }

  function allTags(){
    const s = new Set();
    contacts.forEach(c=> (c.tags||[]).forEach(t=>s.add(t)));
    return Array.from(s);
  }

  /* ---------- A-Z rail ---------- */
  function renderAzRail(){
    const present = new Set(contacts.map(groupLetter));
    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    const rail = document.getElementById('azRail');
    rail.innerHTML = letters.map(l=>{
      const has = present.has(l);
      return `<button class="${has?'has-contacts':''}" ${has?'':'disabled'} data-letter="${l}">${l}</button>`;
    }).join('');
    rail.querySelectorAll('[data-letter]').forEach(btn=>{
      btn.onclick = ()=>{
        const el = document.getElementById('letter-'+btn.dataset.letter);
        if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
      };
    });
  }

  /* ---------- Render list ---------- */
  function tagChipHtml(tag){
    const c = colorFor(tag);
    return `<span class="tag-chip" style="background:${c}22; color:${c};">${escapeHtml(tag)}</span>`;
  }

  function avatarHtml(c, size){
    const col = colorFor(fullName(c));
    return `<div class="avatar" style="width:${size}px;height:${size}px;font-size:${Math.round(size*0.36)}px;background:${col};">${initials(c)}</div>`;
  }

  function renderList(){
    const list = getFiltered();
    const container = document.getElementById('listContainer');
    document.getElementById('emptyState').style.display = list.length===0 ? 'block' : 'none';
    container.style.display = list.length===0 ? 'none' : 'block';

    if(list.length===0){
      document.getElementById('emptyTitle').textContent = searchTerm || filterMode!=='all' ? 'No matches' : 'No contacts yet';
      document.getElementById('emptySub').textContent = searchTerm || filterMode!=='all' ? 'Try a different search or filter.' : 'Add your first contact to build your directory.';
    }

    // group
    const groups = {};
    list.forEach(c=>{
      const l = groupLetter(c);
      (groups[l] = groups[l]||[]).push(c);
    });
    const letters = Object.keys(groups).sort();

    container.innerHTML = letters.map(letter=>{
      const items = groups[letter];
      const itemsHtml = items.map(c=>{
        if(viewMode==='list'){
          return `
          <div class="contact-row" data-id="${c.id}">
            ${avatarHtml(c,38)}
            <div class="info">
              <div class="name">${escapeHtml(fullName(c))}${c.favorite?'<span class="star"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg></span>':''}</div>
              <div class="sub">${escapeHtml(c.title ? c.title + (c.company?' at '+c.company:'') : (c.company || c.email || c.phone || ''))}</div>
            </div>
            <div class="tags">${(c.tags||[]).slice(0,2).map(tagChipHtml).join('')}</div>
            <div class="quick-actions">
              ${c.phone ? `<a class="icon-btn" href="tel:${escapeHtml(c.phone)}" title="Call" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.13.96.36 1.9.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0122 16.92z"/></svg></a>` : ''}
            </div>
          </div>`;
        } else {
          return `
          <div class="contact-card" data-id="${c.id}">
            <div class="card-notch"></div>
            ${avatarHtml(c,44)}
            <div class="name">${escapeHtml(fullName(c))}${c.favorite?'<span class="star"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg></span>':''}</div>
            <div class="role">${escapeHtml(c.title ? c.title + (c.company?' at '+c.company:'') : (c.company || c.email || ''))}</div>
            <div class="tags">${(c.tags||[]).map(tagChipHtml).join('')}</div>
          </div>`;
        }
      }).join('');
      return `
      <div class="letter-group">
        <div class="letter-header" id="letter-${letter}">${letter}</div>
        <div class="contact-list view-${viewMode}">${itemsHtml}</div>
      </div>`;
    }).join('');

    container.querySelectorAll('[data-id]').forEach(el=>{
      el.addEventListener('click', ()=> openDetail(el.getAttribute('data-id')));
    });

    // stats
    document.getElementById('statTotal').textContent = contacts.length;
    document.getElementById('statFav').textContent = contacts.filter(c=>c.favorite).length;
    document.getElementById('statTags').textContent = allTags().length;

    // filter select options (rebuild to include tags)
    const sel = document.getElementById('filterSelect');
    const currentVal = filterMode;
    sel.innerHTML = `<option value="all">All contacts</option><option value="favorites">★ Favorites</option>` +
      allTags().map(t=>`<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');
    sel.value = currentVal;

    renderAzRail();
  }

  document.getElementById('searchInput').addEventListener('input', e=>{
    searchTerm = e.target.value.trim().toLowerCase();
    renderList();
  });
  document.getElementById('filterSelect').addEventListener('change', e=>{
    filterMode = e.target.value;
    renderList();
  });
  document.getElementById('viewListBtn').addEventListener('click', ()=>{
    viewMode = 'list';
    document.getElementById('viewListBtn').classList.add('active');
    document.getElementById('viewGridBtn').classList.remove('active');
    renderList();
  });
  document.getElementById('viewGridBtn').addEventListener('click', ()=>{
    viewMode = 'grid';
    document.getElementById('viewGridBtn').classList.add('active');
    document.getElementById('viewListBtn').classList.remove('active');
    renderList();
  });
  document.getElementById('viewListBtn').classList.add('active');

  /* ---------- Detail modal ---------- */
  function openDetail(id){
    activeId = id;
    const c = contacts.find(x=>x.id===id);
    if(!c) return;
    document.getElementById('deleteConfirm').classList.remove('show');
    document.getElementById('detailAvatar').outerHTML = avatarHtml(c,56).replace('class="avatar"','class="avatar" id="detailAvatar"');
    document.getElementById('detailName').innerHTML = escapeHtml(fullName(c));
    document.getElementById('detailRole').textContent = c.title ? c.title + (c.company?' at '+c.company:'') : (c.company||'');
    document.getElementById('detailStarBtn').classList.toggle('active', !!c.favorite);

    const fields = [];
    if(c.phone) fields.push({icon:'phone', label:'Phone', value:c.phone, href:'tel:'+c.phone});
    if(c.email) fields.push({icon:'mail', label:'Email', value:c.email, href:'mailto:'+c.email});
    if(c.company) fields.push({icon:'briefcase', label:'Company', value:c.company});
    if(c.address) fields.push({icon:'pin', label:'Address', value:c.address});
    const icons = {
      phone:'<path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.13.96.36 1.9.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0122 16.92z"/>',
      mail:'<path d="M4 4h16v16H4z" opacity="0"/><path d="M22 6l-10 7L2 6"/><rect x="2" y="4" width="20" height="16" rx="2"/>',
      briefcase:'<rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/>',
      pin:'<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>'
    };
    document.getElementById('detailFields').innerHTML = fields.map(f=>`
      <div class="detail-field">
        <div class="f-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${icons[f.icon]}</svg></div>
        <div class="f-body">
          <div class="f-label">${f.label}</div>
          ${f.href ? `<a class="f-value" href="${f.href}">${escapeHtml(f.value)}</a>` : `<div class="f-value">${escapeHtml(f.value)}</div>`}
        </div>
      </div>
    `).join('');

    document.getElementById('detailTags').innerHTML = (c.tags||[]).map(tagChipHtml).join('');
    const notesEl = document.getElementById('detailNotes');
    if(c.notes){ notesEl.style.display='block'; notesEl.textContent = c.notes; } else { notesEl.style.display='none'; }

    document.getElementById('detailOverlay').classList.add('open');
  }
  function closeDetail(){ document.getElementById('detailOverlay').classList.remove('open'); activeId=null; }
  document.getElementById('detailClose').addEventListener('click', closeDetail);
  document.getElementById('detailOverlay').addEventListener('click', e=>{ if(e.target.id==='detailOverlay') closeDetail(); });

  document.getElementById('detailStarBtn').addEventListener('click', ()=>{
    const c = contacts.find(x=>x.id===activeId);
    if(!c) return;
    c.favorite = !c.favorite;
    document.getElementById('detailStarBtn').classList.toggle('active', c.favorite);
    renderList();
  });

  document.getElementById('detailDeleteBtn').addEventListener('click', ()=>{
    document.getElementById('deleteConfirm').classList.add('show');
  });
  document.getElementById('deleteCancelBtn').addEventListener('click', ()=>{
    document.getElementById('deleteConfirm').classList.remove('show');
  });
  document.getElementById('deleteYesBtn').addEventListener('click', ()=>{
    contacts = contacts.filter(x=>x.id!==activeId);
    closeDetail();
    renderList();
  });

  document.getElementById('detailEditBtn').addEventListener('click', ()=>{
    openEdit(activeId);
    closeDetail();
  });

  /* ---------- Edit / Add modal ---------- */
  document.getElementById('addContactBtn').addEventListener('click', ()=> openEdit(null));

  function openEdit(id){
    editingId = id;
    const c = id ? contacts.find(x=>x.id===id) : null;
    document.getElementById('editModalTitle').textContent = c ? 'Edit contact' : 'Add contact';
    document.getElementById('fFirst').value = c ? c.firstName : '';
    document.getElementById('fLast').value = c ? c.lastName : '';
    document.getElementById('fPhone').value = c ? c.phone : '';
    document.getElementById('fEmail').value = c ? c.email : '';
    document.getElementById('fCompany').value = c ? c.company : '';
    document.getElementById('fTitle').value = c ? c.title : '';
    document.getElementById('fAddress').value = c ? c.address : '';
    document.getElementById('fNotes').value = c ? c.notes : '';
    document.getElementById('fFavorite').checked = c ? !!c.favorite : false;
    draftTags = c ? (c.tags||[]).slice() : [];
    renderTagChips();
    document.getElementById('editOverlay').classList.add('open');
    document.getElementById('fFirst').focus();
  }
  function closeEdit(){ document.getElementById('editOverlay').classList.remove('open'); editingId=null; }
  document.getElementById('editClose').addEventListener('click', closeEdit);
  document.getElementById('editCancelBtn').addEventListener('click', closeEdit);
  document.getElementById('editOverlay').addEventListener('click', e=>{ if(e.target.id==='editOverlay') closeEdit(); });

  function renderTagChips(){
    const row = document.getElementById('tagChipsRow');
    row.innerHTML = draftTags.map((t,i)=>{
      const c = colorFor(t);
      return `<span class="tag-chip removable-tag" style="background:${c}22; color:${c};">${escapeHtml(t)}<button data-i="${i}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button></span>`;
    }).join('');
    row.querySelectorAll('button').forEach(btn=>{
      btn.onclick = ()=>{ draftTags.splice(+btn.dataset.i,1); renderTagChips(); };
    });
  }
  document.getElementById('fTagInput').addEventListener('keydown', e=>{
    if(e.key==='Enter'){
      e.preventDefault();
      const val = e.target.value.trim();
      if(val && !draftTags.includes(val)){ draftTags.push(val); renderTagChips(); }
      e.target.value = '';
    }
  });

  document.getElementById('editSaveBtn').addEventListener('click', ()=>{
    const first = document.getElementById('fFirst').value.trim();
    const last = document.getElementById('fLast').value.trim();
    if(!first && !last){ document.getElementById('fFirst').focus(); return; }
    const data = {
      firstName:first, lastName:last,
      phone:document.getElementById('fPhone').value.trim(),
      email:document.getElementById('fEmail').value.trim(),
      company:document.getElementById('fCompany').value.trim(),
      title:document.getElementById('fTitle').value.trim(),
      address:document.getElementById('fAddress').value.trim(),
      notes:document.getElementById('fNotes').value.trim(),
      favorite:document.getElementById('fFavorite').checked,
      tags:draftTags.slice()
    };
    if(editingId){
      const c = contacts.find(x=>x.id===editingId);
      Object.assign(c, data);
    } else {
      contacts.push(Object.assign({id:uid()}, data));
    }
    closeEdit();
    renderList();
  });

  /* ---------- CSV export ---------- */
  document.getElementById('exportBtn').addEventListener('click', ()=>{
    const headers = ['First Name','Last Name','Phone','Email','Company','Title','Address','Tags','Favorite','Notes'];
    const rows = contacts.map(c=>[
      c.firstName, c.lastName, c.phone, c.email, c.company, c.title, c.address,
      (c.tags||[]).join('; '), c.favorite?'Yes':'No', c.notes
    ]);
    const csv = [headers, ...rows].map(r=>
      r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')
    ).join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'contacts.csv';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  });

  document.addEventListener('keydown', e=>{
    if(e.key==='Escape'){
      if(document.getElementById('editOverlay').classList.contains('open')) closeEdit();
      else if(document.getElementById('detailOverlay').classList.contains('open')) closeDetail();
    }
  });

  renderList();
})();
</script>
</body>
</html>

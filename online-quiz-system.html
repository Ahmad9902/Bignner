<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proctor — Online Quiz System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F3F4EF;
    --bg-alt:#EAEBE4;
    --surface:#FFFFFF;
    --surface-alt:#FAFAF7;
    --border:#DEE0D6;
    --border-strong:#C4C7BA;
    --text-primary:#1D2019;
    --text-secondary:#5B6156;
    --text-tertiary:#93978A;
    --accent:#1F6F4A;
    --accent-strong:#155C3C;
    --accent-soft:#E2F0E7;
    --gold:#B4842A;
    --gold-soft:#F6EBD6;
    --danger:#B5392E;
    --danger-soft:#F8E7E4;
    --font-display:'Source Serif 4',serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'Space Mono',monospace;
    --radius:10px;
    --radius-sm:7px;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:var(--bg);
    color:var(--text-primary);
    font-family:var(--font-body);
    font-size:14px;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(circle at 10% 0%, rgba(31,111,74,0.05), transparent 40%),
      radial-gradient(circle at 95% 20%, rgba(180,132,42,0.05), transparent 35%);
    background-attachment:fixed;
  }
  ::selection{ background:var(--accent-soft); color:var(--accent-strong); }
  ::-webkit-scrollbar{ width:10px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  ::-webkit-scrollbar-thumb{ background:var(--border-strong); border-radius:10px; border:2px solid var(--bg); }
  button{ font-family:inherit; cursor:pointer; }
  input, select, textarea{ font-family:inherit; }
  a{ color:inherit; }
  :focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

  .wrap{ max-width:840px; margin:0 auto; padding:38px 24px 80px 24px; }
  .view{ display:none; }
  .view.active{ display:block; animation:fadeIn 0.2s ease; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

  /* ===== Header ===== */
  .site-header{ display:flex; align-items:center; gap:12px; margin-bottom:32px; }
  .logo-mark{
    width:36px; height:36px; border-radius:8px;
    background:var(--accent); color:#fff;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .logo-mark svg{ width:18px; height:18px; }
  .logo-text{ font-family:var(--font-display); font-weight:700; font-size:20px; }
  .logo-sub{ font-family:var(--font-mono); font-size:10px; color:var(--text-tertiary); letter-spacing:0.04em; text-transform:uppercase; margin-top:1px; }
  .site-header .spacer{ flex:1; }
  .btn{
    display:inline-flex; align-items:center; gap:8px;
    border-radius:var(--radius-sm); font-weight:600; font-size:13px;
    padding:10px 16px; border:1.5px solid var(--border-strong); background:var(--surface); color:var(--text-primary);
    transition:background 0.15s ease, border-color 0.15s ease;
  }
  .btn:hover{ background:var(--surface-alt); }
  .btn svg{ width:14px; height:14px; }
  .btn-primary{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .btn-primary:hover{ background:var(--accent-strong); border-color:var(--accent-strong); }
  .btn-ghost{ border-color:transparent; background:none; color:var(--text-secondary); }
  .btn-ghost:hover{ background:var(--bg-alt); color:var(--text-primary); }
  .btn-danger{ color:var(--danger); }
  .btn-danger:hover{ background:var(--danger-soft); border-color:var(--danger); }
  .btn:disabled{ opacity:0.4; pointer-events:none; }

  /* ===== Dashboard ===== */
  .page-title{ font-family:var(--font-display); font-weight:700; font-size:26px; margin-bottom:4px; }
  .page-sub{ color:var(--text-secondary); font-size:13.5px; margin-bottom:24px; }
  .quiz-grid{ display:flex; flex-direction:column; gap:12px; }
  .quiz-card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:18px 20px; display:flex; align-items:center; gap:16px;
  }
  .quiz-card-icon{
    width:44px; height:44px; border-radius:9px; background:var(--accent-soft); color:var(--accent);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .quiz-card-icon svg{ width:20px; height:20px; }
  .quiz-card-info{ flex:1; min-width:0; }
  .quiz-card-info h3{ font-family:var(--font-display); font-size:16px; font-weight:600; margin-bottom:4px; }
  .quiz-card-meta{ font-family:var(--font-mono); font-size:11px; color:var(--text-tertiary); display:flex; gap:12px; flex-wrap:wrap; }
  .quiz-card-meta .best{ color:var(--accent); }
  .quiz-card-actions{ display:flex; gap:8px; flex-shrink:0; }
  .quiz-card-actions .btn{ padding:8px 13px; font-size:12.5px; }

  .empty-state{ text-align:center; padding:60px 20px; color:var(--text-tertiary); }
  .empty-state .empty-icon{
    width:52px; height:52px; border-radius:14px; background:var(--surface); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center; margin:0 auto 16px auto;
  }
  .empty-state .empty-icon svg{ width:22px; height:22px; }
  .empty-state strong{ font-family:var(--font-display); font-size:16px; color:var(--text-secondary); }
  .empty-state p{ font-size:12.5px; margin-top:6px; }

  /* ===== Builder ===== */
  .builder-head{ display:flex; align-items:center; gap:12px; margin-bottom:22px; }
  .builder-field{ margin-bottom:16px; }
  .builder-field label{
    display:block; font-family:var(--font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em;
    color:var(--text-tertiary); margin-bottom:7px;
  }
  .builder-field input[type="text"], .builder-field textarea, .builder-field input[type="number"]{
    width:100%; background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius-sm);
    padding:11px 13px; font-size:14px; color:var(--text-primary);
  }
  .builder-field input:focus, .builder-field textarea:focus{ outline:none; border-color:var(--accent); }
  .builder-field textarea{ resize:vertical; min-height:44px; }
  .row-2{ display:flex; gap:14px; }
  .row-2 > div{ flex:1; }

  .question-card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:18px 20px; margin-bottom:14px;
  }
  .question-card-head{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .q-number{
    font-family:var(--font-display); font-weight:700; font-size:14px; color:var(--accent);
    width:26px; height:26px; border-radius:50%; background:var(--accent-soft);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .question-card-head input{
    flex:1; border:none; border-bottom:1.5px solid var(--border); background:none;
    font-size:14.5px; padding:4px 2px; font-weight:500;
  }
  .question-card-head input:focus{ outline:none; border-color:var(--accent); }
  .q-delete{ background:none; border:none; color:var(--text-tertiary); flex-shrink:0; padding:4px; border-radius:6px; }
  .q-delete:hover{ color:var(--danger); background:var(--danger-soft); }
  .q-delete svg{ width:15px; height:15px; }

  .option-row{ display:flex; align-items:center; gap:10px; margin-bottom:9px; }
  .bubble{
    width:26px; height:26px; border-radius:50%; border:2px solid var(--border-strong);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    font-family:var(--font-mono); font-size:11px; font-weight:700; color:var(--text-tertiary);
    background:var(--surface);
    transition:background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    cursor:pointer;
  }
  .bubble.correct-mark{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .option-row input[type="text"]{
    flex:1; border:1.5px solid var(--border); border-radius:var(--radius-sm); padding:9px 12px; font-size:13.5px;
  }
  .option-row input:focus{ outline:none; border-color:var(--accent); }
  .option-remove{ background:none; border:none; color:var(--text-tertiary); flex-shrink:0; padding:4px; }
  .option-remove:hover{ color:var(--danger); }
  .option-remove svg{ width:14px; height:14px; }

  .add-option-btn{
    background:none; border:1px dashed var(--border-strong); color:var(--text-secondary);
    border-radius:var(--radius-sm); padding:8px 12px; font-size:12.5px; font-weight:500;
    display:flex; align-items:center; gap:6px; margin-top:4px;
  }
  .add-option-btn:hover{ background:var(--surface-alt); }
  .add-option-btn svg{ width:12px; height:12px; }

  .explanation-toggle{
    margin-top:12px; font-size:12px; color:var(--text-tertiary); display:flex; align-items:center; gap:5px;
    background:none; border:none;
  }
  .explanation-toggle:hover{ color:var(--text-secondary); }
  .explanation-box{ margin-top:8px; display:none; }
  .explanation-box.open{ display:block; }

  .add-question-btn{
    width:100%; background:var(--surface-alt); border:1.5px dashed var(--border-strong); color:var(--text-secondary);
    border-radius:var(--radius); padding:14px; font-size:13.5px; font-weight:600;
    display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:24px;
  }
  .add-question-btn:hover{ background:var(--bg-alt); color:var(--text-primary); }
  .add-question-btn svg{ width:15px; height:15px; }

  .builder-footer{ display:flex; gap:10px; justify-content:flex-end; }
  .validation-msg{ font-size:12.5px; color:var(--danger); margin-bottom:14px; display:none; }
  .validation-msg.show{ display:block; }

  /* ===== Take view ===== */
  .take-head{ display:flex; align-items:center; gap:16px; margin-bottom:20px; }
  .take-title{ font-family:var(--font-display); font-weight:700; font-size:20px; flex:1; min-width:0; }
  .timer{
    display:flex; align-items:center; gap:8px;
    background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius-sm);
    padding:9px 14px; font-family:var(--font-mono); font-size:15px; font-weight:700; flex-shrink:0;
  }
  .timer svg{ width:15px; height:15px; color:var(--accent); }
  .timer.low-time{ border-color:var(--danger); color:var(--danger); }
  .timer.low-time svg{ color:var(--danger); }

  .progress-track{ height:5px; background:var(--border); border-radius:4px; overflow:hidden; margin-bottom:20px; }
  .progress-fill{ height:100%; background:var(--accent); transition:width 0.25s ease; }

  .navigator{ display:flex; flex-wrap:wrap; gap:7px; margin-bottom:24px; }
  .nav-dot{
    width:30px; height:30px; border-radius:50%; border:1.5px solid var(--border-strong);
    background:var(--surface); font-family:var(--font-mono); font-size:11px; font-weight:700; color:var(--text-tertiary);
    display:flex; align-items:center; justify-content:center;
  }
  .nav-dot.answered{ background:var(--accent-soft); border-color:var(--accent); color:var(--accent-strong); }
  .nav-dot.flagged{ background:var(--gold-soft); border-color:var(--gold); color:var(--gold); }
  .nav-dot.current{ box-shadow:0 0 0 2px var(--accent); }

  .question-panel{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:26px 28px; margin-bottom:20px;
  }
  .question-panel .q-eyebrow{
    font-family:var(--font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-tertiary);
    margin-bottom:10px; display:flex; align-items:center; justify-content:space-between;
  }
  .flag-btn{ background:none; border:none; color:var(--text-tertiary); display:flex; align-items:center; gap:5px; font-size:11px; font-family:var(--font-mono); }
  .flag-btn:hover{ color:var(--gold); }
  .flag-btn svg{ width:13px; height:13px; }
  .flag-btn.active{ color:var(--gold); }
  .question-panel h2{ font-family:var(--font-display); font-size:19px; font-weight:600; margin-bottom:20px; line-height:1.4; }

  .answer-option{
    display:flex; align-items:center; gap:14px; padding:13px 14px;
    border:1.5px solid var(--border); border-radius:var(--radius-sm); margin-bottom:10px; cursor:pointer;
    transition:border-color 0.15s ease, background 0.15s ease;
  }
  .answer-option:hover{ border-color:var(--border-strong); background:var(--surface-alt); }
  .answer-option.selected{ border-color:var(--accent); background:var(--accent-soft); }
  .answer-option .bubble{ pointer-events:none; }
  .answer-option.selected .bubble{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .answer-option span.opt-text{ font-size:14px; }

  .take-footer{ display:flex; justify-content:space-between; align-items:center; }

  /* ===== Results ===== */
  .results-head{ display:flex; align-items:center; gap:28px; margin-bottom:30px; flex-wrap:wrap; }
  .score-ring-wrap{ position:relative; width:120px; height:120px; flex-shrink:0; }
  .score-ring-wrap svg{ transform:rotate(-90deg); }
  .score-ring-label{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .score-ring-label .pct{ font-family:var(--font-display); font-size:26px; font-weight:700; }
  .score-ring-label .lbl{ font-family:var(--font-mono); font-size:9px; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.05em; }
  .results-stats{ display:flex; flex-direction:column; gap:8px; }
  .results-stats .verdict{ font-family:var(--font-display); font-size:20px; font-weight:700; }
  .results-stats .verdict.pass{ color:var(--accent); }
  .results-stats .verdict.fail{ color:var(--danger); }
  .results-stats .sub{ font-family:var(--font-mono); font-size:12px; color:var(--text-secondary); display:flex; gap:16px; flex-wrap:wrap; }

  .review-item{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:20px 22px; margin-bottom:12px;
  }
  .review-item-head{ display:flex; align-items:flex-start; gap:10px; margin-bottom:14px; }
  .review-status-icon{
    width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px;
  }
  .review-status-icon.correct{ background:var(--accent-soft); color:var(--accent); }
  .review-status-icon.incorrect{ background:var(--danger-soft); color:var(--danger); }
  .review-status-icon svg{ width:13px; height:13px; }
  .review-item h3{ font-family:var(--font-display); font-size:15px; font-weight:600; line-height:1.45; }
  .review-option{
    display:flex; align-items:center; gap:12px; padding:9px 12px; border-radius:var(--radius-sm); margin-bottom:6px;
    font-size:13px;
  }
  .review-option .bubble{ width:22px; height:22px; font-size:10px; cursor:default; }
  .review-option.is-correct{ background:var(--accent-soft); }
  .review-option.is-correct .bubble{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .review-option.is-wrong-pick{ background:var(--danger-soft); }
  .review-option.is-wrong-pick .bubble{ background:var(--danger); border-color:var(--danger); color:#fff; }
  .review-explanation{
    margin-top:10px; padding:11px 13px; background:var(--surface-alt); border-radius:var(--radius-sm);
    font-size:12.5px; color:var(--text-secondary); border-left:3px solid var(--gold);
  }
  .review-explanation strong{ color:var(--text-primary); }

  .results-footer{ display:flex; gap:10px; margin-top:22px; }

  @media (max-width:600px){
    .quiz-card{ flex-wrap:wrap; }
    .quiz-card-actions{ width:100%; }
    .quiz-card-actions .btn{ flex:1; justify-content:center; }
    .row-2{ flex-direction:column; }
    .results-head{ flex-direction:column; align-items:flex-start; }
  }
</style>
</head>
<body>

<div class="wrap">

  <header class="site-header">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    </div>
    <div>
      <div class="logo-text">Proctor</div>
      <div class="logo-sub">Online quiz system</div>
    </div>
    <div class="spacer"></div>
    <button class="btn btn-ghost" id="homeBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      Dashboard
    </button>
  </header>

  <!-- ===== DASHBOARD ===== -->
  <section class="view active" id="view-dashboard">
    <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:16px;">
      <div>
        <div class="page-title">Your quizzes</div>
        <div class="page-sub">Build a quiz, take it, and review scored results — all in this session.</div>
      </div>
      <button class="btn btn-primary" id="newQuizBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        New quiz
      </button>
    </div>
    <div class="quiz-grid" id="quizGrid" style="margin-top:22px;"></div>
    <div class="empty-state" id="dashboardEmpty" style="display:none;">
      <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div>
      <strong>No quizzes yet</strong>
      <p>Create your first quiz to get started.</p>
    </div>
  </section>

  <!-- ===== BUILDER ===== -->
  <section class="view" id="view-builder">
    <div class="builder-head">
      <button class="btn btn-ghost" id="builderBackBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back
      </button>
      <div class="page-title" style="font-size:20px; margin:0;">Build a quiz</div>
    </div>

    <div class="row-2">
      <div class="builder-field">
        <label for="quizTitleInput">Quiz title</label>
        <input type="text" id="quizTitleInput" placeholder="e.g. Chapter 4 review">
      </div>
      <div class="builder-field" style="max-width:180px;">
        <label for="quizTimeInput">Time limit (min)</label>
        <input type="number" id="quizTimeInput" placeholder="No limit" min="1">
      </div>
    </div>
    <div class="builder-field">
      <label for="quizDescInput">Description (optional)</label>
      <textarea id="quizDescInput" placeholder="What is this quiz covering?"></textarea>
    </div>

    <div id="questionsContainer"></div>

    <button class="add-question-btn" id="addQuestionBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      Add question
    </button>

    <div class="validation-msg" id="builderValidation"></div>
    <div class="builder-footer">
      <button class="btn btn-ghost" id="builderCancelBtn">Cancel</button>
      <button class="btn btn-primary" id="saveQuizBtn">Save quiz</button>
    </div>
  </section>

  <!-- ===== TAKE ===== -->
  <section class="view" id="view-take">
    <div class="take-head">
      <div class="take-title" id="takeTitle">Quiz title</div>
      <div class="timer" id="timerDisplay">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
        <span id="timerText">00:00</span>
      </div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="navigator" id="navigator"></div>

    <div class="question-panel">
      <div class="q-eyebrow">
        <span id="qEyebrow">Question 1 of 5</span>
        <button class="flag-btn" id="flagBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
          Flag for review
        </button>
      </div>
      <h2 id="qText">Question text goes here?</h2>
      <div id="qOptions"></div>
    </div>

    <div class="take-footer">
      <button class="btn btn-ghost" id="prevBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Previous
      </button>
      <button class="btn btn-primary" id="nextBtn">Next</button>
      <button class="btn btn-primary" id="submitBtn" style="display:none;">Submit quiz</button>
    </div>
  </section>

  <!-- ===== RESULTS ===== -->
  <section class="view" id="view-results">
    <div class="page-title" style="margin-bottom:20px;" id="resultsTitle">Results</div>
    <div class="results-head">
      <div class="score-ring-wrap">
        <svg width="120" height="120" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="52" fill="none" stroke="var(--border)" stroke-width="10"/>
          <circle cx="60" cy="60" r="52" fill="none" id="scoreRingFill" stroke="var(--accent)" stroke-width="10" stroke-linecap="round" stroke-dasharray="327" stroke-dashoffset="327"/>
        </svg>
        <div class="score-ring-label">
          <div class="pct" id="scorePct">0%</div>
          <div class="lbl">Score</div>
        </div>
      </div>
      <div class="results-stats">
        <div class="verdict" id="verdictText">—</div>
        <div class="sub">
          <span id="correctCountText">0 / 0 correct</span>
          <span id="timeTakenText">0:00 taken</span>
        </div>
      </div>
    </div>

    <div id="reviewList"></div>

    <div class="results-footer">
      <button class="btn btn-primary" id="retakeBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 11-3-6.7"/><path d="M21 4v5h-5"/></svg>
        Retake quiz
      </button>
      <button class="btn btn-ghost" id="resultsHomeBtn">Back to dashboard</button>
    </div>
  </section>

</div>

<script>
(function(){

  /* ---------- State ---------- */
  let quizzes = [];
  let editingQuizId = null;   // set when builder is editing an existing quiz
  let takeQuizId = null;
  let takeState = null;       // {answers:[], flagged:Set, index, startMs, timerInterval, remainingSec, timeLimitSec}
  let lastAttempt = null;     // for results view

  function uid(){ return Math.random().toString(36).slice(2,10); }
  function escapeHtml(s){
    return (s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }
  function letterFor(i){ return String.fromCharCode(65+i); }
  function fmtTime(sec){
    sec = Math.max(0, Math.round(sec));
    const m = Math.floor(sec/60), s = sec%60;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }
  function fmtDate(d){ return new Date(d).toLocaleDateString(undefined,{month:'short', day:'numeric'}); }

  /* ---------- Seed demo quiz ---------- */
  quizzes.push({
    id: uid(),
    title: 'General Knowledge Warm-up',
    description: 'A short five-question warm-up to get familiar with Proctor.',
    timeLimitMin: 3,
    questions: [
      { id:uid(), text:'What is the capital of Japan?', options:['Seoul','Tokyo','Beijing','Bangkok'], correctIndex:1, explanation:'Tokyo has been the capital of Japan since 1868.' },
      { id:uid(), text:'Which planet is known as the Red Planet?', options:['Venus','Jupiter','Mars','Saturn'], correctIndex:2, explanation:'Mars appears red due to iron oxide (rust) on its surface.' },
      { id:uid(), text:'What is the chemical symbol for gold?', options:['Go','Gd','Au','Ag'], correctIndex:2, explanation:'Au comes from the Latin word "aurum".' },
      { id:uid(), text:'Who wrote "Romeo and Juliet"?', options:['Charles Dickens','William Shakespeare','Jane Austen','Mark Twain'], correctIndex:1, explanation:'' },
      { id:uid(), text:'What is the largest ocean on Earth?', options:['Atlantic','Indian','Arctic','Pacific'], correctIndex:3, explanation:"The Pacific Ocean covers about a third of the Earth's surface." }
    ],
    attempts: []
  });

  /* ---------- View switching ---------- */
  function showView(name){
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.getElementById('view-'+name).classList.add('active');
    window.scrollTo({top:0, behavior:'smooth'});
  }
  document.getElementById('homeBtn').addEventListener('click', ()=>{ stopTimer(); renderDashboard(); showView('dashboard'); });
  document.getElementById('resultsHomeBtn').addEventListener('click', ()=>{ renderDashboard(); showView('dashboard'); });

  /* ---------- Dashboard ---------- */
  function bestScore(quiz){
    if(quiz.attempts.length===0) return null;
    return Math.max(...quiz.attempts.map(a=>a.pct));
  }
  function renderDashboard(){
    const grid = document.getElementById('quizGrid');
    document.getElementById('dashboardEmpty').style.display = quizzes.length ? 'none' : 'block';
    grid.innerHTML = quizzes.map(q=>{
      const best = bestScore(q);
      return `
      <div class="quiz-card">
        <div class="quiz-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div>
        <div class="quiz-card-info">
          <h3>${escapeHtml(q.title)}</h3>
          <div class="quiz-card-meta">
            <span>${q.questions.length} question${q.questions.length!==1?'s':''}</span>
            <span>${q.timeLimitMin ? q.timeLimitMin+' min limit' : 'No time limit'}</span>
            <span>${q.attempts.length} attempt${q.attempts.length!==1?'s':''}</span>
            ${best!==null ? `<span class="best">Best: ${best}%</span>` : ''}
          </div>
        </div>
        <div class="quiz-card-actions">
          <button class="btn btn-primary" data-action="take" data-id="${q.id}">Take quiz</button>
          <button class="btn btn-ghost" data-action="edit" data-id="${q.id}" title="Edit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/></svg>
          </button>
          <button class="btn btn-ghost btn-danger" data-action="delete" data-id="${q.id}" title="Delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
          </button>
        </div>
      </div>`;
    }).join('');

    grid.querySelectorAll('[data-action]').forEach(btn=>{
      btn.onclick = ()=>{
        const id = btn.getAttribute('data-id');
        const action = btn.getAttribute('data-action');
        if(action==='take') startTake(id);
        else if(action==='edit') openBuilder(id);
        else if(action==='delete'){
          if(confirm('Delete this quiz? This cannot be undone.')){
            quizzes = quizzes.filter(q=>q.id!==id);
            renderDashboard();
          }
        }
      };
    });
  }

  /* ---------- Builder ---------- */
  let draftQuestions = [];

  document.getElementById('newQuizBtn').addEventListener('click', ()=> openBuilder(null));
  document.getElementById('builderBackBtn').addEventListener('click', ()=>{ renderDashboard(); showView('dashboard'); });
  document.getElementById('builderCancelBtn').addEventListener('click', ()=>{ renderDashboard(); showView('dashboard'); });

  function openBuilder(quizId){
    editingQuizId = quizId;
    const quiz = quizId ? quizzes.find(q=>q.id===quizId) : null;
    document.getElementById('quizTitleInput').value = quiz ? quiz.title : '';
    document.getElementById('quizDescInput').value = quiz ? quiz.description : '';
    document.getElementById('quizTimeInput').value = quiz && quiz.timeLimitMin ? quiz.timeLimitMin : '';
    draftQuestions = quiz ? JSON.parse(JSON.stringify(quiz.questions)) : [];
    if(draftQuestions.length===0) addBlankQuestion();
    document.getElementById('builderValidation').classList.remove('show');
    renderBuilder();
    showView('builder');
  }

  function addBlankQuestion(){
    draftQuestions.push({ id:uid(), text:'', options:['',''], correctIndex:0, explanation:'' });
  }
  document.getElementById('addQuestionBtn').addEventListener('click', ()=>{
    addBlankQuestion();
    renderBuilder();
  });

  function renderBuilder(){
    const container = document.getElementById('questionsContainer');
    container.innerHTML = draftQuestions.map((q, qi)=>`
      <div class="question-card" data-qid="${q.id}">
        <div class="question-card-head">
          <div class="q-number">${qi+1}</div>
          <input type="text" placeholder="Type your question..." value="${escapeHtml(q.text)}" data-role="qtext" data-qid="${q.id}">
          <button class="q-delete" data-action="del-question" data-qid="${q.id}" title="Delete question">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
          </button>
        </div>
        <div class="options-wrap">
          ${q.options.map((opt,oi)=>`
            <div class="option-row">
              <div class="bubble ${q.correctIndex===oi?'correct-mark':''}" data-action="mark-correct" data-qid="${q.id}" data-oi="${oi}" title="Mark as correct answer">${letterFor(oi)}</div>
              <input type="text" placeholder="Option ${letterFor(oi)}" value="${escapeHtml(opt)}" data-role="opttext" data-qid="${q.id}" data-oi="${oi}">
              ${q.options.length>2 ? `<button class="option-remove" data-action="del-option" data-qid="${q.id}" data-oi="${oi}" title="Remove option"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>` : ''}
            </div>
          `).join('')}
          ${q.options.length<6 ? `<button class="add-option-btn" data-action="add-option" data-qid="${q.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg> Add option</button>` : ''}
        </div>
        <button class="explanation-toggle" data-action="toggle-explain" data-qid="${q.id}">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
          ${q.explanation ? 'Edit explanation' : 'Add explanation (optional)'}
        </button>
        <div class="explanation-box ${q.explanation ? 'open':''}" data-explain-box="${q.id}">
          <textarea placeholder="Shown after submitting, to explain the correct answer..." data-role="explain" data-qid="${q.id}">${escapeHtml(q.explanation)}</textarea>
        </div>
      </div>
    `).join('');

    // wire text inputs
    container.querySelectorAll('[data-role="qtext"]').forEach(el=>{
      el.oninput = ()=>{ findQ(el.dataset.qid).text = el.value; };
    });
    container.querySelectorAll('[data-role="opttext"]').forEach(el=>{
      el.oninput = ()=>{ findQ(el.dataset.qid).options[+el.dataset.oi] = el.value; };
    });
    container.querySelectorAll('[data-role="explain"]').forEach(el=>{
      el.oninput = ()=>{ findQ(el.dataset.qid).explanation = el.value; };
    });
    container.querySelectorAll('[data-action]').forEach(el=>{
      el.onclick = ()=>{
        const action = el.dataset.action;
        const q = findQ(el.dataset.qid);
        if(action==='del-question'){
          draftQuestions = draftQuestions.filter(x=>x.id!==el.dataset.qid);
          if(draftQuestions.length===0) addBlankQuestion();
          renderBuilder();
        } else if(action==='mark-correct'){
          q.correctIndex = +el.dataset.oi;
          renderBuilder();
        } else if(action==='add-option'){
          q.options.push('');
          renderBuilder();
        } else if(action==='del-option'){
          const oi = +el.dataset.oi;
          q.options.splice(oi,1);
          if(q.correctIndex===oi) q.correctIndex = 0;
          else if(q.correctIndex>oi) q.correctIndex -= 1;
          renderBuilder();
        } else if(action==='toggle-explain'){
          const box = container.querySelector(`[data-explain-box="${el.dataset.qid}"]`);
          box.classList.toggle('open');
        }
      };
    });
  }
  function findQ(id){ return draftQuestions.find(q=>q.id===id); }

  document.getElementById('saveQuizBtn').addEventListener('click', ()=>{
    const title = document.getElementById('quizTitleInput').value.trim();
    const msg = document.getElementById('builderValidation');
    if(!title){ msg.textContent = 'Give your quiz a title.'; msg.classList.add('show'); return; }
    for(const q of draftQuestions){
      if(!q.text.trim()){ msg.textContent = 'Every question needs text.'; msg.classList.add('show'); return; }
      if(q.options.some(o=>!o.trim())){ msg.textContent = 'Every option needs text — remove empty ones.'; msg.classList.add('show'); return; }
    }
    msg.classList.remove('show');

    const timeLimitMin = parseInt(document.getElementById('quizTimeInput').value,10) || 0;
    const description = document.getElementById('quizDescInput').value.trim();

    if(editingQuizId){
      const quiz = quizzes.find(q=>q.id===editingQuizId);
      quiz.title = title; quiz.description = description; quiz.timeLimitMin = timeLimitMin;
      quiz.questions = JSON.parse(JSON.stringify(draftQuestions));
    } else {
      quizzes.push({ id:uid(), title, description, timeLimitMin, questions:JSON.parse(JSON.stringify(draftQuestions)), attempts:[] });
    }
    renderDashboard();
    showView('dashboard');
  });

  /* ---------- Take quiz ---------- */
  function startTake(quizId){
    const quiz = quizzes.find(q=>q.id===quizId);
    if(!quiz) return;
    takeQuizId = quizId;
    takeState = {
      answers: new Array(quiz.questions.length).fill(null),
      flagged: new Set(),
      index: 0,
      startMs: Date.now(),
      timeLimitSec: quiz.timeLimitMin ? quiz.timeLimitMin*60 : null,
      remainingSec: quiz.timeLimitMin ? quiz.timeLimitMin*60 : null,
      timerInterval: null
    };
    document.getElementById('takeTitle').textContent = quiz.title;
    renderTake();
    startTimer();
    showView('take');
  }

  function startTimer(){
    stopTimer();
    updateTimerDisplay();
    takeState.timerInterval = setInterval(()=>{
      if(takeState.timeLimitSec !== null){
        takeState.remainingSec -= 1;
        if(takeState.remainingSec <= 0){
          takeState.remainingSec = 0;
          updateTimerDisplay();
          submitQuiz();
          return;
        }
      }
      updateTimerDisplay();
    }, 1000);
  }
  function stopTimer(){
    if(takeState && takeState.timerInterval){ clearInterval(takeState.timerInterval); takeState.timerInterval = null; }
  }
  function updateTimerDisplay(){
    const el = document.getElementById('timerDisplay');
    const txt = document.getElementById('timerText');
    if(takeState.timeLimitSec !== null){
      txt.textContent = fmtTime(takeState.remainingSec);
      el.classList.toggle('low-time', takeState.remainingSec <= 30);
    } else {
      txt.textContent = fmtTime((Date.now()-takeState.startMs)/1000);
      el.classList.remove('low-time');
    }
  }

  function renderTake(){
    const quiz = quizzes.find(q=>q.id===takeQuizId);
    const qi = takeState.index;
    const q = quiz.questions[qi];

    document.getElementById('progressFill').style.width = `${((qi+1)/quiz.questions.length)*100}%`;
    document.getElementById('qEyebrow').textContent = `Question ${qi+1} of ${quiz.questions.length}`;
    document.getElementById('qText').textContent = q.text;

    const flagBtn = document.getElementById('flagBtn');
    flagBtn.classList.toggle('active', takeState.flagged.has(qi));
    flagBtn.onclick = ()=>{
      if(takeState.flagged.has(qi)) takeState.flagged.delete(qi); else takeState.flagged.add(qi);
      renderTake();
    };

    document.getElementById('qOptions').innerHTML = q.options.map((opt,oi)=>`
      <div class="answer-option ${takeState.answers[qi]===oi?'selected':''}" data-oi="${oi}">
        <div class="bubble">${letterFor(oi)}</div>
        <span class="opt-text">${escapeHtml(opt)}</span>
      </div>
    `).join('');
    document.querySelectorAll('.answer-option').forEach(el=>{
      el.onclick = ()=>{
        takeState.answers[qi] = +el.dataset.oi;
        renderTake();
      };
    });

    document.getElementById('navigator').innerHTML = quiz.questions.map((_, i)=>{
      const cls = [
        i===qi ? 'current' : '',
        takeState.answers[i]!==null ? 'answered' : '',
        takeState.flagged.has(i) ? 'flagged' : ''
      ].join(' ');
      return `<button class="nav-dot ${cls}" data-goto="${i}">${i+1}</button>`;
    }).join('');
    document.querySelectorAll('[data-goto]').forEach(el=>{
      el.onclick = ()=>{ takeState.index = +el.dataset.goto; renderTake(); };
    });

    document.getElementById('prevBtn').disabled = qi===0;
    const isLast = qi === quiz.questions.length-1;
    document.getElementById('nextBtn').style.display = isLast ? 'none' : 'inline-flex';
    document.getElementById('submitBtn').style.display = isLast ? 'inline-flex' : 'none';
  }

  document.getElementById('prevBtn').addEventListener('click', ()=>{
    if(takeState.index>0){ takeState.index--; renderTake(); }
  });
  document.getElementById('nextBtn').addEventListener('click', ()=>{
    const quiz = quizzes.find(q=>q.id===takeQuizId);
    if(takeState.index < quiz.questions.length-1){ takeState.index++; renderTake(); }
  });
  document.getElementById('submitBtn').addEventListener('click', submitQuiz);

  function submitQuiz(){
    stopTimer();
    const quiz = quizzes.find(q=>q.id===takeQuizId);
    const timeTakenSec = (Date.now()-takeState.startMs)/1000;
    let correct = 0;
    quiz.questions.forEach((q,i)=>{ if(takeState.answers[i]===q.correctIndex) correct++; });
    const pct = Math.round((correct/quiz.questions.length)*100);
    const attempt = { date:Date.now(), score:correct, total:quiz.questions.length, pct, timeTakenSec, answers:takeState.answers.slice() };
    quiz.attempts.push(attempt);
    lastAttempt = { quizId:quiz.id, attempt };
    renderResults();
    showView('results');
  }

  /* ---------- Results ---------- */
  function renderResults(){
    const quiz = quizzes.find(q=>q.id===lastAttempt.quizId);
    const attempt = lastAttempt.attempt;
    document.getElementById('resultsTitle').textContent = quiz.title + ' — Results';
    document.getElementById('scorePct').textContent = attempt.pct + '%';
    document.getElementById('correctCountText').textContent = `${attempt.score} / ${attempt.total} correct`;
    document.getElementById('timeTakenText').textContent = fmtTime(attempt.timeTakenSec) + ' taken';

    const ring = document.getElementById('scoreRingFill');
    const circumference = 2*Math.PI*52;
    ring.setAttribute('stroke-dasharray', circumference.toFixed(1));
    ring.setAttribute('stroke-dashoffset', (circumference * (1 - attempt.pct/100)).toFixed(1));
    ring.style.stroke = attempt.pct>=80 ? 'var(--accent)' : (attempt.pct>=50 ? 'var(--gold)' : 'var(--danger)');

    const verdict = document.getElementById('verdictText');
    if(attempt.pct>=80){ verdict.textContent = 'Excellent work'; verdict.className='verdict pass'; }
    else if(attempt.pct>=50){ verdict.textContent = 'Solid effort'; verdict.className='verdict'; verdict.style.color='var(--gold)'; }
    else { verdict.textContent = 'Needs review'; verdict.className='verdict fail'; }

    document.getElementById('reviewList').innerHTML = quiz.questions.map((q,qi)=>{
      const picked = attempt.answers[qi];
      const isCorrect = picked === q.correctIndex;
      return `
      <div class="review-item">
        <div class="review-item-head">
          <div class="review-status-icon ${isCorrect?'correct':'incorrect'}">
            ${isCorrect
              ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>'
              : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>'}
          </div>
          <h3>${qi+1}. ${escapeHtml(q.text)}</h3>
        </div>
        ${q.options.map((opt,oi)=>{
          let cls = '';
          if(oi===q.correctIndex) cls='is-correct';
          else if(oi===picked && !isCorrect) cls='is-wrong-pick';
          return `<div class="review-option ${cls}"><div class="bubble ${cls?'correct-mark':''}">${letterFor(oi)}</div><span>${escapeHtml(opt)}${oi===picked?' <em style="opacity:0.65; font-style:italic;">— your answer</em>':''}</span></div>`;
        }).join('')}
        ${q.explanation ? `<div class="review-explanation"><strong>Why:</strong> ${escapeHtml(q.explanation)}</div>` : ''}
      </div>`;
    }).join('');
  }

  document.getElementById('retakeBtn').addEventListener('click', ()=> startTake(lastAttempt.quizId));

  /* ---------- Init ---------- */
  renderDashboard();
})();
</script>
</body>
</html>

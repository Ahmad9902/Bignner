<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exchange — Currency Converter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15171a;
    --casing:#1c1f23;
    --panel:#232629;
    --panel-raised:#2b2e32;
    --flap:#1a1c1f;
    --flap-seam:#000000;
    --gold:#e8b84b;
    --gold-dim:#a4823a;
    --line:#3a3d42;
    --line-soft:#2e3134;
    --text:#f1efe9;
    --muted:#8b8f96;
    --up:#5c9d72;
    --down:#b8543f;
    --radius:6px;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    font-family:'Inter', sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{ background:var(--gold); color:#1a1408; }

  .shell{
    max-width:760px;
    margin:0 auto;
    padding:40px 24px 70px;
  }

  header.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:28px;
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand .plate{
    width:8px; height:26px;
    background:var(--gold);
    border-radius:1px;
  }
  .brand .name{
    font-family:'Archivo', sans-serif;
    font-weight:700;
    font-size:20px;
    letter-spacing:-0.01em;
  }
  .updated-readout{
    font-family:'Fira Code', monospace;
    font-size:11px;
    color:var(--muted);
    text-align:right;
    line-height:1.5;
  }
  .updated-readout .dot{
    display:inline-block;
    width:6px; height:6px;
    border-radius:50%;
    background:var(--up);
    margin-right:6px;
  }

  /* ===== CONVERTER PANEL ===== */
  .converter{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:26px;
    margin-bottom:22px;
  }

  .cur-row{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    gap:14px;
    align-items:end;
    margin-bottom:22px;
  }
  .cur-field label{
    display:block;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.09em;
    color:var(--muted);
    margin-bottom:8px;
  }
  .cur-field select{
    width:100%;
    background:var(--panel-raised);
    border:1px solid var(--line);
    color:var(--text);
    padding:11px 12px;
    border-radius:var(--radius);
    font-size:13.5px;
    outline:none;
    font-family:'Inter', sans-serif;
  }
  .cur-field select:focus{ border-color:var(--gold); }

  .swap-btn{
    width:40px; height:40px;
    border-radius:50%;
    background:var(--panel-raised);
    border:1px solid var(--line);
    color:var(--gold);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .swap-btn:hover{ border-color:var(--gold); }
  .swap-btn svg{ width:18px; height:18px; transition:transform .3s ease; }
  .swap-btn.spun svg{ transform:rotate(180deg); }

  .amount-field{ margin-bottom:24px; }
  .amount-field label{
    display:block;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.09em;
    color:var(--muted);
    margin-bottom:8px;
  }
  .amount-field input{
    width:100%;
    background:var(--panel-raised);
    border:1px solid var(--line);
    color:var(--text);
    padding:13px 14px;
    border-radius:var(--radius);
    font-size:20px;
    font-family:'Fira Code', monospace;
    outline:none;
  }
  .amount-field input:focus{ border-color:var(--gold); }

  /* ===== SIGNATURE: SPLIT-FLAP BOARD ===== */
  .board-wrap{
    background:var(--casing);
    border:1px solid var(--line);
    border-radius:8px;
    padding:20px 22px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
  }
  .board-code{
    font-family:'Archivo', sans-serif;
    font-weight:700;
    font-size:15px;
    color:var(--gold);
    letter-spacing:0.04em;
  }
  .flap-row{
    display:flex;
    gap:4px;
  }
  .flap-unit{
    position:relative;
    width:30px; height:46px;
    background:var(--flap);
    border-radius:3px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Fira Code', monospace;
    font-weight:600;
    font-size:24px;
    color:var(--gold);
    overflow:hidden;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,0.04);
  }
  .flap-unit.punct{
    width:16px;
    color:var(--muted);
    font-size:20px;
  }
  .flap-unit::after{
    content:"";
    position:absolute;
    left:0; right:0; top:50%;
    height:2px;
    background:var(--flap-seam);
    transform:translateY(-1px);
    opacity:0.6;
  }
  .flap-unit .char{
    display:inline-block;
    transition:none;
  }
  .flap-unit.flipping .char{
    animation:flipChar 0.32s ease;
  }
  @keyframes flipChar{
    0%{ transform:rotateX(0deg); }
    45%{ transform:rotateX(-90deg); }
    55%{ transform:rotateX(-90deg); }
    100%{ transform:rotateX(0deg); }
  }
  @media (prefers-reduced-motion: reduce){
    .flap-unit.flipping .char{ animation:none; }
  }

  .rate-line{
    font-family:'Fira Code', monospace;
    font-size:11.5px;
    color:var(--muted);
    margin-top:14px;
    text-align:center;
  }

  /* ===== RATES BOARD ===== */
  .board-title{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.09em;
    color:var(--muted);
    margin-bottom:12px;
    padding-left:2px;
  }
  .rates-grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:8px;
  }
  .rate-tile{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:8px;
    padding:13px 12px;
  }
  .rate-tile .rt-code{
    font-family:'Archivo', sans-serif;
    font-weight:700;
    font-size:12.5px;
    color:var(--gold);
    margin-bottom:6px;
  }
  .rate-tile .rt-value{
    font-family:'Fira Code', monospace;
    font-size:14px;
  }
  .rate-tile .rt-name{
    font-size:10px;
    color:var(--muted);
    margin-top:4px;
  }

  .status-msg{
    font-size:12.5px;
    color:var(--muted);
    margin-top:14px;
    text-align:center;
    min-height:16px;
  }
  .status-msg.err{ color:var(--down); }

  @media (max-width: 620px){
    .rates-grid{ grid-template-columns:repeat(2, 1fr); }
    .flap-unit{ width:22px; height:36px; font-size:18px; }
    .flap-unit.punct{ width:12px; font-size:16px; }
    .board-wrap{ justify-content:center; }
  }

  :focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }
</style>
</head>
<body>

<div class="shell">
  <header class="top">
    <div class="brand">
      <div class="plate"></div>
      <div class="name">Exchange</div>
    </div>
    <div class="updated-readout"><span class="dot"></span><span id="updatedLabel">Loading rates…</span></div>
  </header>

  <div class="converter">
    <div class="cur-row">
      <div class="cur-field">
        <label for="fromSelect">From</label>
        <select id="fromSelect"></select>
      </div>
      <button type="button" class="swap-btn" id="swapBtn" title="Swap currencies">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 10l-4 4m0 0l4 4m-4-4h18M17 14l4-4m0 0l-4-4m4 4H3"></path>
        </svg>
      </button>
      <div class="cur-field">
        <label for="toSelect">To</label>
        <select id="toSelect"></select>
      </div>
    </div>

    <div class="amount-field">
      <label for="amountInput">Amount</label>
      <input type="number" id="amountInput" value="100" min="0" step="any">
    </div>

    <div class="board-wrap">
      <div class="board-code" id="toCodeLabel">USD</div>
      <div class="flap-row" id="flapRow"></div>
    </div>
    <div class="rate-line" id="rateLine">—</div>
    <div class="status-msg" id="statusMsg"></div>
  </div>

  <div class="board-title">Quick reference</div>
  <div class="rates-grid" id="ratesGrid"></div>
</div>

<script>
  const el = id => document.getElementById(id);

  const CURRENCY_NAMES = {
    USD:'US Dollar', EUR:'Euro', GBP:'British Pound', JPY:'Japanese Yen', AUD:'Australian Dollar',
    CAD:'Canadian Dollar', CHF:'Swiss Franc', CNY:'Chinese Yuan', INR:'Indian Rupee', PKR:'Pakistani Rupee',
    AED:'UAE Dirham', SAR:'Saudi Riyal', SGD:'Singapore Dollar', HKD:'Hong Kong Dollar', NZD:'New Zealand Dollar',
    ZAR:'South African Rand', BRL:'Brazilian Real', MXN:'Mexican Peso', KRW:'South Korean Won', TRY:'Turkish Lira',
    RUB:'Russian Ruble', IDR:'Indonesian Rupiah', THB:'Thai Baht', MYR:'Malaysian Ringgit', PHP:'Philippine Peso',
    VND:'Vietnamese Dong', BDT:'Bangladeshi Taka', LKR:'Sri Lankan Rupee', NPR:'Nepalese Rupee', EGP:'Egyptian Pound',
    NGN:'Nigerian Naira', KES:'Kenyan Shilling', SEK:'Swedish Krona', NOK:'Norwegian Krone', DKK:'Danish Krone',
    PLN:'Polish Zloty', CZK:'Czech Koruna', ILS:'Israeli Shekel', QAR:'Qatari Riyal', KWD:'Kuwaiti Dinar'
  };
  const QUICK_REFERENCE = ['USD','EUR','GBP','PKR','INR','AED','SAR','CNY'];

  let rates = {};
  let base = 'USD';
  let lastFlapChars = [];

  async function loadRates(newBase){
    el('statusMsg').textContent = '';
    try{
      const res = await fetch(`https://open.er-api.com/v6/latest/${newBase}`);
      const data = await res.json();
      if(data.result !== 'success') throw new Error('bad response');
      rates = data.rates;
      base = newBase;
      el('updatedLabel').textContent = 'Updated ' + data.time_last_update_utc.replace(/\s*\+0000\s*UTC/, ' UTC');
      populateSelectsIfNeeded();
      renderConversion();
      renderQuickReference();
    } catch(e){
      el('statusMsg').textContent = 'Could not load exchange rates — check your connection and try again.';
      el('statusMsg').classList.add('err');
    }
  }

  function populateSelectsIfNeeded(){
    if(el('fromSelect').options.length > 0) return;
    const codes = Object.keys(rates).sort();
    const buildOptions = (selectEl, defaultCode) => {
      selectEl.innerHTML = codes.map(c => `<option value="${c}" ${c===defaultCode?'selected':''}>${c} — ${CURRENCY_NAMES[c] || c}</option>`).join('');
    };
    buildOptions(el('fromSelect'), 'USD');
    buildOptions(el('toSelect'), 'EUR');
  }

  function buildFlaps(text){
    const row = el('flapRow');
    const chars = text.split('');

    if(chars.length !== lastFlapChars.length){
      row.innerHTML = '';
      chars.forEach(ch => {
        const unit = document.createElement('div');
        unit.className = 'flap-unit' + (/[0-9]/.test(ch) ? '' : ' punct');
        unit.innerHTML = `<span class="char">${ch}</span>`;
        row.appendChild(unit);
      });
      lastFlapChars = chars;
      return;
    }

    const units = row.querySelectorAll('.flap-unit');
    chars.forEach((ch, i) => {
      if(lastFlapChars[i] !== ch){
        const unit = units[i];
        const span = unit.querySelector('.char');
        unit.classList.remove('flipping');
        void unit.offsetWidth; // restart animation
        unit.classList.add('flipping');
        setTimeout(() => { span.textContent = ch; }, 145);
      }
    });
    lastFlapChars = chars;
  }

  function renderConversion(){
    const from = el('fromSelect').value;
    const to = el('toSelect').value;
    const amount = parseFloat(el('amountInput').value) || 0;

    if(!rates[to]){ return; }
    const converted = amount * rates[to];
    const display = converted.toLocaleString(undefined, { minimumFractionDigits:2, maximumFractionDigits:2 });

    el('toCodeLabel').textContent = to;
    buildFlaps(display);

    const unitRate = rates[to];
    el('rateLine').textContent = `1 ${from} = ${unitRate.toLocaleString(undefined,{maximumFractionDigits:4})} ${to}`;
  }

  function renderQuickReference(){
    const grid = el('ratesGrid');
    const from = el('fromSelect').value;
    const codes = QUICK_REFERENCE.filter(c => c !== from && rates[c]);
    grid.innerHTML = codes.slice(0,8).map(c => `
      <div class="rate-tile">
        <div class="rt-code">${c}</div>
        <div class="rt-value">${rates[c].toLocaleString(undefined,{maximumFractionDigits:4})}</div>
        <div class="rt-name">${CURRENCY_NAMES[c] || ''}</div>
      </div>
    `).join('');
  }

  el('fromSelect').addEventListener('change', () => loadRates(el('fromSelect').value));
  el('toSelect').addEventListener('change', () => { renderConversion(); renderQuickReference(); });
  el('amountInput').addEventListener('input', renderConversion);

  el('swapBtn').addEventListener('click', () => {
    el('swapBtn').classList.toggle('spun');
    const fromVal = el('fromSelect').value;
    const toVal = el('toSelect').value;
    el('fromSelect').value = toVal;
    el('toSelect').value = fromVal;
    loadRates(toVal);
  });

  loadRates('USD');
</script>
</body>
</html>

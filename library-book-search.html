<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stacks — Library Book Search</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F1F2F4;
    --bg-alt:#E7E9EC;
    --surface:#FFFFFF;
    --surface-alt:#FAFAFB;
    --border:#DDE0E4;
    --border-strong:#C3C8CE;
    --text-primary:#211C1E;
    --text-secondary:#5C5A5C;
    --text-tertiary:#96949A;
    --accent:#7A2436;
    --accent-strong:#5E1A28;
    --accent-soft:#F4E4E7;
    --gold:#A87C2E;
    --gold-soft:#F3EAD6;
    --success:#2E6B4F;
    --success-soft:#E1EFE7;
    --danger:#A5402F;
    --danger-soft:#F8E7E3;
    --font-display:'Playfair Display',serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'Courier Prime',monospace;
    --radius:10px;
    --radius-sm:7px;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:var(--bg); color:var(--text-primary); font-family:var(--font-body); font-size:14px; line-height:1.5;
    -webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(circle at 8% 6%, rgba(122,36,54,0.05), transparent 38%),
      radial-gradient(circle at 96% 88%, rgba(168,124,46,0.06), transparent 35%);
    background-attachment:fixed;
  }
  ::selection{ background:var(--accent-soft); color:var(--accent-strong); }
  ::-webkit-scrollbar{ width:10px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  ::-webkit-scrollbar-thumb{ background:var(--border-strong); border-radius:10px; border:2px solid var(--bg); }
  button{ font-family:inherit; cursor:pointer; }
  input, select, textarea{ font-family:inherit; }
  a{ color:inherit; }
  :focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

  .wrap{ max-width:980px; margin:0 auto; padding:36px 24px 80px 24px; }

  /* ===== Header ===== */
  .site-header{ display:flex; align-items:center; gap:12px; margin-bottom:26px; flex-wrap:wrap; }
  .logo-mark{
    width:38px; height:38px; border-radius:8px; background:var(--accent); color:#fff;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .logo-mark svg{ width:19px; height:19px; }
  .logo-text{ font-family:var(--font-display); font-weight:700; font-size:22px; }
  .logo-sub{ font-family:var(--font-mono); font-size:10px; color:var(--text-tertiary); letter-spacing:0.04em; text-transform:uppercase; margin-top:1px; }
  .site-header .spacer{ flex:1; }

  .btn{
    display:inline-flex; align-items:center; gap:8px; border-radius:var(--radius-sm); font-weight:600; font-size:13px;
    padding:10px 16px; border:1.5px solid var(--border-strong); background:var(--surface); color:var(--text-primary);
  }
  .btn:hover{ background:var(--surface-alt); }
  .btn svg{ width:14px; height:14px; }
  .btn-primary{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .btn-primary:hover{ background:var(--accent-strong); border-color:var(--accent-strong); }
  .btn-ghost{ border-color:transparent; background:none; color:var(--text-secondary); }
  .btn-ghost:hover{ background:var(--bg-alt); color:var(--text-primary); }
  .btn-full{ width:100%; justify-content:center; }
  .btn:disabled{ opacity:0.45; pointer-events:none; }

  .loans-btn{ position:relative; }
  .loans-badge{
    position:absolute; top:-6px; right:-6px; background:var(--gold); color:#fff;
    font-family:var(--font-mono); font-size:9.5px; font-weight:700; min-width:16px; height:16px; border-radius:9px;
    display:flex; align-items:center; justify-content:center; padding:0 3px;
  }

  /* ===== Toolbar ===== */
  .toolbar{ display:flex; align-items:center; gap:10px; margin-bottom:8px; flex-wrap:wrap; }
  .search-box{ position:relative; flex:1; min-width:200px; }
  .search-box svg{ position:absolute; left:11px; top:50%; transform:translateY(-50%); width:14px; height:14px; color:var(--text-tertiary); }
  .search-box input{
    width:100%; background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius-sm);
    padding:10px 12px 10px 32px; font-size:13.5px; color:var(--text-primary);
  }
  .search-box input:focus{ outline:none; border-color:var(--accent); }
  .pill-select{ background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius-sm); padding:9px 11px; font-size:12.5px; color:var(--text-secondary); }
  .view-toggle{ display:flex; border:1.5px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; }
  .view-toggle button{ background:var(--surface); border:none; padding:9px 11px; color:var(--text-tertiary); display:flex; align-items:center; }
  .view-toggle button svg{ width:15px; height:15px; }
  .view-toggle button.active{ background:var(--accent-soft); color:var(--accent-strong); }
  .view-toggle button+button{ border-left:1.5px solid var(--border); }

  .stats-row{
    display:flex; gap:20px; margin:18px 0 22px 0; padding-bottom:18px; border-bottom:1px solid var(--border);
    font-family:var(--font-mono); font-size:12px; color:var(--text-tertiary); flex-wrap:wrap;
  }
  .stats-row strong{ color:var(--text-primary); font-weight:600; font-family:var(--font-body); }

  /* ===== Catalog card view ===== */
  .catalog-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:16px; margin-bottom:20px; }
  .cat-card{
    background:var(--surface); border:1.5px dashed var(--border-strong); border-radius:4px;
    padding:16px 16px 14px 16px; cursor:pointer; position:relative;
    transition:border-color 0.15s ease, transform 0.12s ease;
  }
  .cat-card:hover{ border-color:var(--accent); transform:translateY(-2px); }
  .cat-card::before{
    content:''; position:absolute; top:-1.5px; left:20px; width:34px; height:8px;
    background:var(--bg); border-left:1.5px dashed var(--border-strong); border-right:1.5px dashed var(--border-strong);
    border-radius:0 0 6px 6px;
  }
  .cat-card-top{ display:flex; gap:12px; margin-bottom:10px; }
  .cover-swatch{
    width:44px; height:60px; border-radius:3px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    color:#fff; font-family:var(--font-display); font-weight:700; font-size:18px; box-shadow:inset 0 0 0 1px rgba(0,0,0,0.08);
  }
  .cat-card-titles{ min-width:0; flex:1; }
  .cat-card-titles h3{ font-family:var(--font-display); font-size:15.5px; font-weight:700; line-height:1.3; margin-bottom:3px; }
  .cat-card-titles .author{ font-size:12.5px; color:var(--text-secondary); font-style:italic; }
  .call-number{ font-family:var(--font-mono); font-size:10px; color:var(--text-tertiary); margin-top:4px; }
  .cat-card-meta{ display:flex; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
  .genre-chip{ font-family:var(--font-mono); font-size:9.5px; text-transform:uppercase; letter-spacing:0.03em; padding:3px 7px; border-radius:20px; font-weight:700; }
  .stars{ display:flex; gap:1px; color:var(--gold); }
  .stars svg{ width:11px; height:11px; }
  .avail-badge{ font-family:var(--font-mono); font-size:10px; font-weight:700; padding:3px 8px; border-radius:20px; }
  .avail-badge.avail{ background:var(--success-soft); color:var(--success); }
  .avail-badge.out{ background:var(--danger-soft); color:var(--danger); }

  /* ===== Shelf (spine) view ===== */
  .shelf-wrap{ background:var(--surface-alt); border:1px solid var(--border); border-radius:var(--radius); padding:24px 20px 14px 20px; margin-bottom:20px; }
  .shelf-row{ display:flex; flex-wrap:wrap; align-items:flex-end; gap:3px; border-bottom:10px solid #8a6a3a44; padding-bottom:0; }
  .spine{
    width:38px; height:190px; border-radius:3px 3px 0 0; cursor:pointer; flex-shrink:0;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:10px 0;
    box-shadow:inset -3px 0 6px rgba(0,0,0,0.12), inset 3px 0 6px rgba(255,255,255,0.06);
    transition:transform 0.12s ease;
    position:relative;
  }
  .spine:hover{ transform:translateY(-8px); }
  .spine .spine-title{
    writing-mode:vertical-rl; transform:rotate(180deg); font-family:var(--font-display); font-weight:700; font-size:11.5px;
    color:rgba(255,255,255,0.94); max-height:140px; overflow:hidden; text-overflow:ellipsis; letter-spacing:0.01em;
  }
  .spine .spine-out{
    position:absolute; bottom:8px; width:8px; height:8px; border-radius:50%; background:#fff;
  }

  .empty-state{ text-align:center; padding:60px 20px; color:var(--text-tertiary); }
  .empty-state .empty-icon{
    width:52px; height:52px; border-radius:14px; background:var(--surface); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center; margin:0 auto 16px auto;
  }
  .empty-state .empty-icon svg{ width:22px; height:22px; }
  .empty-state strong{ font-family:var(--font-display); font-size:16px; color:var(--text-secondary); }
  .empty-state p{ font-size:12.5px; margin-top:6px; }

  /* ===== Modal shared ===== */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(28,22,24,0.55); backdrop-filter:blur(2px);
    display:flex; align-items:center; justify-content:center; z-index:100;
    opacity:0; pointer-events:none; transition:opacity 0.15s ease; padding:20px;
  }
  .modal-overlay.open{ opacity:1; pointer-events:auto; }
  .modal{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    width:100%; box-shadow:0 24px 70px -16px rgba(28,22,24,0.4);
    transform:translateY(8px) scale(0.98); transition:transform 0.15s ease;
    max-height:88vh; overflow-y:auto;
  }
  .modal-overlay.open .modal{ transform:translateY(0) scale(1); }
  .modal-book{ max-width:480px; }
  .modal-loans{ max-width:460px; }
  .modal-head{ display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); }
  .modal-head span{ font-family:var(--font-display); font-weight:700; font-size:16px; }
  .modal-close{ width:28px; height:28px; border-radius:6px; border:none; background:transparent; color:var(--text-tertiary); display:flex; align-items:center; justify-content:center; }
  .modal-close:hover{ background:var(--bg-alt); color:var(--text-primary); }
  .modal-close svg{ width:15px; height:15px; }
  .modal-body{ padding:22px 20px; }

  .book-detail-top{ display:flex; gap:16px; margin-bottom:18px; }
  .book-detail-top .cover-swatch{ width:76px; height:104px; font-size:30px; }
  .book-detail-info h2{ font-family:var(--font-display); font-size:19px; font-weight:700; line-height:1.3; margin-bottom:4px; }
  .book-detail-info .author{ font-size:13px; color:var(--text-secondary); font-style:italic; margin-bottom:8px; }
  .book-detail-info .stars{ margin-bottom:8px; }
  .book-detail-info .call-number{ font-size:11px; }

  .detail-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
  .detail-item{ background:var(--surface-alt); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 12px; }
  .detail-item .label{ font-family:var(--font-mono); font-size:9.5px; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-tertiary); margin-bottom:3px; }
  .detail-item .value{ font-size:13px; font-weight:500; }

  .description{ font-size:13px; color:var(--text-secondary); line-height:1.6; margin-bottom:18px; }

  .avail-banner{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:12px 14px; border-radius:var(--radius-sm); margin-bottom:16px;
  }
  .avail-banner.avail{ background:var(--success-soft); }
  .avail-banner.out{ background:var(--danger-soft); }
  .avail-banner .txt{ font-size:12.5px; font-weight:600; }
  .avail-banner.avail .txt{ color:var(--success); }
  .avail-banner.out .txt{ color:var(--danger); }

  /* loans modal */
  .loan-item{ display:flex; align-items:center; gap:12px; padding:12px 0; border-top:1px solid var(--border); }
  .loan-item:first-of-type{ border-top:none; }
  .loan-item .cover-swatch{ width:34px; height:46px; font-size:14px; }
  .loan-item .li-info{ flex:1; min-width:0; }
  .loan-item .li-title{ font-family:var(--font-display); font-weight:600; font-size:13.5px; }
  .loan-item .li-due{ font-family:var(--font-mono); font-size:11px; color:var(--text-tertiary); margin-top:2px; }
  .loan-item .li-due.soon{ color:var(--gold); }

  @media (max-width:640px){
    .catalog-grid{ grid-template-columns:1fr; }
    .detail-grid{ grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header class="site-header">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
    </div>
    <div>
      <div class="logo-text">Stacks</div>
      <div class="logo-sub">Search the stacks</div>
    </div>
    <div class="spacer"></div>
    <button class="btn btn-ghost loans-btn" id="loansBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
      My loans
      <span class="loans-badge" id="loansBadge" style="display:none;">0</span>
    </button>
  </header>

  <div class="toolbar">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="Search title, author, or ISBN...">
    </div>
    <select class="pill-select" id="genreSelect"><option value="all">All genres</option></select>
    <select class="pill-select" id="availSelect">
      <option value="all">All titles</option>
      <option value="available">Available now</option>
    </select>
    <select class="pill-select" id="sortSelect">
      <option value="title">Sort: Title</option>
      <option value="author">Sort: Author</option>
      <option value="year-desc">Sort: Newest</option>
      <option value="rating-desc">Sort: Top rated</option>
    </select>
    <div class="view-toggle">
      <button id="cardViewBtn" class="active" title="Catalog cards">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </button>
      <button id="shelfViewBtn" title="Shelf view">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="4" height="18"/><rect x="10" y="3" width="4" height="18"/><rect x="16" y="3" width="4" height="18"/></svg>
      </button>
    </div>
  </div>

  <div class="stats-row">
    <span><strong id="statTotal">0</strong> titles</span>
    <span><strong id="statAvail">0</strong> available now</span>
    <span><strong id="statGenres">0</strong> genres</span>
    <span><strong id="statLoans">0</strong> checked out by you</span>
  </div>

  <div class="catalog-grid" id="catalogGrid"></div>
  <div class="shelf-wrap" id="shelfWrap" style="display:none;">
    <div class="shelf-row" id="shelfRow"></div>
  </div>

  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></div>
    <strong>No titles found</strong>
    <p>Try a different search term or filter.</p>
  </div>
</div>

<!-- Book detail modal -->
<div class="modal-overlay" id="bookOverlay">
  <div class="modal modal-book">
    <div class="modal-head">
      <span>Catalog record</span>
      <button class="modal-close" id="bookClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body" id="bookModalBody"></div>
  </div>
</div>

<!-- My loans modal -->
<div class="modal-overlay" id="loansOverlay">
  <div class="modal modal-loans">
    <div class="modal-head">
      <span>My loans</span>
      <button class="modal-close" id="loansClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body" id="loansModalBody"></div>
  </div>
</div>

<script>
(function(){

  const GENRE_COLORS = {
    'Fiction':'#7A2436','Mystery':'#2E3A6B','Sci-Fi':'#1F6E6E','Fantasy':'#5B3A8C',
    'Biography':'#A87C2E','History':'#5C4A32','Science':'#2E6B4F','Romance':'#B85C7A',
    'Poetry':'#8A5C3E','Children\u2019s':'#3E6BB0'
  };
  function uid(){ return Math.random().toString(36).slice(2,10); }
  function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
  function genreColor(g){ return GENRE_COLORS[g] || '#5C5A5C'; }
  function initialsFor(title){ return (title||'?').trim()[0].toUpperCase(); }

  /* ---------- Catalog seed ---------- */
  const catalog = [
    { title:'The Salt Line', author:'Nadia Okafor', genre:'Sci-Fi', year:2021, rating:4, callNumber:'813.6 OKA', shelf:'Stack 3, Bay 2', isbn:'978-1-2345-6780', copiesTotal:3, copiesAvailable:1, description:'A generation ship drifts off course, and the crew must decide whether to trust a signal from a world that was supposed to be empty.' },
    { title:'Quiet Hours', author:'Marguerite Voss', genre:'Fiction', year:2018, rating:5, callNumber:'813.54 VOS', shelf:'Stack 1, Bay 4', isbn:'978-1-2345-6781', copiesTotal:2, copiesAvailable:0, description:'A quiet, aching novel about a small-town librarian and the letters she never sent.' },
    { title:'The Cartographer\u2019s Error', author:'Hendrik Boase', genre:'Mystery', year:2016, rating:4, callNumber:'823.92 BOA', shelf:'Stack 2, Bay 1', isbn:'978-1-2345-6782', copiesTotal:4, copiesAvailable:2, description:'A map with one impossible street leads a retired detective back into a case he swore he\u2019d closed.' },
    { title:'Ashgrove Keep', author:'Rowan Faelin', genre:'Fantasy', year:2020, rating:5, callNumber:'813.6 FAE', shelf:'Stack 3, Bay 5', isbn:'978-1-2345-6783', copiesTotal:3, copiesAvailable:3, description:'The last keeper of a dying keep must choose between the old magic and the people it was meant to protect.' },
    { title:'A Life in Ledgers', author:'Priya Ramaswami', genre:'Biography', year:2019, rating:4, callNumber:'921 RAM', shelf:'Stack 5, Bay 2', isbn:'978-1-2345-6784', copiesTotal:2, copiesAvailable:1, description:'The story of an accountant-turned-whistleblower who uncovered one of the decade\u2019s largest frauds.' },
    { title:'The Long Winter Roads', author:'Elin Sorenson', genre:'History', year:2015, rating:4, callNumber:'909.09 SOR', shelf:'Stack 5, Bay 5', isbn:'978-1-2345-6785', copiesTotal:2, copiesAvailable:0, description:'A sweeping account of the trade routes that connected the north long before the maps agreed on their names.' },
    { title:'Under a Borrowed Sky', author:'Marguerite Voss', genre:'Fiction', year:2022, rating:4, callNumber:'813.54 VOS2', shelf:'Stack 1, Bay 4', isbn:'978-1-2345-6786', copiesTotal:3, copiesAvailable:2, description:'Two sisters, one inherited house, and the summer that finally makes them talk.' },
    { title:'The Particle at the End of Thought', author:'Femi Adeyemi', genre:'Science', year:2023, rating:5, callNumber:'530.12 ADE', shelf:'Stack 6, Bay 1', isbn:'978-1-2345-6787', copiesTotal:2, copiesAvailable:1, description:'A physicist\u2019s accessible tour through the open questions still sitting at the edge of the standard model.' },
    { title:'Evenfall', author:'Corwin Baptiste', genre:'Fantasy', year:2017, rating:3, callNumber:'813.6 BAP', shelf:'Stack 3, Bay 5', isbn:'978-1-2345-6788', copiesTotal:2, copiesAvailable:0, description:'A duology opener about a city where the sun sets twice, and only one of the sunsets is real.' },
    { title:'The Ferryman\u2019s Daughter', author:'Hendrik Boase', genre:'Mystery', year:2013, rating:4, callNumber:'823.92 BOA2', shelf:'Stack 2, Bay 1', isbn:'978-1-2345-6789', copiesTotal:3, copiesAvailable:1, description:'A body is found where the old ferry line used to run — before the river changed course.' },
    { title:'Small Weathers', author:'Junko Reyes', genre:'Poetry', year:2021, rating:5, callNumber:'811.6 REY', shelf:'Stack 7, Bay 1', isbn:'978-1-2345-6790', copiesTotal:2, copiesAvailable:2, description:'A slim, exact collection about noticing — kitchen light, bus windows, the weather inside a marriage.' },
    { title:'Second Terms', author:'Alistair Crombie', genre:'History', year:2020, rating:3, callNumber:'973.9 CRO', shelf:'Stack 5, Bay 5', isbn:'978-1-2345-6791', copiesTotal:2, copiesAvailable:1, description:'A close political history of second-term administrations and the reforms that only survive under pressure.' },
    { title:'The Orchard Line', author:'Priya Ramaswami', genre:'Romance', year:2022, rating:4, callNumber:'813.6 RAM', shelf:'Stack 4, Bay 3', isbn:'978-1-2345-6792', copiesTotal:3, copiesAvailable:1, description:'Two rival orchard families, one property line dispute, and a wedding neither side can afford to skip.' },
    { title:'How the Light Gets Counted', author:'Femi Adeyemi', genre:'Science', year:2019, rating:4, callNumber:'535 ADE', shelf:'Stack 6, Bay 1', isbn:'978-1-2345-6793', copiesTotal:2, copiesAvailable:0, description:'A history of photometry told through the instruments that made starlight measurable.' },
    { title:'Root and Rafter', author:'Corwin Baptiste', genre:'Children\u2019s', year:2018, rating:5, callNumber:'J FIC BAP', shelf:'Stack 8, Bay 2', isbn:'978-1-2345-6794', copiesTotal:4, copiesAvailable:4, description:'A young carpenter\u2019s apprentice discovers the family workshop has been hiding one very old, very opinionated house spirit.' },
    { title:'The Understudy\u2019s Notebook', author:'Elin Sorenson', genre:'Fiction', year:2014, rating:3, callNumber:'813.54 SOR', shelf:'Stack 1, Bay 4', isbn:'978-1-2345-6795', copiesTotal:2, copiesAvailable:1, description:'A theater understudy\u2019s diary across one season, written for a role she never gets to play.' }
  ];
  const books = catalog.map(b => Object.assign({ id:uid(), holds: b.copiesAvailable===0 ? Math.floor(Math.random()*4)+1 : 0 }, b));

  let myLoans = []; // {bookId, checkoutDate, dueDate}
  let viewMode = 'card';
  let searchTerm = '';
  let genreFilter = 'all';
  let availFilter = 'all';
  let sortMode = 'title';
  let activeBookId = null;

  /* ---------- Genre select ---------- */
  function initGenreSelect(){
    const genres = Array.from(new Set(books.map(b=>b.genre))).sort();
    const sel = document.getElementById('genreSelect');
    sel.innerHTML = '<option value="all">All genres</option>' + genres.map(g=>`<option value="${escapeHtml(g)}">${escapeHtml(g)}</option>`).join('');
  }

  function getFiltered(){
    let list = books.slice();
    if(genreFilter !== 'all') list = list.filter(b=>b.genre===genreFilter);
    if(availFilter === 'available') list = list.filter(b=>b.copiesAvailable>0);
    if(searchTerm){
      list = list.filter(b=>{
        const hay = `${b.title} ${b.author} ${b.isbn} ${b.genre}`.toLowerCase();
        return hay.includes(searchTerm);
      });
    }
    switch(sortMode){
      case 'title': list.sort((a,b)=>a.title.localeCompare(b.title)); break;
      case 'author': list.sort((a,b)=>a.author.localeCompare(b.author)); break;
      case 'year-desc': list.sort((a,b)=>b.year-a.year); break;
      case 'rating-desc': list.sort((a,b)=>b.rating-a.rating); break;
    }
    return list;
  }

  function starsHtml(rating, size){
    let s = '';
    for(let i=0;i<5;i++){
      s += `<svg viewBox="0 0 24 24" fill="${i<rating?'currentColor':'none'}" stroke="currentColor" stroke-width="1.6"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg>`;
    }
    return `<div class="stars" style="${size?`--s:${size}`:''}">${s}</div>`;
  }

  /* ---------- Render main ---------- */
  function render(){
    const list = getFiltered();
    const cardGrid = document.getElementById('catalogGrid');
    const shelfWrap = document.getElementById('shelfWrap');
    const empty = document.getElementById('emptyState');

    empty.style.display = list.length===0 ? 'block' : 'none';
    cardGrid.style.display = (viewMode==='card' && list.length>0) ? 'grid' : 'none';
    shelfWrap.style.display = (viewMode==='shelf' && list.length>0) ? 'block' : 'none';

    if(viewMode==='card'){
      cardGrid.innerHTML = list.map(b=>{
        const avail = b.copiesAvailable>0;
        return `
        <div class="cat-card" data-id="${b.id}">
          <div class="cat-card-top">
            <div class="cover-swatch" style="background:${genreColor(b.genre)};">${initialsFor(b.title)}</div>
            <div class="cat-card-titles">
              <h3>${escapeHtml(b.title)}</h3>
              <div class="author">${escapeHtml(b.author)}, ${b.year}</div>
              <div class="call-number">${escapeHtml(b.callNumber)}</div>
            </div>
          </div>
          <div class="cat-card-meta">
            <span class="genre-chip" style="background:${genreColor(b.genre)}22; color:${genreColor(b.genre)};">${escapeHtml(b.genre)}</span>
            ${starsHtml(b.rating)}
          </div>
          <span class="avail-badge ${avail?'avail':'out'}">${avail ? b.copiesAvailable+' available' : (b.holds>0 ? b.holds+' on hold' : 'Checked out')}</span>
        </div>`;
      }).join('');
      cardGrid.querySelectorAll('[data-id]').forEach(el=> el.addEventListener('click', ()=> openBook(el.dataset.id)));
    } else {
      document.getElementById('shelfRow').innerHTML = list.map(b=>{
        const avail = b.copiesAvailable>0;
        return `<div class="spine" data-id="${b.id}" style="background:${genreColor(b.genre)};" title="${escapeHtml(b.title)} — ${escapeHtml(b.author)}">
          <div class="spine-title">${escapeHtml(b.title)}</div>
          ${!avail ? '<div class="spine-out" title="Checked out"></div>' : ''}
        </div>`;
      }).join('');
      document.querySelectorAll('.spine').forEach(el=> el.addEventListener('click', ()=> openBook(el.dataset.id)));
    }

    document.getElementById('statTotal').textContent = books.length;
    document.getElementById('statAvail').textContent = books.filter(b=>b.copiesAvailable>0).length;
    document.getElementById('statGenres').textContent = new Set(books.map(b=>b.genre)).size;
    document.getElementById('statLoans').textContent = myLoans.length;

    const badge = document.getElementById('loansBadge');
    badge.style.display = myLoans.length ? 'flex' : 'none';
    badge.textContent = myLoans.length;
  }

  document.getElementById('searchInput').addEventListener('input', e=>{ searchTerm = e.target.value.trim().toLowerCase(); render(); });
  document.getElementById('genreSelect').addEventListener('change', e=>{ genreFilter = e.target.value; render(); });
  document.getElementById('availSelect').addEventListener('change', e=>{ availFilter = e.target.value; render(); });
  document.getElementById('sortSelect').addEventListener('change', e=>{ sortMode = e.target.value; render(); });
  document.getElementById('cardViewBtn').addEventListener('click', ()=>{
    viewMode='card';
    document.getElementById('cardViewBtn').classList.add('active');
    document.getElementById('shelfViewBtn').classList.remove('active');
    render();
  });
  document.getElementById('shelfViewBtn').addEventListener('click', ()=>{
    viewMode='shelf';
    document.getElementById('shelfViewBtn').classList.add('active');
    document.getElementById('cardViewBtn').classList.remove('active');
    render();
  });

  /* ---------- Book modal ---------- */
  function openBook(id){
    activeBookId = id;
    renderBookModal();
    document.getElementById('bookOverlay').classList.add('open');
  }
  function closeBook(){ document.getElementById('bookOverlay').classList.remove('open'); activeBookId=null; }
  document.getElementById('bookClose').addEventListener('click', closeBook);
  document.getElementById('bookOverlay').addEventListener('click', e=>{ if(e.target.id==='bookOverlay') closeBook(); });

  function renderBookModal(){
    const b = books.find(x=>x.id===activeBookId);
    if(!b) return;
    const avail = b.copiesAvailable>0;
    const myLoan = myLoans.find(l=>l.bookId===b.id);
    document.getElementById('bookModalBody').innerHTML = `
      <div class="book-detail-top">
        <div class="cover-swatch" style="background:${genreColor(b.genre)};">${initialsFor(b.title)}</div>
        <div class="book-detail-info">
          <h2>${escapeHtml(b.title)}</h2>
          <div class="author">by ${escapeHtml(b.author)}</div>
          ${starsHtml(b.rating)}
          <div class="call-number">${escapeHtml(b.callNumber)} &middot; ${escapeHtml(b.shelf)}</div>
        </div>
      </div>
      <div class="detail-grid">
        <div class="detail-item"><div class="label">Genre</div><div class="value">${escapeHtml(b.genre)}</div></div>
        <div class="detail-item"><div class="label">Published</div><div class="value">${b.year}</div></div>
        <div class="detail-item"><div class="label">ISBN</div><div class="value">${escapeHtml(b.isbn)}</div></div>
        <div class="detail-item"><div class="label">Copies</div><div class="value">${b.copiesAvailable} of ${b.copiesTotal} in</div></div>
      </div>
      <div class="description">${escapeHtml(b.description)}</div>
      <div class="avail-banner ${avail?'avail':'out'}">
        <span class="txt">${myLoan ? 'Checked out to you' : (avail ? `${b.copiesAvailable} ${b.copiesAvailable===1?'copy':'copies'} on the shelf` : (b.holds>0 ? `Checked out — ${b.holds} on the hold list` : 'Checked out'))}</span>
      </div>
      ${myLoan
        ? `<div class="detail-item" style="margin-bottom:14px;"><div class="label">Due date</div><div class="value">${fmtDate(myLoan.dueDate)} (${daysLeft(myLoan.dueDate)})</div></div>
           <button class="btn btn-primary btn-full" id="actionBtn">Return this book</button>`
        : avail
          ? `<button class="btn btn-primary btn-full" id="actionBtn">Check out</button>`
          : `<button class="btn btn-primary btn-full" id="actionBtn">Join the hold list</button>`
      }
    `;
    const actionBtn = document.getElementById('actionBtn');
    if(actionBtn){
      actionBtn.onclick = ()=>{
        if(myLoan) returnBook(b.id);
        else if(avail) checkoutBook(b.id);
        else joinHold(b.id);
        renderBookModal();
        render();
      };
    }
  }

  function fmtDate(ts){ return new Date(ts).toLocaleDateString(undefined,{month:'short', day:'numeric', year:'numeric'}); }
  function daysLeft(ts){
    const d = Math.ceil((ts-Date.now())/86400000);
    return d>0 ? `due in ${d} day${d!==1?'s':''}` : 'due today';
  }

  function checkoutBook(id){
    const b = books.find(x=>x.id===id);
    if(!b || b.copiesAvailable<=0) return;
    b.copiesAvailable -= 1;
    const now = Date.now();
    myLoans.push({ bookId:id, checkoutDate:now, dueDate: now + 14*86400000 });
  }
  function returnBook(id){
    const b = books.find(x=>x.id===id);
    if(!b) return;
    b.copiesAvailable = Math.min(b.copiesTotal, b.copiesAvailable+1);
    myLoans = myLoans.filter(l=>l.bookId!==id);
  }
  function joinHold(id){
    const b = books.find(x=>x.id===id);
    if(!b) return;
    b.holds += 1;
  }

  /* ---------- My loans modal ---------- */
  document.getElementById('loansBtn').addEventListener('click', ()=>{
    renderLoansModal();
    document.getElementById('loansOverlay').classList.add('open');
  });
  document.getElementById('loansClose').addEventListener('click', ()=> document.getElementById('loansOverlay').classList.remove('open'));
  document.getElementById('loansOverlay').addEventListener('click', e=>{ if(e.target.id==='loansOverlay') document.getElementById('loansOverlay').classList.remove('open'); });

  function renderLoansModal(){
    const body = document.getElementById('loansModalBody');
    if(myLoans.length===0){
      body.innerHTML = `<div class="empty-state" style="padding:30px 10px;"><strong>No books checked out</strong><p>Browse the catalog and check out a title to see it here.</p></div>`;
      return;
    }
    body.innerHTML = myLoans.map(l=>{
      const b = books.find(x=>x.id===l.bookId);
      if(!b) return '';
      const days = Math.ceil((l.dueDate-Date.now())/86400000);
      return `
      <div class="loan-item">
        <div class="cover-swatch" style="background:${genreColor(b.genre)};">${initialsFor(b.title)}</div>
        <div class="li-info">
          <div class="li-title">${escapeHtml(b.title)}</div>
          <div class="li-due ${days<=3?'soon':''}">${fmtDate(l.dueDate)} &middot; ${daysLeft(l.dueDate)}</div>
        </div>
        <button class="btn" data-return="${b.id}">Return</button>
      </div>`;
    }).join('');
    body.querySelectorAll('[data-return]').forEach(btn=>{
      btn.onclick = ()=>{
        returnBook(btn.dataset.return);
        renderLoansModal();
        render();
      };
    });
  }

  document.addEventListener('keydown', e=>{
    if(e.key==='Escape'){
      document.getElementById('bookOverlay').classList.remove('open');
      document.getElementById('loansOverlay').classList.remove('open');
    }
  });

  initGenreSelect();
  render();
})();
</script>
</body>
</html>
